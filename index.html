  }
  const daySessions=week.days[d]||[];
  const effective=getEffectiveSessions(w,d);
  const isAllRest=daySessions.length>0&&daySessions.every(s=>s.type===REST)&&getExtras(w,d).length===0;
  if(isAllRest){
    const rc=document.createElement('div');rc.className='rest-day-card';rc.style.marginTop='16px';
    rc.innerHTML=daySessions[0]?.text||'DESCANSO';
    slide.appendChild(rc);
  }else{
    const list=document.createElement('div');list.className='hoje-list';list.id='hoje-list';
    list.style.cssText='padding:0 16px;padding-top:12px;display:flex;flex-direction:column;gap:8px';
    slide.appendChild(list);
    effective.forEach((sess,si)=>{
      const okey=sess._origin+':'+(sess._origin==='plan'?sess._si:sess._idx);
      const ov=sess._origin==='plan'?getOverride(w,d,sess._si):null;
      const stravaData=ov?.stravaData||null;
      const checks=loadChecks();
      const key=sess._origin==='plan'?ck(w,d,sess._si):`ex_w${w}_d${d}_i${sess._idx}`;
      const isDone=!!checks[key];
      // Zona do override (sessão do plano) ou do extra tem prioridade sobre o plano
      const _manualZone=ov?.manualZone||null; // zona editada manualmente — prioridade absoluta
      const _stravaZone=ov?.stravaZone||sess.stravaZone||null;
      const _ovZone=ov?.note&&zones[ov.note]?ov.note:null;
      const _extraZone=sess._origin==='extra'?(sess.manualZone||sess.stravaZone||(sess.note&&zones[sess.note]?sess.note:null)):null;
      const zoneKey=_manualZone||_ovZone||_extraZone||_stravaZone||getZone(sess.type,w);
      const zoneInfo=zoneKey?zones[zoneKey]:null;
      const nextSess=effective[si+1];
      const prevSess=effective[si-1];
      const isBrickHead=sess.type===BRICK&&nextSess&&nextSess.type===RUN&&(nextSess.text||'').startsWith('+');
      const isBrickTail=sess.type===RUN&&(sess.text||'').startsWith('+')&&prevSess&&prevSess.type===BRICK;
      if(isBrickTail)return;
      const card=document.createElement('div');
      card.className='session-card'+(isDone?' done':'');
      card.dataset.key=key;
      card.style.borderLeftColor=colorMap[sess.type];
      let zoneHtml='';
      if(zoneInfo)zoneHtml=`<span class="session-zone" style="background:${zoneInfo.color}18;color:${zoneInfo.color};border:1px solid ${zoneInfo.color}40">${zoneInfo.label} ${zoneInfo.bpm}</span>`;
      const _editZone=ov?.manualZone||(_ovZone)||_stravaZone||null;
      const _ovNote=_editZone||'';
      const editPayload=JSON.stringify({type:sess.type,text:sess.text,dist:sess.dist,note:_ovNote}).replace(/"/g,'&quot;');
      const editBtn=sess._origin==='plan'
        ?`<div class="session-act-btn" onclick="event.stopPropagation();showAddModal(${w},${d},{si:${sess._si},_zone:'${_editZone||''}',sess:${editPayload}})">EDITAR</div>`
        :`<div class="session-act-btn" onclick="event.stopPropagation();editExtra(${w},${d},${sess._idx})">EDITAR</div>`;
      const checkBtn=`<div class="session-check-btn ${isDone?'done':''}" data-key="${key}" onclick="toggleCheck(event,'${key}')">${isDone?'✓':''}</div>`;
      let bodyHtml='';
      if(isBrickHead){
        const parts=(sess.dist||'').split('+').map(x=>x.trim()).filter(Boolean);
        const isSimulado=parts.length>=3;
        const runDist=nextSess.dist||'';
        const title=isSimulado?'SIMULADO':'TIJOLO';
        const lines=isSimulado
          ?[[colorMap[SWIM],'NATACAO',parts[0]||''],[colorMap[BIKE],'BIKE',parts[1]||''],[colorMap[RUN],'CORRIDA',parts[2]||runDist]]
          :[[colorMap[BIKE],'BIKE',sess.dist||''],[colorMap[RUN],'CORRIDA',runDist]];
        const linesHtml=lines.map(([c,l,v])=>`
          <div style="display:flex;align-items:center;gap:6px">
            <div style="width:5px;height:5px;border-radius:50%;background:${c};flex-shrink:0"></div>
            <span style="font-family:var(--font-ui);font-size:12px;font-weight:600;letter-spacing:.3px;text-transform:uppercase;color:var(--muted2)">${l}</span>
            <span style="font-family:var(--font-display);font-size:13px;color:var(--accent);margin-left:auto">${v}</span>
          </div>`).join('');
        bodyHtml=`
          <div class="session-card-header">
            <div class="drag-handle">&#9776;</div>
            <div style="flex:1">
              <span class="session-card-title">${title}</span>${zoneHtml}
              <div style="display:flex;flex-direction:column;gap:4px;margin-top:8px">${linesHtml}</div>
            </div>
            <div class="session-actions">${editBtn}</div>${checkBtn}
          </div>
          ${sess.note?`<div class="session-notes" style="color:${colorMap[sess.type]};background:${colorMap[sess.type]}0d;border-color:${colorMap[sess.type]}26">${sess.note}</div>`:''}`;
      }else{
        // Para extras do Strava, dados vêm de sess.dist e sess.note
        const isStravaExtra=sess._origin==='extra';
        const timeTypes=[TENNIS,GYM];
        
        // Linha principal
        let mainMetric='';
        if(stravaData){
          // Sessão do plano com dados Strava
          let _sd=ov?.stravaDist||sess.dist||'';
          // Natação: converter km→m se stravaDist ainda vier em km (overrides antigos)
          if(sess.type===SWIM&&_sd&&_sd.endsWith('km')){const _km=parseFloat(_sd);if(!isNaN(_km))_sd=Math.round(_km*1000)+'m';}
          mainMetric=(timeTypes.includes(sess.type))?ov?.stravaTime||sess.dist||'':_sd;
        }else if(isStravaExtra){
          // Extra criado pelo Strava: tempo para tênis/musc, dist para resto
          let _ed=sess.dist||'';
          if(sess.type===SWIM){
            // Para natação: extrair distância real da linha sombreada (ex: "1375m · 29min · 109bpm")
            const _noteMatch=sess.note&&sess.note.match(/^(\d+m)/);
            if(_noteMatch)_ed=_noteMatch[1];
            else if(_ed&&_ed.endsWith('km')){const _km=parseFloat(_ed);if(!isNaN(_km))_ed=Math.round(_km*1000)+'m';}
          }
          mainMetric=(timeTypes.includes(sess.type))?_ed:_ed;
        }else{
          let _gd=sess.dist||'';
          if(sess.type===SWIM&&_gd&&_gd.endsWith('km')){const _km=parseFloat(_gd);if(!isNaN(_km))_gd=Math.round(_km*1000)+'m';}
          mainMetric=_gd;
        }

        // Para extras do Strava com tipo de tempo, trocar dist por tempo na linha principal
        // sess.dist para extras de tênis/musc contém o tempo (ex: "57min")
        // e sess.note contém os dados completos

        // Linha sombreada
        let shadeContent='';
        if(stravaData){
          shadeContent=stravaData;
        }else if(isStravaExtra&&sess.note){
          shadeContent=sess.note;
        }else if(sess.note&&sess.type!==GYM){
          shadeContent=sess.note;
        }

        bodyHtml=`
          <div class="session-card-header">
            <div class="drag-handle">&#9776;</div>
            <div class="session-type-dot" style="background:${colorMap[sess.type]}"></div>
            <div style="flex:1">
              <span class="session-card-title">${sess.text}</span>${zoneHtml}
            </div>
            <div style="flex-shrink:0">
              <span class="session-card-dist">${mainMetric}</span>
            </div>
            <div class="session-actions">${editBtn}</div>${checkBtn}
          </div>
          ${shadeContent?`<div class="session-notes" style="color:${colorMap[sess.type]};background:${colorMap[sess.type]}18;border-top:1px solid ${colorMap[sess.type]}33">${shadeContent}</div>`:''}`;
      }
      card.innerHTML=bodyHtml;
      const sw=document.createElement('div');sw.className='swipe-wrap';sw.dataset.okey=okey;
      sw.innerHTML=`<div class="swipe-delete-bg">EXCLUIR</div>`;
      sw.appendChild(card);
      const delFn=sess._origin==='plan'?()=>deleteSession(w,d,sess._si):()=>{removeExtra(w,d,sess._idx);refreshHoje();};
      attachSwipe(sw,card,delFn);attachLongPressReorder(sw,card,list,w,d);
      list.appendChild(sw);
    });
  }
  const reBtn=document.createElement('div');reBtn.className='reorder-btn';reBtn.id='reorder-btn';
  reBtn.innerHTML=reorderMode?'ARRASTE PARA REORDENAR':'&#9776; REORDENAR';
  if(reorderMode)reBtn.classList.add('active');
  reBtn.addEventListener('click',()=>{reorderMode=!reorderMode;refreshHoje();});
  slide.appendChild(reBtn);

  // Botão restaurar — só aparece se houver sessões deletadas
  const overrides=loadOverrides();

  const addBtn=document.createElement('div');addBtn.className='add-btn';addBtn.innerHTML='+ REGISTRAR ATIVIDADE';
  addBtn.addEventListener('click',()=>showAddModal(w,d));slide.appendChild(addBtn);
  if(reorderMode)slide.classList.add('reordering');
  const nav=document.createElement('div');nav.className='hoje-nav';
  nav.innerHTML=`<button class="hoje-today-btn" onclick="goToToday()">HOJE</button>`;
  slide.appendChild(nav);
  return slide;
}

function _renderHoje(w,d){
  const viewHoje=document.getElementById('agenda-content')||document.getElementById('view-hoje');
  // Remover slides mas preservar o weather-widget fixo
  [...viewHoje.children].forEach(el=>{
    if(el.id!=='weather-widget')viewHoje.removeChild(el);
  });

let _swipeLocked=false;
(function _setupDaySwipe(){
  function getView(){
    const ac=document.getElementById('agenda-content');
    if(ac)return ac;
    return document.getElementById('view-hoje');
  }
  function isViewActive(){
    const agenda=document.getElementById('view-agenda');
    const hoje=document.getElementById('view-hoje');
    return (agenda&&agenda.classList.contains('active'))||(hoje&&hoje.classList.contains('active'));
  }
  function getSlide(view){
    return [...(view?.children||[])].find(el=>el.id!=='weather-widget'&&el.tagName!=='STYLE')||null;
  }
  let sx=0,sy=0,isH=false,decided=false,active=false;
  const THRESH=35;

  document.addEventListener('touchstart',function(e){
    if(!isViewActive())return;
    if(agendaSubTab&&agendaSubTab!=='hoje')return;
    if(e.target.closest('.swipe-wrap')||e.target.closest('.modal-overlay')||e.target.closest('.cal-modal-overlay')||e.target.closest('.modal'))return;
    if(e.target.closest('#weather-widget'))return;
    if(_swipeLocked)return;
    const t=e.touches[0];
    sx=t.clientX;sy=t.clientY;
    isH=false;decided=false;active=true;
  },{passive:true});

  document.addEventListener('touchmove',function(e){
    if(!active||_swipeLocked)return;
    const t=e.touches[0];
    const dx=t.clientX-sx, dy=t.clientY-sy;
    if(!decided&&(Math.abs(dx)>6||Math.abs(dy)>6)){
      decided=true;
      isH=Math.abs(dx)>Math.abs(dy)*0.8;
      if(!isH){active=false;return;}
    }
    if(!isH)return;
    if(e.cancelable)e.preventDefault();
    const view=getView();
    const slide=getSlide(view);
    if(!slide)return;
    const atStart=hojeWeek===1&&hojeDay===0;
    const atEnd=hojeWeek===16&&hojeDay===6;
    let x=dx;
    if((x>0&&atStart)||(x<0&&atEnd))x=dx*0.15;
    slide.style.transition='none';
    slide.style.transform=`translateX(${x}px)`;
  },{passive:false});

  document.addEventListener('touchend',function(e){
    if(!active||!isH){active=false;return;}
    active=false;isH=false;decided=false;
    if(_swipeLocked)return;
    const view=getView();
    const slide=getSlide(view);
    if(!slide)return;
    const dx=e.changedTouches[0].clientX-sx;
    const atStart=hojeWeek===1&&hojeDay===0;
    const atEnd=hojeWeek===16&&hojeDay===6;
    const dir=dx<-THRESH&&!atEnd?1:dx>THRESH&&!atStart?-1:0;
    if(dir===0){
      slide.style.transition='transform 240ms cubic-bezier(.4,0,.2,1)';
      slide.style.transform='translateX(0)';
      return;
    }
    _swipeLocked=true;
    let nw=hojeWeek, nd=hojeDay+dir;
    if(nd<0){nw=Math.max(1,nw-1);nd=6;}
    if(nd>6){nw=Math.min(16,nw+1);nd=0;}
    const VW=view.offsetWidth||window.innerWidth;
    // Wrapper para animação — não mexe no view inteiro
    const next=_buildDaySlide(nw,nd);
    next.style.cssText=`position:fixed;top:${slide.getBoundingClientRect().top}px;left:0;width:100%;transform:translateX(${dir>0?VW:-VW}px);transition:none;box-sizing:border-box;z-index:10;background:var(--bg);`;
    document.body.appendChild(next);
    const ease='240ms cubic-bezier(.4,0,.2,1)';
    requestAnimationFrame(()=>{requestAnimationFrame(()=>{
      slide.style.transition=`transform ${ease}`;
      slide.style.transform=`translateX(${dir>0?-VW:VW}px)`;
      next.style.transition=`transform ${ease}`;
      next.style.transform='translateX(0)';
    });});
    setTimeout(()=>{
      hojeWeek=nw; hojeDay=nd;
      document.body.removeChild(next);
      _renderHoje(nw,nd);
      _swipeLocked=false;
    },250);
  },{passive:true});
})();

// Swipe genérico para Semana e Calendário (navega semanas/meses)
let _semanaSwipeAbort=null;
function _attachGenericSwipe(el,onNext,onPrev){
  if(_semanaSwipeAbort)_semanaSwipeAbort.abort();
  _semanaSwipeAbort=new AbortController();
  const sig={signal:_semanaSwipeAbort.signal};
  let sx=0,sy=0,decided=false,horiz=false,active=false;
  const TRIGGER=30;
  el.addEventListener('touchstart',e=>{
    if(e.target.closest('.modal')||e.target.closest('.cal-modal'))return;
    const t=e.touches[0];sx=t.clientX;sy=t.clientY;decided=false;horiz=false;active=true;
  },{passive:true,...sig});
  el.addEventListener('touchmove',e=>{
    if(!active)return;
    const t=e.touches[0];
    const dx=t.clientX-sx,dy=t.clientY-sy;
    if(!decided&&(Math.abs(dx)>4||Math.abs(dy)>4)){
      decided=true;horiz=Math.abs(dx)>Math.abs(dy)*0.6;
      if(!horiz){active=false;return;}
    }
    if(horiz&&e.cancelable)e.preventDefault();
  },{passive:false,...sig});
  el.addEventListener('touchend',e=>{
    if(!active||!horiz){active=false;return;}
    active=false;horiz=false;
    const dx=e.changedTouches[0].clientX-sx;
    if(dx<-TRIGGER)onNext();
    else if(dx>TRIGGER)onPrev();
  },{passive:true,...sig});
}

function toggleCheck(e,key){
  e.stopPropagation();
  const c=loadChecks();
  const wasChecked=!!c[key];
  if(c[key])delete c[key];else c[key]=true;
  const nowChecked=!!c[key];
  saveChecks(c);
  // Dispara análise ao marcar (não ao desmarcar), só na aba HOJE, só sessões do plano
  if(nowChecked && !wasChecked && currentTab==='hoje'){
    // Encontra a sessão pelo key (formato: w_d_si)
    const parts=key.split('_');
    if(parts.length>=3){
      const w=parseInt(parts[0]),d=parseInt(parts[1]),si=parseInt(parts[2]);
      const sessions=getEffectiveSessions(w,d);
      const sess=sessions.find(s=>s._origin==='plan'&&s._si===si);
      if(sess) setTimeout(()=>maybeShowSessionAnalysis(key,sess,w,d),600);
    }
  }
  if(currentTab==='hoje'){
    _renderHoje(hojeWeek,hojeDay);
    renderStats();
  }else if(currentTab==='semana'){
    const miniCheck=e.target.closest?.('.mini-check')||e.target;
    const sessionRow=miniCheck?.closest?.('.mini-session');
    if(sessionRow){const isDone=!!c[key];miniCheck.className='mini-check'+(isDone?' done':'');miniCheck.textContent=isDone?'✓':'';sessionRow.className='mini-session'+(isDone?' done':'');}

}

          else if(dx<=-70)row.style.transform='translateX(-60px)';

          else row.style.transform='translateX(0)';

        sessionsDiv.appendChild(wrap);

    block.appendChild(sessionsDiv);container.appendChild(block);
  });
  let swimKm=0,bikeKm=0,runKm=0;

// Calcula volume total do ciclo atual usando checks + effective sessions
function calcCycleVolume(){
  const checks=loadChecks();
  let swim=0,bike=0,run=0,sessoesDone=0,sessoesTotal=0;
  getAllWeeks().forEach(week=>{
    week.days.forEach((day,di)=>{
      getEffectiveSessions(week.w,di).forEach(sess=>{
        if(sess.type===REST)return;
        sessoesTotal++;
        const key=sess._origin==='plan'
          ?ck(week.w,di,sess._si)
          :`ex_w${week.w}_d${di}_i${sess._idx}`;
        if(checks[key]){
          sessoesDone++;
          const v=sessionVolume(sess);
          swim+=v.swim;bike+=v.bike;run+=v.run;
        }
      });
    });
  });
  return{swim,bike,run,sessoesDone,sessoesTotal};
}

  const ov=document.createElement('div');
  ov.className='cycle-modal-overlay';

  const suggested='sprint'; // sem sugestao automatica — usuario escolhe livremente
  let selectedType=suggested;

  function buildOptions(){

            <span class="cycle-vol-val">${vol.run.toFixed(0)}km</span>
          </div>
          <div class="cycle-vol-row">
            <div class="cycle-vol-dot" style="background:#9b6af0"></div>
            <span class="cycle-vol-label">Sessoes Concluidas</span>
            <span class="cycle-vol-val">${vol.sessoesDone}/${vol.sessoesTotal}</span>
          </div>
        </div>
        <div class="cycle-select-title">PROXIMO CICLO</div>

  document.body.appendChild(ov);

  // expor selectedType para os botoes de opcao
  window._cycleSelectedType=selectedType;
  window.cycleSelectType=function(el,typeId){
    window._cycleSelectedType=typeId;
    ov.querySelectorAll('.cycle-option').forEach(o=>o.classList.remove('selected'));
    ov.querySelectorAll('.cycle-option-check').forEach(o=>o.innerHTML='');
    el.classList.add('selected');
    el.querySelector('.cycle-option-check').innerHTML='&#10003;';

  ov.querySelector('#cycle-cancel').addEventListener('click',()=>ov.remove());

  ov.querySelector('#cycle-confirm').addEventListener('click',()=>{
    const newType=window._cycleSelectedType||suggested;
    const newDate=ov.querySelector('#cycle-new-date').value;
    const newLabel=ov.querySelector('#cycle-new-label').value.trim();
    const newCity=ov.querySelector('#cycle-new-city').value.trim();
    const newState=ov.querySelector('#cycle-new-state').value.trim().toUpperCase();

      sessoesTotal:vol.sessoesTotal
    });

    // 2. Limpar checks, extras, overrides, order do ciclo atual
    try{localStorage.removeItem(SK);}catch(e){}
    try{localStorage.removeItem(EK);}catch(e){}
    try{localStorage.removeItem(OK);}catch(e){}
    try{localStorage.removeItem(ORK);}catch(e){}

    // 3. Criar novo ciclo ativo
    const today=new Date().toISOString().slice(0,10);
    const newActive={
      id:'cycle_'+Date.now(),
      type:newType,
      label:newLabel||(ct2.label+' Triathlon'),
      location:newLocation,
      city:newCity,state:newState,country:newCountry,
      raceDate:newDate||'',
      planStart:today,
      startedAt:today
    };
    saveActiveCycle(newActive);

    ov.remove();
    updateCycleBadge();
    updateCountdown();
    renderConquistas();
    switchTab('conquistas');
    alert('Novo ciclo iniciado! O plano do '+ct2.label+' sera configurado em breve. Por enquanto o app exibira o plano Sprint como referencia.');
  });
}

// ── COACHING INTELIGENTE ──
async function generateCoaching(){
  const el=document.getElementById('coach-content');
  if(!el)return;

  // Verificar cache (6h)
  try{
    const cached=JSON.parse(localStorage.getItem('nano_coach_cache')||'{}');
    const {w:cw}=getCurrentWeekAndDay();
    if(cached.text&&cached.week===cw&&(Date.now()-cached.ts)<6*3600*1000){
      el.textContent=cached.text;return;
    }
  }catch(e){}

  const {w,d}=getCurrentWeekAndDay();
  const checks=loadChecks();
  const vol=getVolume();
  const pct=Math.round((vol.done/Math.max(vol.total,1))*100);

  // Calcular completude por modalidade na semana atual
  let swimDone=0,swimTotal=0,bikeDone=0,bikeTotal=0,runDone=0,runTotal=0,gymDone=0,gymTotal=0;
  for(let dd=0;dd<7;dd++){
    getEffectiveSessions(w,dd).forEach(sess=>{
      const key=sess._origin==='plan'?ck(w,dd,sess._si):`ex_w${w}_d${dd}_i${sess._idx}`;
      const done=!!checks[key];
      if(sess.type===SWIM){swimTotal++;if(done)swimDone++;}
      else if(sess.type===BIKE||sess.type===BRICK){bikeTotal++;if(done)bikeDone++;}
      else if(sess.type===RUN){runTotal++;if(done)runDone++;}
      else if(sess.type===GYM){gymTotal++;if(done)gymDone++;}
    });
  }

  // Análise local
  const daysLeft=16-w;
  const phase=w<=4?'Base':w<=8?'Construção I':w<=12?'Construção II':'Taper';
  const swimPct=swimTotal?Math.round(swimDone/swimTotal*100):0;
  const bikePct=bikeTotal?Math.round(bikeDone/bikeTotal*100):0;
  const runPct=runTotal?Math.round(runDone/runTotal*100):0;

  let pontoForte='',pontoAtencao='',dica='';

  // Ponto forte
  const maxPct=Math.max(swimPct,bikePct,runPct);
  if(maxPct===runPct&&runTotal)pontoForte='Corrida em dia';
  else if(maxPct===bikePct&&bikeTotal)pontoForte='Bike consistente';
  else if(maxPct===swimPct&&swimTotal)pontoForte='Natação em dia';
  else pontoForte='Musculação em dia';

  // Ponto de atenção
  const minPct=Math.min(
    swimTotal?swimPct:100,
    bikeTotal?bikePct:100,
    runTotal?runPct:100
  );
  if(minPct===swimPct&&swimTotal)pontoAtencao=`Natação precisa de atenção (${swimDone}/${swimTotal} sessões)`;
  else if(minPct===bikePct&&bikeTotal)pontoAtencao=`Bike abaixo do esperado (${bikeDone}/${bikeTotal} sessões)`;
  else pontoAtencao=`Corrida abaixo do esperado (${runDone}/${runTotal} sessões)`;

  // Dica por fase
  if(phase==='Base')dica='Mantenha o ritmo em Z2. Consistência agora vale mais que intensidade.';
  else if(phase==='Construção I')dica='Aumente gradualmente o volume de natação. É seu ponto fraco — cada sessão conta.';
  else if(phase==='Construção II')dica='Os simulados desta fase são cruciais. Execute em ritmo de prova real.';
  else dica='Reduza o volume mas mantenha a intensidade. Confie no trabalho feito.';

  const text=`Semana ${w} de 16 — ${phase}. ${pct}% do plano total concluído, faltam ${daysLeft} semanas para Guarujá. ${pontoForte} esta semana. Atenção: ${pontoAtencao}. ${dica}`;

  el.textContent=text;
  localStorage.setItem('nano_coach_cache',JSON.stringify({text,ts:Date.now(),week:w}));
}

function refreshCoaching(){
  localStorage.removeItem('nano_coach_cache');
  generateCoaching();
}

// ── RESUMO SEMANAL (sábado) ──
function checkWeeklySummary(){
  const now=new Date();
  const isSaturday=now.getDay()===6;
  if(!isSaturday)return;
  const {w}=getCurrentWeekAndDay();
  const lastKey=`nano_weekly_summary_${w}`;
  if(localStorage.getItem(lastKey))return;

  const checks=loadChecks();
  let done=0,total=0,swimKm=0,bikeKm=0,runKm=0;
  for(let d=0;d<6;d++){
    getEffectiveSessions(w,d).forEach(sess=>{
      if(sess.type===REST)return;
      total++;
      const key=sess._origin==='plan'?ck(w,d,sess._si):`ex_w${w}_d${d}_i${sess._idx}`;
      if(checks[key]){done++;const v=sessionVolume(sess);swimKm+=v.swim;bikeKm+=v.bike;runKm+=v.run;}
    });
  }
  const pct=total?Math.round(done/total*100):0;
  const phase=w<=4?'Base':w<=8?'Construção I':w<=12?'Construção II':'Taper';
  const emoji=pct>=90?'':pct>=70?'':pct>=50?'':'';
  const msg=pct>=90?'Semana excelente. Consistência é o que leva à prova preparado.':
    pct>=70?'Boa semana. Recupera as sessões perdidas nos próximos dias.':

function toggleNotifications(){
  const enabled=localStorage.getItem('nano_notif')==='true';
  if(!enabled){
    if(!('Notification' in window)){alert('Seu browser nao suporta notificacoes.');return;}
    Notification.requestPermission().then(perm=>{
      if(perm==='granted'){
        localStorage.setItem('nano_notif','true');
        scheduleNotification();
        renderStats();
        alert('Notificacoes ativas! Voce recebera o resumo do treino todos os dias as 7h.');
      }else{
        alert('Permissao negada. Ative nas configuracoes do browser.');
      }
    });
  }else{
    localStorage.setItem('nano_notif','false');
    renderStats();
  }
}

function scheduleNotification(){
  if(localStorage.getItem('nano_notif')!=='true')return;
  if(!('Notification' in window)||Notification.permission!=='granted')return;
  const now=new Date();
  const next7h=new Date();
  next7h.setHours(7,0,0,0);
  if(now>=next7h)next7h.setDate(next7h.getDate()+1);
  const ms=next7h-now;
  setTimeout(()=>{
    // Montar resumo do dia
    const {w,d}=getCurrentWeekAndDay();
    const sessions=getEffectiveSessions(w,d);
    const resumo=sessions.filter(s=>s.type!==REST).map(s=>s.text+(s.dist?' '+s.dist:'')).join(' · ');
    new Notification('MYTRI — Treino de hoje',{
      body:resumo||'Dia de descanso. Recupere bem!',
      icon:'/favicon.ico'
    });
    // Reagendar para amanhã
    scheduleNotification();
  },ms);
}

// Iniciar scheduler se notificações ativas
if(localStorage.getItem('nano_notif')==='true'){
  setTimeout(scheduleNotification,1000);
}

// ── CALENDARIO ──
let calYear=new Date().getFullYear(), calMonth=new Date().getMonth();

// Dado um Date, retorna {w, d} do plano ou null se fora do plano
function getWDFromDate(date){
  const diff=Math.floor((date-PLAN_START)/(1000*60*60*24));
  if(diff<0||diff>=16*7)return null;
  const w=Math.floor(diff/7)+1;
  const d=diff%7; // SEG=0...DOM=6
  return{w,d};
}

function renderCalendario(){
  const container=document.getElementById('agenda-content')||document.getElementById('view-calendario');
  container.innerHTML='';
  const checks=loadChecks();
  const now=new Date();

  const firstDay=new Date(calYear,calMonth,1);
  const lastDay=new Date(calYear,calMonth+1,0);
  // isoWeekday: 1=Mon...7=Sun → we want Mon=0
  let startDow=firstDay.getDay(); // 0=Sun
  startDow=(startDow+6)%7; // convert: Mon=0

  const monthNames=['Janeiro','Fevereiro','Marco','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];

  // Header
  const header=document.createElement('div');header.className='cal-header';
  header.innerHTML=`
    <div>
      <div class="cal-month-title">${monthNames[calMonth]}</div>
      <div class="cal-year">${calYear}</div>
    </div>
    <div class="cal-nav-btns">
      <button class="nav-btn" onclick="calNav(-1)">&#8592;</button>
      <button class="nav-btn" onclick="calNav(1)">&#8594;</button>
    </div>`;
  container.appendChild(header);

  // Grid
  const grid=document.createElement('div');grid.className='cal-grid';

  // Weekday labels (Mon first)
  const wdRow=document.createElement('div');wdRow.className='cal-weekdays';
  ['SEG','TER','QUA','QUI','SEX','SAB','DOM'].forEach(d=>{
    const wd=document.createElement('div');wd.className='cal-wd';wd.textContent=d;wdRow.appendChild(wd);
  });
  grid.appendChild(wdRow);

  const daysGrid=document.createElement('div');daysGrid.className='cal-days';

  // Pad previous month days
  const prevMonth=new Date(calYear,calMonth,0);
  for(let i=startDow-1;i>=0;i--){
    const dayEl=document.createElement('div');dayEl.className='cal-day other-month';
    dayEl.innerHTML=`<div class="cal-day-num">${prevMonth.getDate()-i}</div>`;
    daysGrid.appendChild(dayEl);
  }

  // Current month days
  for(let day=1;day<=lastDay.getDate();day++){
    const date=new Date(calYear,calMonth,day);
    const isToday=date.toDateString()===now.toDateString();
    const isRace=date.toDateString()===RACE_DATE.toDateString();
    const wd=getWDFromDate(date);

    const dayEl=document.createElement('div');
    dayEl.className='cal-day'+(isToday?' today':'')+(isRace?' has-race':'');

    dayEl.innerHTML=`<div class="cal-day-num">${day}</div><div class="cal-bars"></div>`;
    const barsEl=dayEl.querySelector('.cal-bars');

    if(wd){
      const sessions=getEffectiveSessions(wd.w,wd.d);
      // Group by type, show max 5 bars
      const shown=sessions.slice(0,5);
      shown.forEach((sess,si)=>{
        const key=sess._origin==='plan'?ck(wd.w,wd.d,sess._si):null;
        const isDone=key?!!checks[key]:false;
        const bar=document.createElement('div');
        bar.className='cal-bar '+(isDone?'done':'planned');
        bar.style.background=colorMap[sess.type]||'#555';
        barsEl.appendChild(bar);
      });
    }else if(isRace){
      const bar=document.createElement('div');bar.className='cal-bar done';bar.style.background='#f0a500';barsEl.appendChild(bar);
    }

    // Tap → modal
    dayEl.addEventListener('click',()=>{
      if(dayEl.classList.contains('other-month'))return;
      showCalDayModal(date,wd,checks);
    });

    daysGrid.appendChild(dayEl);
  }

  // Pad next month
  const totalCells=startDow+lastDay.getDate();
  const remainder=totalCells%7===0?0:7-(totalCells%7);
  for(let i=1;i<=remainder;i++){
    const dayEl=document.createElement('div');dayEl.className='cal-day other-month';
    dayEl.innerHTML=`<div class="cal-day-num">${i}</div>`;
    daysGrid.appendChild(dayEl);
  }

  grid.appendChild(daysGrid);
  container.appendChild(grid);

  // Legenda
  const legend=document.createElement('div');legend.className='cal-legend';
  const legItems=[
    {color:'#1a6cf0',label:'Natacao'},
    {color:'#e05c2a',label:'Bike'},
    {color:'#00e676',label:'Corrida'},
    {color:'#9b6af0',label:'Musculacao'},
    {color:'#c8cad0',label:'Tenis'},
    {color:'#f0a500',label:'Tijolo'},
  ];
  legItems.forEach(({color,label})=>{
    const li=document.createElement('div');li.className='cal-leg-item';
    li.innerHTML=`<div class="cal-leg-dot" style="background:${color}"></div>${label}`;
    legend.appendChild(li);
  });
  container.appendChild(legend);
  _attachGenericSwipe(container,
    ()=>calNav(1),
    ()=>calNav(-1)
  );
}

function calNav(dir){
  calMonth+=dir;
  if(calMonth<0){calMonth=11;calYear--;}
  if(calMonth>11){calMonth=0;calYear++;}
  renderCalendario();
}

function showCalDayModal(date,wd,checks){
  const dayNames=['Domingo','Segunda','Terca','Quarta','Quinta','Sexta','Sabado'];
  const monthNames=['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
  const dow=dayNames[date.getDay()];
  const dateStr=`${dow}, ${date.getDate()} ${monthNames[date.getMonth()]} ${date.getFullYear()}`;
  const isRace=date.toDateString()===RACE_DATE.toDateString();

  const ov=document.createElement('div');ov.className='cal-modal-overlay';
  const modal=document.createElement('div');modal.className='cal-modal';

  // Head
  const head=document.createElement('div');head.className='cal-modal-head';
  head.innerHTML=`
    <div class="cal-modal-date">${dateStr.toUpperCase()}</div>
    <div class="cal-modal-title">${wd?'SEM '+wd.w+' &middot; '+['SEG','TER','QUA','QUI','SEX','SAB','DOM'][wd.d]:isRace?'DIA DA PROVA':'&mdash;'}</div>`;
  modal.appendChild(head);

  // Body
  const body=document.createElement('div');body.className='cal-modal-body';

  function buildRows(){
    body.innerHTML='';
    const currentChecks=loadChecks();

    if(isRace){
      body.innerHTML=`<div class="cal-sess-row">
        <div class="cal-sess-bar" style="background:#f0a500"></div>
        <div class="cal-sess-info">
          <div class="cal-sess-name">PROVA — SPRINT TRIATHLON</div>
          <div class="cal-sess-dist">750m · 20km · 5km</div>
        </div>
        <span class="cal-sess-status done">DIA DA PROVA</span>
      </div>`;
      return;
    }
    if(!wd){body.innerHTML=`<div class="cal-modal-empty">FORA DO PLANO</div>`;return;}

    const sessions=getEffectiveSessions(wd.w,wd.d);
    if(!sessions.length){body.innerHTML=`<div class="cal-modal-empty">DESCANSO</div>`;return;}

    sessions.forEach(sess=>{
      const key=sess._origin==='plan'
        ?ck(wd.w,wd.d,sess._si)
        :`ex_w${wd.w}_d${wd.d}_i${sess._idx}`;
      const isDone=!!currentChecks[key];
      const color=colorMap[sess.type]||'#555';

      const row=document.createElement('div');
      row.className='cal-sess-row';
      row.style.cursor='pointer';

      const distHtml=sess.type===GYM&&sess.note&&/^\d+$/.test(sess.note.trim())
        ?`<div class="cal-sess-dist">${sess.note.trim()} series</div>`
        :sess.dist?`<div class="cal-sess-dist">${sess.dist}</div>`:'';

      row.innerHTML=`
        <div class="cal-sess-bar" style="background:${color}"></div>
        <div class="cal-sess-info">
          <div class="cal-sess-name" style="${isDone?'text-decoration:line-through;opacity:.45':''}">${sess.text}</div>
          ${distHtml}
        </div>
        <span class="cal-sess-status ${isDone?'done':'open'}" style="cursor:pointer">${isDone?'FEITO':'ABERTO'}</span>`;

      // Toggle ao tocar na linha ou no badge
      row.addEventListener('click',()=>{
        const c=loadChecks();
        if(c[key])delete c[key];else c[key]=true;
        saveChecks(c);
        buildRows(); // re-renderiza as linhas
        // Atualizar calendário e stats em background
        renderCalendario();
        if(currentTab==='stats')renderStats();
      });

      body.appendChild(row);
    });
  }

  buildRows();
  modal.appendChild(body);

  const closeBtn=document.createElement('button');
  closeBtn.className='cal-modal-close';
  closeBtn.textContent='FECHAR';
  closeBtn.addEventListener('click',()=>ov.remove());
  modal.appendChild(closeBtn);

  ov.appendChild(modal);
  document.body.appendChild(ov);
  ov.addEventListener('click',(e)=>{if(e.target===ov)ov.remove();});
}

const STRAVA_CLIENT_ID='257886';

const STRAVA_REDIRECT=window.location.origin;

// Detectar se voltou do OAuth com código
async function stravaHandleOAuthCallback(){
  const params=new URLSearchParams(window.location.search);
  const code=params.get('code');
  if(!code)return;
  // Limpar URL
  window.history.replaceState({},'',window.location.pathname);
  // Trocar código por tokens
  try{
    const r=await fetch('https://www.strava.com/oauth/token',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        client_id:STRAVA_CLIENT_ID,
        client_secret:STRAVA_CLIENT_SECRET,
        code,
        grant_type:'authorization_code'
      })
    });
    const data=await r.json();
    if(data.access_token){
      const tokens={
        access_token:data.access_token,
        refresh_token:data.refresh_token,
        expires_at:data.expires_at,
        athlete:data.athlete
      };
      localStorage.setItem('strava_tokens',JSON.stringify(tokens));
      await sbSet('strava_tokens',tokens);
      showStravaStatus('Strava conectado! Sincronizando treinos...');
      await stravaSyncActivities();
    }
  }catch(e){console.error('Strava OAuth error',e);}
}

async function stravaGetValidToken(){
  let tokens=null;
  try{tokens=JSON.parse(localStorage.getItem('strava_tokens'));}catch(e){}
  if(!tokens&&_syncReady){tokens=await sbGet('strava_tokens');}
  if(!tokens)return null;
  // Refresh se expirado
  if(Date.now()/1000>tokens.expires_at-60){
    try{
      const r=await fetch('https://www.strava.com/oauth/token',{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({
          client_id:STRAVA_CLIENT_ID,
          client_secret:STRAVA_CLIENT_SECRET,
          refresh_token:tokens.refresh_token,
          grant_type:'refresh_token'
        })
      });
      const data=await r.json();
      tokens.access_token=data.access_token;
      tokens.expires_at=data.expires_at;
      localStorage.setItem('strava_tokens',JSON.stringify(tokens));
      await sbSet('strava_tokens',tokens);
    }catch(e){
      // Refresh falhou — limpar tokens
      localStorage.removeItem('strava_tokens');
      try{await sbSet('strava_tokens',null);}catch(_){}
      return null;
    }
  }
  return tokens.access_token;
}

async function stravaSyncActivities(){
  const token=await stravaGetValidToken();
  if(!token)return;
  try{
    // Buscar atividades desde 26/05/2026
    const after=Math.floor(new Date(PLAN_START_ISO).getTime()/1000);
    const r=await fetch(`https://www.strava.com/api/v3/athlete/activities?after=${after}&per_page=100`,{
      headers:{Authorization:'Bearer '+token}
    });
    const activities=await r.json();
    if(!Array.isArray(activities)){
      console.error('Strava resposta inesperada:',r.status,JSON.stringify(activities));
      if(r.status===429){
        localStorage.setItem('strava_rate_limit_until',(Date.now()+900000).toString()); // bloqueia por 15min
        showStravaStatus('Limite de requisições do Strava atingido. Aguarde 15 min e tente novamente.');
      }else if(r.status===401){
        localStorage.removeItem('strava_tokens');
        await sbSet('strava_tokens',null);
        renderStats();
        showStravaStatus('Sessão Strava expirada. Clique em CONECTAR para reconectar.');
      }else{
        showStravaStatus('Erro Strava ('+r.status+'): '+(activities.message||'resposta inesperada'));
      }
      return;
    }
    console.log('Strava activities:', activities.length, activities.map(a=>({date:a.start_date_local,type:a.sport_type||a.type,dist:a.distance})));

    let matched=0;
    const checks=loadChecks();

    // Cache de calorias — prioriza atividades de hoje e recentes sem cache
    let calCache={};
    try{calCache=JSON.parse(localStorage.getItem('nano_cal_cache')||'{}');}catch(e){}
    const todayStr=_localDateStr();
    const uncached=activities.filter(a=>calCache[a.id]===undefined);
    // Priorizar: hoje primeiro, depois mais recentes
    const todayUncached=uncached.filter(a=>(a.start_date_local||'').slice(0,10)===todayStr);
    const otherUncached=uncached.filter(a=>(a.start_date_local||'').slice(0,10)!==todayStr);
    const toFetchList=[...todayUncached,...otherUncached].slice(0,5);
    if(toFetchList.length>0){
      for(const toFetch of toFetchList){
        try{
          const dr=await fetch(`https://www.strava.com/api/v3/activities/${toFetch.id}`,{headers:{Authorization:'Bearer '+token}});
          if(dr.status===429){
            localStorage.setItem('strava_rate_limit_until',(Date.now()+900000).toString());
            break;
          }else if(dr.ok){
            const d=await dr.json();
            const cal=d.calories?Math.round(d.calories):d.kilojoules?Math.round(d.kilojoules/4.184):0;
            calCache[toFetch.id]=cal;
          }
        }catch(e){}
      }
      localStorage.setItem('nano_cal_cache',JSON.stringify(calCache));
    }

    for(const act of activities){

      // Usar start_date_local que já está no fuso do atleta
      const actDate=new Date(act.start_date_local);
      // Garantir que a data local está correta
      const localDateStr=act.start_date_local?act.start_date_local.slice(0,10):null;
      if(!localDateStr)continue;
      const localDate=new Date(localDateStr+'T12:00:00');
      const wd=getWDFromDate(localDate);
      if(!wd)continue;

      const actType=(act.sport_type||act.type||'').toLowerCase();
      const actDistKm=Math.round((act.distance||0)/100)/10;
      const actTime=act.moving_time?Math.round(act.moving_time/60)+'min':null;
      const actHR=act.average_heartrate?Math.round(act.average_heartrate)+'bpm':null;
      const _bpm=act.average_heartrate?Math.round(act.average_heartrate):0;
      const actZone=_bpm>=143?'Z4':_bpm>=125?'Z3':_bpm>=107?'Z2':_bpm>0?'Z1':null;
      const actElev=act.total_elevation_gain>5?Math.round(act.total_elevation_gain)+'m↑':null;
      const _cachedCal=calCache[act.id];
      const actCal=_cachedCal>0?_cachedCal+'kcal':act.calories?Math.round(act.calories)+'kcal':act.kilojoules?Math.round(act.kilojoules/4.184)+'kcal':null;
      // Pace para corrida (min/km), velocidade para bike (km/h)
      let actPace=null;
      if(actDistKm>0&&act.moving_time){
        if(actType.includes('run')){
          const minPerKm=act.moving_time/60/actDistKm;
          const min=Math.floor(minPerKm);
          const sec=Math.round((minPerKm-min)*60).toString().padStart(2,'0');
          actPace=`${min}:${sec}/km`;
        }else if(actType.includes('ride')){
          actPace=Math.round(actDistKm/(act.moving_time/3600)*10)/10+'km/h';
        }
      }
      // Fallback velocidade média para bike sem distância (ex: rolo sem sensor de velocidade)
      if(!actPace&&actType.includes('ride')&&act.average_speed&&act.average_speed>0){
        actPace=Math.round(act.average_speed*3.6*10)/10+'km/h';
      }

      // Mapear tipo Strava → nosso tipo
      let targetType=null;
      if(actType.includes('swim'))targetType=SWIM;
      else if(actType.includes('ride')||actType.includes('virtual'))targetType=BIKE;
      else if(actType.includes('run'))targetType=RUN;
      else if(actType.includes('weight')||actType==='workout')targetType=GYM;
      else if(actType.includes('tennis'))targetType=TENNIS;
      else if(actType==='pickleball')targetType=TENNIS;
      else if(actType==='walk'||actType.includes('walk')||actType.includes('hike'))targetType=RUN;
else if(actType.includes('ski')||actType.includes('snow')||actType.includes('surf')||actType.includes('yoga'))targetType=GYM;
      if(!targetType)continue;

      // Identificar se é indoor e calcular dados
      const actDistKmFmt=actDistKm>0.1?actDistKm+'km':null;
      // Natação sempre em metros
      const actDistSwimFmt=act.distance>10?Math.round(act.distance)+'m':null;
      const isIndoor=act.trainer===true||actType==='virtualride'||actType==='virtualrun'||actType==='workout';
      const isWalk=actType==='walk'||actType.includes('walk');

      // Construir linha sombreada por modalidade
      const hasElev=!isIndoor&&actElev;
      if(targetType===RUN||isWalk){
        // Corrida/caminhada: dist · pace · tempo · bpm · kcal [· elev se externo]
        realData=[actDistKmFmt,actPace,actTime,actHR,actCal,hasElev?actElev:null].filter(Boolean).join(' · ');
      }else if(targetType===BIKE){
        // Bike: dist · vel · tempo · bpm · kcal [· elev se externo]
        realData=[actDistKmFmt,actPace,actTime,actHR,actCal,hasElev?actElev:null].filter(Boolean).join(' · ');
      }else if(targetType===SWIM){
        // Natação: dist(m) · tempo · bpm · kcal
        realData=[actDistSwimFmt,actTime,actHR,actCal].filter(Boolean).join(' · ');
      }else if(targetType===GYM){
        // Musculação: tempo · bpm · kcal (repetições vêm do Garmin, não do Strava)
        realData=[actTime,actHR,actCal].filter(Boolean).join(' · ');
      }else if(targetType===TENNIS){
        // Tênis/Pickleball: dist · bpm · kcal
        realData=[actDistKmFmt,actHR,actCal].filter(Boolean).join(' · ');
      }else{
        // Ski/Snow: dist · vel · bpm · kcal · elev
        realData=[actDistKmFmt,actPace,actHR,actCal,hasElev?actElev:null].filter(Boolean).join(' · ');
      }
      const actName=act.sport_type||act.type||'';
      const actTitle=(act.name||'').toLowerCase();
      const nameMap={
        'Pickleball':'Pickleball','Pickleball ':'Pickleball','Tennis':'Tenis','Squash':'Squash','Badminton':'Badminton',
        'Skiing':'Ski','BackcountrySkiing':'Ski','NordicSki':'Ski Cross-Country',
        'Snowboard':'Snowboard','Snowshoe':'Snowshoe',
        'Surfing':'Surf','Yoga':'Yoga','Hike':'Trilha','Walk':'Caminhada','Hike':'Trilha',
        'WeightTraining':'Musculacao','Workout':'Treino Funcional',
        'Run':'Corrida','Ride':'Bike','VirtualRide':'Bike (Rolo)','Swim':'Natacao'
      };
      // Verificar também pelo título da atividade (ex: "Pickleball" no nome)
      let friendlyName=nameMap[actName]||typeLabels[targetType]||'Atividade';
      if(actTitle.includes('pickle'))friendlyName='Pickleball';
      else if(actTitle.includes('tenis')||actTitle.includes('tennis'))friendlyName='Tenis';
      else if(actTitle.includes('ski'))friendlyName='Ski';
      else if(actTitle.includes('snow'))friendlyName='Snowboard';

      // Encontrar sessão correspondente no plano e editar com dados reais
      let foundMatch=false;
      getEffectiveSessions(wd.w,wd.d).forEach(sess=>{
        // Ignorar extras criados pelo próprio Strava
        if(sess._origin==='extra'&&sess.note&&sess.note.includes('via Strava'))return;
        const typeMatch=sess.type===targetType
          ||(targetType===BIKE&&sess.type===BRICK)
          ||(targetType===RUN&&sess.type===BRICK);
        if(!typeMatch)return;
        const key=sess._origin==='plan'?ck(wd.w,wd.d,sess._si):`ex_w${wd.w}_d${wd.d}_i${sess._idx}`;
        if(!checks[key]){checks[key]=true;matched++;}
        if(sess._origin==='plan'&&realData){
          const o=loadOverrides();
          const ok=ovKey(wd.w,wd.d,sess._si);
          const existing=o[ok]||{};
          // Sempre sobrescreve dados do Strava com os mais recentes
          o[ok]={...existing,type:sess.type,stravaData:realData,stravaDist:targetType===SWIM?actDistSwimFmt:actDistKmFmt,stravaTime:actTime,stravaHR:actHR,stravaCal:actCal,stravaZone:actZone};
          saveOverrides(o);
        }
        foundMatch=true;
      });

      // Se não achou sessão do plano, atualizar extra existente ou criar novo
      if(!foundMatch&&wd){
        const label=friendlyName;
        const extraNote=[actPace,actTime,actHR,actElev].filter(Boolean).join(' · ');
        const existingExtras=getExtras(wd.w,wd.d);
        const existingIdx=existingExtras.findIndex(e=>e.type===targetType&&(e.text===label||e.manualLabel));
        // Para linha principal: tempo para tênis/musc, dist para resto
        const mainVal=(targetType===TENNIS||targetType===GYM)?actTime||'':targetType===SWIM?actDistSwimFmt||actTime||'':actDistKmFmt||actTime||'';
        if(existingIdx>=0){
          const e=loadExtras();const k=extraKey(wd.w,wd.d);
          const _hasManualLabel=e[k][existingIdx].manualLabel;
          e[k][existingIdx]={...e[k][existingIdx],dist:mainVal,note:realData,cal:actCal,stravaZone:actZone};
          // Preservar nome manual se o usuário editou
          if(_hasManualLabel){e[k][existingIdx].manualLabel=true;}
          saveExtras(e);
          checks[`ex_w${wd.w}_d${wd.d}_i${existingIdx}`]=true;
        }else{
          const extras=addExtra(wd.w,wd.d,{type:targetType,text:label,dist:mainVal,note:realData,cal:actCal,stravaZone:actZone});
          checks[`ex_w${wd.w}_d${wd.d}_i${extras.length-1}`]=true;
        }
        matched++;
      }
    }

    if(matched>0){
      saveChecks(checks);
      refreshHoje();
      renderStats();
      showStravaStatus(`${matched} treino(s) sincronizado(s) do Strava!`);
    }else{
      const total=activities.length;
      showStravaStatus(`Strava conectado. ${total} atividade(s) encontrada(s) mas nenhuma bateu com o plano de hoje.`);
    }
    // Salvar timestamp do último sync e atualizar display
    localStorage.setItem('strava_last_sync',Date.now().toString());
    renderStats();
  }catch(e){console.error('Strava sync error',e);}
}

async function runBikeFitAnalysis(){
  const btn=document.querySelector('#view-bikefit button');
  const result=document.getElementById('bf-result');
  btn.textContent='ANALISANDO...';
  btn.disabled=true;
  result.style.display='none';

  const get=id=>document.getElementById(id)?.value||'';
  const altura=get('bf-altura');
  const peso=get('bf-peso');
  const femur=get('bf-femur');
  const quadro=get('bf-quadro');
  const selim=get('bf-selim-atual');
  const guidao=get('bf-guidao-atual');
  const flex=get('bf-flex');
  const dor=get('bf-dor');
  const exp=get('bf-exp');
  const obs=get('bf-obs');

  if(!altura||!peso){
    btn.textContent='ANALISAR POSIÇÃO';btn.disabled=false;
    alert('Preencha ao menos altura e peso.');return;
  }

  const photoPreview=document.getElementById('bf-photo-preview');
  const photoB64=photoPreview.dataset.b64||null;

  const prompt=`Você é um especialista em bike fit para triathlon. Analise os dados abaixo e forneça recomendações detalhadas de ajuste de posição.

DADOS DO ATLETA:
- Altura: ${altura}cm
- Peso: ${peso}kg
- Comprimento do fêmur: ${femur||'não informado'}cm
- Flexibilidade: ${flex}
- Dores atuais: ${dor}
- Experiência: ${exp}

BIKE ATUAL:
- Quadro: ${quadro||'não informado'}cm
- Altura atual do selim: ${selim||'não informada'}cm
- Altura atual do guidão: ${guidao||'não informado'}cm
- Observações: ${obs||'nenhuma'}

${photoB64?'Uma foto do atleta pedalando de perfil foi anexada para análise visual.':'Sem foto disponível — analise apenas com os dados fornecidos.'}

Forneça:
1. Altura ideal do selim (fórmula LeMond e análise)
2. Recuo do selim
3. Altura e alcance do guidão
4. Posição dos cleats
5. Ajustes específicos para triathlon com aerobar
6. Pontos de atenção baseados nas dores relatadas

Seja específico com medidas (cm) e explique o porquê de cada ajuste. Responda em português.

IMPORTANTE: Responda em texto limpo, sem markdown, sem asteriscos, sem hashtags, sem emojis, sem tabelas. Use apenas texto simples. Para titulos use letras maiusculas seguidas de dois pontos. Exemplo: ALTURA DO SELIM:`;

  try{
    const resp=await fetch('/.netlify/functions/bike-fit',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({prompt,imageBase64:photoB64||null})
    });
    const data=await resp.json();
    if(!resp.ok)throw new Error(data.error||'Erro');
    const text=data.text||'';

    result.style.display='block';
    result.innerHTML=`
      <div style="background:var(--surface);border:1px solid var(--border);border-top:3px solid var(--accent);padding:20px;border-radius:4px">
        <div style="font-family:var(--font-ui);font-size:10px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin-bottom:20px">ANALISE BIKE FIT</div>
        <div id="bf-result-text" style="font-family:var(--font-body);font-size:14px;line-height:1.8;color:var(--text)"></div>
      </div>`;
    renderBikeFitText(document.getElementById('bf-result-text'),text);
  }catch(e){
    result.style.display='block';
    result.innerHTML=`<div style="color:#e05c2a;font-family:var(--font-ui);font-size:12px">Erro na análise. Tente novamente.</div>`;
  }

  btn.textContent='ANALISAR POSIÇÃO';
  btn.disabled=false;
}

}

function submitClubOnboard(){
  const nomeEl=document.getElementById('cl-nome');
  const idadeEl=document.getElementById('cl-idade');
  const nome=(nomeEl?.value||nomeEl?.defaultValue||'').trim();
  const idade=(idadeEl?.value||idadeEl?.defaultValue||'').trim();
  if(!nome||!idade){alert('Preencha nome e idade para continuar.');return;}
  const prof=getMytriProfile();
  const stravaTokens2=JSON.parse(localStorage.getItem('strava_tokens')||'{}');
  const athlete2=stravaTokens2.athlete||{};
  const shareEl=document.getElementById('cl-share-metrics');
  clubState.myProfile={
    name:nome,age:idade,
    city:document.getElementById('cl-cidade').value.trim(),
    pace:document.getElementById('cl-pace').value.trim(),
    ftp:document.getElementById('cl-ftp').value.trim(),
    swim:document.getElementById('cl-swim').value.trim(),
    nextRace:document.getElementById('cl-prova').value.trim(),
    bio:document.getElementById('cl-bio').value.trim(),
    busca:document.getElementById('cl-busca').value,
    photo:athlete2.profile||athlete2.profile_medium||prof.photo||'',
    weight:prof.weight||athlete2.weight||'',
    height:prof.altura||'',
    shareMetrics:shareEl?shareEl.checked:false,
  };
  clubState.step='swipe';
  clubState.currentIdx=0;
  saveClubState();
  renderClub();
}

function clubShareMetrics(){
  if(!clubState.myProfile)clubState.myProfile={};
  clubState.myProfile.shareMetrics=true;
  saveClubState();
  // Re-render do card atual para mostrar peso/altura
  const available=CLUB_PROFILES.filter(p=>!clubState.liked.includes(p.id)&&!clubState.passed.includes(p.id));
  const _busca=clubState.myProfile?.busca||getMytriProfile().busca||'A';
  const filtrado=available.filter(p=>_busca==='A'||p.gender===_busca);
  if(filtrado.length>0){
    const p=filtrado[clubState.currentIdx%filtrado.length];
    const card=document.getElementById('club-card');
    if(card&&p){
      // Apenas re-inserir o bloco de peso/altura
      const blocoOld=card.querySelector('[data-share-block]');
      if(blocoOld){
        blocoOld.outerHTML=`<div data-share-block style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px">
          <div style="background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:10px;text-align:center">
            <div style="font-family:var(--font-display);font-size:15px;color:var(--text)">${p.weight}kg</div>
            <div style="font-family:var(--font-ui);font-size:8px;color:var(--muted);letter-spacing:1px;margin-top:2px">PESO</div>
          </div>
          <div style="background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:10px;text-align:center">
            <div style="font-family:var(--font-display);font-size:15px;color:var(--text)">${p.height}cm</div>
            <div style="font-family:var(--font-ui);font-size:8px;color:var(--muted);letter-spacing:1px;margin-top:2px">ALTURA</div>
          </div>
        </div>`;
      } else {
        renderClub();
      }
    } else {
      renderClub();
    }
  } else {
    renderClub();
  }
}

      <div style="position:absolute;inset:0;background:linear-gradient(to bottom,transparent 30%,var(--bg) 100%)"></div>
      <button onclick="this.closest('[style*=fixed]').remove()" style="position:absolute;top:16px;left:16px;background:rgba(0,0,0,0.5);border:none;color:#fff;font-family:var(--font-ui);font-size:11px;letter-spacing:1px;padding:8px 14px;border-radius:4px;cursor:pointer">VOLTAR</button>
    </div>

          <div style="font-family:var(--font-ui);font-size:8px;color:var(--muted);letter-spacing:1px;margin-top:2px">PACE</div>
        </div>
        <div style="background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:12px;text-align:center">
          <div style="font-family:var(--font-display);font-size:18px;color:#e05c2a">${p.ftp}</div>
          <div style="font-family:var(--font-ui);font-size:8px;color:var(--muted);letter-spacing:1px;margin-top:2px">FTP</div>
        </div>
        <div style="background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:12px;text-align:center">
          <div style="font-family:var(--font-display);font-size:18px;color:#1a6cf0">${p.swim}</div>

        </div>
      </div>

      ${myShare?`
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px">
        <div style="background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:12px;text-align:center">
          <div style="font-family:var(--font-display);font-size:18px;color:var(--text)">${p.weight}kg</div>
          <div style="font-family:var(--font-ui);font-size:8px;color:var(--muted);letter-spacing:1px;margin-top:2px">PESO</div>
        </div>
        <div style="background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:12px;text-align:center">
          <div style="font-family:var(--font-display);font-size:18px;color:var(--text)">${p.height}cm</div>
          <div style="font-family:var(--font-ui);font-size:8px;color:var(--muted);letter-spacing:1px;margin-top:2px">ALTURA</div>
        </div>
      </div>`:''}

      <div style="background:rgba(26,108,240,0.1);border:1px solid rgba(26,108,240,0.25);border-radius:8px;padding:12px 16px;margin-bottom:16px">
        <div style="font-family:var(--font-ui);font-size:9px;color:#1a6cf0;letter-spacing:1.5px;margin-bottom:4px">PROXIMA PROVA</div>
        <div style="font-family:var(--font-body);font-size:13px;color:var(--text)">${p.nextRace}</div>
      </div>

      <div style="font-family:var(--font-body);font-size:14px;color:var(--muted2);line-height:1.7;margin-bottom:16px">${p.bio}</div>

      <div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:28px">
        ${p.tags.map(t=>`<span style="background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:5px 12px;font-family:var(--font-ui);font-size:9px;color:var(--muted2);letter-spacing:.5px">${t}</span>`).join('')}

function renderClubSwipe(c){
  const _busca=clubState.myProfile?.busca||getMytriProfile().busca||'A';
  const available=CLUB_PROFILES.filter(p=>!clubState.liked.includes(p.id)&&!clubState.passed.includes(p.id)&&(_busca==='A'||p.gender===_busca));

  // Header
  const hdr=document.createElement('div');
  hdr.style.cssText='display:flex;justify-content:space-between;align-items:center;padding:16px 20px 8px';
  hdr.innerHTML=`

      <div style="font-family:var(--font-display);font-size:22px;letter-spacing:1px">CLUBE DA <span style="color:#1a6cf0">MEIA AZUL</span></div>

    </div>
    <div onclick="clubState.step='profile';saveClubState();renderClub()" style="width:36px;height:36px;border-radius:50%;background:var(--surface);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg></div>`;

    return;
  }

  // Card de swipe

  const card=document.createElement('div');

    <div id="club-pass-overlay" style="position:absolute;top:24px;right:20px;opacity:0;transition:opacity .15s">
      <div style="border:3px solid #e05c2a;border-radius:8px;padding:6px 14px;transform:rotate(15deg)">
        <span style="font-family:var(--font-display);font-size:28px;color:#e05c2a;letter-spacing:2px">PASS</span>
      </div>
    </div>`;

  deck.appendChild(card);
  c.appendChild(deck);

  // Botões
  const btns=document.createElement('div');
  btns.style.cssText='display:flex;justify-content:center;gap:24px;padding:8px 24px 16px';
  btns.innerHTML=`
    <button onclick="clubAction('pass')" style="width:64px;height:64px;border-radius:50%;background:var(--surface);border:2px solid #e05c2a;color:#e05c2a;font-size:26px;cursor:pointer;display:flex;align-items:center;justify-content:center">✕</button>
    <button onclick="clubAction('like')" style="width:72px;height:72px;border-radius:50%;background:var(--accent);border:none;color:#000;font-size:28px;cursor:pointer;display:flex;align-items:center;justify-content:center">♥</button>`;
  c.appendChild(btns);

  // Swipe touch
  let sx=0,sy=0,dragging=false;
  card.addEventListener('touchstart',e=>{sx=e.touches[0].clientX;sy=e.touches[0].clientY;dragging=true;},{passive:true});
  card.addEventListener('touchmove',e=>{
    if(!dragging)return;
    const dx=e.touches[0].clientX-sx;
    const dy=e.touches[0].clientY-sy;
    if(Math.abs(dx)<Math.abs(dy))return;
    card.style.transform=`translateX(${dx}px) rotate(${dx*0.04}deg)`;
    card.style.transition='none';
    document.getElementById('club-like-overlay').style.opacity=dx>20?Math.min((dx-20)/60,1):0;
    document.getElementById('club-pass-overlay').style.opacity=dx<-20?Math.min((-dx-20)/60,1):0;
  },{passive:true});
  card.addEventListener('touchend',e=>{
    if(!dragging)return;dragging=false;
    const dx=e.changedTouches[0].clientX-sx;
    card.style.transition='transform .3s';
    if(dx>80){clubAction('like');}
    else if(dx<-80){clubAction('pass');}
    else{card.style.transform='translateX(0) rotate(0deg)';}
  });
}

function clubAction(action){
  const _busca=clubState.myProfile?.busca||getMytriProfile().busca||'A';
  const available=CLUB_PROFILES.filter(p=>!clubState.liked.includes(p.id)&&!clubState.passed.includes(p.id)&&(_busca==='A'||p.gender===_busca));
  const p=available[0];
  if(!p)return;

  const card=document.getElementById('club-card');
  if(card){
    card.style.transition='transform .35s,opacity .35s';
    card.style.transform=action==='like'?'translateX(120%) rotate(20deg)':'translateX(-120%) rotate(-20deg)';
    card.style.opacity='0';
  }

  setTimeout(()=>{
    if(action==='like'){
      clubState.liked.push(p.id);
      // 40% chance de match
      const isMatch=Math.random()<0.4;
      if(isMatch){
        clubState.matches.push(p.id);
        clubState.matchedWith=p;
        clubState.step='match';
        saveClubState();
        renderClub();
        return;
      }
    }else{
      clubState.passed.push(p.id);
    }
    saveClubState();
    renderClub();
  },350);
}

function init(){
  try{updateCycleBadge();}catch(e){console.error('badge',e);}
  try{updateCountdown();}catch(e){console.error('countdown',e);}
  try{renderHoje();}catch(e){
    console.error('renderHoje',e);
    var el=document.getElementById('agenda-content')||document.getElementById('view-hoje');
    if(el)el.innerHTML='<div style="padding:20px;color:red;font-size:12px">Erro: '+e.message+'</div>';
  }
  // Inicializar sync com Supabase em background
  sbInit().then(async()=>{
    if(_syncReady){
      renderHoje();
      updateCycleBadge();
      updateCountdown();
    }
    // Verificar callback OAuth do Strava
    await stravaHandleOAuthCallback();
    // Auto-sync Strava a cada abertura (se conectado e último sync >1h)
    const lastSync=parseInt(localStorage.getItem('strava_last_sync')||'0');
    const rateLimitUntil=parseInt(localStorage.getItem('strava_rate_limit_until')||'0');
    const isRateLimited=Date.now()<rateLimitUntil;
    if(!isRateLimited&&Date.now()-lastSync>3600000){
      const token=await stravaGetValidToken();
      if(token)stravaSyncActivities();
    }
    if(isRateLimited){showStravaStatus('Limite Strava ativo. Aguarde ou clique em RESETAR LIMITE.');}
    // Resumo semanal aos sábados
    setTimeout(checkWeeklySummary,1500);
  });
}
if(document.readyState==='loading'){document.addEventListener('DOMContentLoaded',init);}else{init();}



// ── GPS LOCATION ──
async function resetCity(){
  try{
    localStorage.removeItem('mytri_gps_city');
    const saved=JSON.parse(localStorage.getItem('mytri_profile')||'{}');
    delete saved.city;
    localStorage.setItem('mytri_profile',JSON.stringify(saved));
    await sbSet('mytri_profile',saved);
  }catch(e){}
  const el=document.getElementById('profile-city-display');
  if(el)el.textContent='Detectando...';
  detectGPSLocation(true);
}

function detectGPSLocation(force){
  if(!navigator.geolocation){
    const el=document.getElementById('profile-city-display');
    if(el)el.textContent='GPS indisponivel';
    return;
  }
  const isInvalid=c=>!c||c==='Centro, Brazil'||c==='Centro'||c==='Brazil'||c==='Brasil'||c.startsWith('Centro,');
  try{
    const saved=JSON.parse(localStorage.getItem('mytri_profile')||'{}');
    if(isInvalid(saved.city)){
      delete saved.city;
      localStorage.setItem('mytri_profile',JSON.stringify(saved));
      sbSet('mytri_profile',saved).catch(()=>{});
    }
  }catch(e){}
  const el=document.getElementById('profile-city-display');
  if(el)el.textContent='Aguardando GPS...';
  navigator.geolocation.getCurrentPosition(async pos=>{
    if(el)el.textContent='GPS ok, buscando...';
    try{
      const {latitude:lat,longitude:lon}=pos.coords;
      const r=await fetch(`https://api.bigdatacloud.net/data/reverse-geocode-client?latitude=${lat}&longitude=${lon}&localityLanguage=pt`);
      const d=await r.json();
      const adm=d.localityInfo?.administrative||[];
      const bairro=adm.find(a=>a.order===11)?.name||adm.find(a=>a.order===10)?.name||d.locality||'';
      const cidade=adm.find(a=>a.order===10)?.name||d.city||'';
      const loc=bairro&&cidade&&bairro!==cidade?`${bairro}, ${cidade}`:cidade||bairro||'';
      if(loc){
        localStorage.setItem('mytri_gps_city',loc);
        const saved=JSON.parse(localStorage.getItem('mytri_profile')||'{}');
        saved.city=loc;
        localStorage.setItem('mytri_profile',JSON.stringify(saved));
        sbSet('mytri_profile',saved).catch(()=>{});
        if(el)el.textContent=loc;
        refreshHoje();
      }
      if(el)el.textContent=loc||'Sem bairro';
    }catch(e){
      if(el)el.textContent='Erro API: '+e.message;
    }
  },err=>{
    if(el)el.textContent='Erro GPS: '+err.message;
  },{timeout:10000,enableHighAccuracy:true});
}

// ── PERFIL CENTRAL ──
async function syncProfileFromSupabase(){
  if(localStorage.getItem('mytri_ob_just_saved')){return;}
  try{
    const remote=await sbGet('mytri_profile');
    if(remote&&Object.keys(remote).length>0){
      const local=JSON.parse(localStorage.getItem('mytri_profile')||'{}');
      const isInvalidCity=c=>!c||c==='Centro, Brazil'||c==='Centro'||c==='Brazil'||c==='Brasil'||c.startsWith('Centro,');
      // Não sobrescreve se local tem dados do onboarding mais recentes (tem sport e raceDist)
      if(local.sport&&local.raceDist&&remote.sport!==local.sport){
        // Local tem dados mais recentes do onboarding — ignorar remoto
        // Mas atualiza o Supabase com o local
        sbSet('mytri_profile',local).catch(()=>{});
        return;
      }
      if(isInvalidCity(remote.city)&&!isInvalidCity(local.city)){remote.city=local.city;}
      if(isInvalidCity(remote.city)){delete remote.city;}
      // Preserva sport/raceDist locais se existirem
      if(local.sport)remote.sport=local.sport;
      if(local.raceDist)remote.raceDist=local.raceDist;
      if(local.pace)remote.pace=local.pace;
      if(local.ftp)remote.ftp=local.ftp;
      if(local.swim)remote.swim=local.swim;
      if(local.age)remote.age=local.age;
      if(local.weight)remote.weight=local.weight;
      if(local.nextRace)remote.nextRace=local.nextRace;
      localStorage.setItem('mytri_profile',JSON.stringify(remote));
      refreshHoje();
    }
  }catch(e){}
}

function getMytriProfile(){
  const stravaTokens=JSON.parse(localStorage.getItem('strava_tokens')||'{}');
  const athlete=stravaTokens.athlete||{};
  const saved=JSON.parse(localStorage.getItem('mytri_profile')||'{}');
  const gpsCity=localStorage.getItem('mytri_gps_city')||'';
  const badCities=['Centro, Brazil','Centro','Brazil','Brasil'];
  const savedCity=saved.city&&!badCities.some(b=>saved.city===b||saved.city.startsWith('Centro,'))?saved.city:'';
  const stravaCity=athlete.city&&!badCities.some(b=>athlete.city===b||athlete.city.startsWith('Centro'))&&athlete.city.length>3?athlete.city:'';
  return {
    ...saved, // todos os campos do obFinish
    name:saved.name||(athlete.firstname&&athlete.lastname?`${athlete.firstname} ${athlete.lastname}`:''),
    city:savedCity||gpsCity||stravaCity||'',
    photo:saved.photo||athlete.profile||athlete.profile_medium||'',
    weight:saved.weight||String(athlete.weight||'')||'',
    age:saved.age||String(athlete.age||'')||'',
    bio:saved.bio||'',
    pace:saved.pace||'',
    ftp:saved.ftp||'',
    swim:saved.swim||'',
    nextRace:saved.nextRace||'',
    interests:saved.interests||'',
    busca:saved.busca||'A',
    sport:saved.sport||'triathlon',
    raceDist:saved.raceDist||'sprint',
    raceDate:saved.raceDate||'',
    goalTime:saved.goalTime||'',
    weeklyHours:saved.weeklyHours||'3-4',
    diasDisponiveis:saved.diasDisponiveis||[],
    altura:saved.altura||String(athlete.height||''),
  };
}

function saveMytriProfile(data){
  localStorage.setItem('mytri_profile',JSON.stringify(data));
  // Sync to Supabase
  sbSet('mytri_profile',data).catch(()=>{});
  // Sync to club profile too
  if(clubState.myProfile){
    clubState.myProfile={...clubState.myProfile,...data};
    saveClubState();
  }
}

function resetOnboarding(){

  obStep=0;
  obData={};
  closeProfile();
  showOnboarding();
}

function resetClubTerms(){
  if(!confirm('Resetar o Clube da Meia Azul?'))return;
  clubState={step:'onboard',myProfile:null,currentIdx:0,liked:[],passed:[],matches:[],matchedWith:null,dragStart:null};
  localStorage.removeItem('mytri_club');
  localStorage.removeItem('mytri_club_terms');
  closeProfile();
}

function resetFitTerms(){
  if(!confirm('Resetar aviso do Bike Fit?'))return;
  localStorage.removeItem('mytri_fit_terms');
  closeProfile();
  alert('Aviso do Bike Fit resetado.');
}

function changeProfilePhoto(){
  document.getElementById('profile-photo-input').click();
}

function handleProfilePhoto(e){
  const file=e.target.files[0];
  if(!file)return;
  const reader=new FileReader();
  reader.onload=ev=>{
    const prof=getMytriProfile();
    prof.photo=ev.target.result;
    saveMytriProfile(prof);
    renderProfile();
    refreshHoje();
  };
  reader.readAsDataURL(file);
}


function addExtraPhoto(){
  document.getElementById('profile-extra-photo-input').click();
}

function handleExtraPhoto(e){
  const file=e.target.files[0];
  if(!file)return;
  const reader=new FileReader();
  reader.onload=ev=>{
    const prof=getMytriProfile();
    if(!prof.photos)prof.photos=[];
    prof.photos.push(ev.target.result);
    saveMytriProfile(prof);
    renderProfile();
  };
  reader.readAsDataURL(file);
}

function removeProfilePhoto(idx){
  const prof=getMytriProfile();
  if(prof.photos){prof.photos.splice(idx,1);}
  saveMytriProfile(prof);
  renderProfile();
}

function submitProfile(){

function loadAllStravaData(){
  // Combina overrides (sessões do plano com Strava) e extras (atividades não planejadas)
  const ovs=loadOverrides();
  const extras=loadExtras();
  const all=[];
  Object.values(ovs).forEach(o=>{if(o.stravaData)all.push(o);});
  Object.values(extras).forEach(arr=>{
    (arr||[]).forEach(e=>{if(e.stravaDist||e.dist)all.push({
      type:e.type,
      stravaData:e.note||e.text||'extra',
      stravaDist:e.stravaDist||e.dist||'',
      stravaTime:e.stravaTime||'',
      stravaHR:e.stravaHR||'',
      stravaCal:e.stravaCal||e.cal||'',
    });});
  });
  return all;
}

function calcPRs(){
  const ovs=loadOverrides();
  Object.values(ovs).forEach(o=>{
    if(!o.stravaData)return;
    prs.totalSessions++;
    if(o.stravaDist){
      const dist=parseFloat(o.stravaDist)||0;
      if(o.type==='run'&&dist>prs.longestRun)prs.longestRun=dist;
      if(o.type==='bike'&&dist>prs.longestBike)prs.longestBike=dist;
    }
    if(o.stravaHR){
      const hr=parseInt(o.stravaHR)||0;
      if(hr>0&&hr<prs.bestHR)prs.bestHR=hr;
    }
    if(o.stravaData&&o.type==='run'&&o.stravaDist&&o.stravaTime){
      // pace = time/dist
      const dist=parseFloat(o.stravaDist)||0;
      const timeStr=o.stravaTime||'';
      const parts=timeStr.match(/(\d+)h\s*(\d+)min|(\d+)min/);
      if(parts&&dist>0){
        let mins=parts[1]?parseInt(parts[1])*60+parseInt(parts[2]):parseInt(parts[3]);
        const pace=mins/dist;
        if(!prs.bestPaceRun||pace<prs.bestPaceRun){prs.bestPaceRun=pace;prs.bestPaceRunDist=dist;}
      }
    }
  });
  return prs;
}

async function checkOnboarding(){
  let done=localStorage.getItem('mytri_onboard_done');
  if(!done){
    try{
      const remote=await sbGet('mytri_onboard_done');
      if(remote){
        localStorage.setItem('mytri_onboard_done','1');
        done='1';
      }
    }catch(e){}
  }
  if(!done)showOnboarding();
}

function showOnboarding(){
  obStep=0;
  obData={sport:null,raceDist:null,goalTime:null,swimLevel:'beginner',bikeLevel:'beginner',runLevel:'beginner',weeklyHours:null,fcMax:'',ftp:'',diasDisponiveis:[]};
  const el=document.getElementById('view-onboard');
  el.classList.add('active');
  renderOnboarding();
}

function obProgress(step,total){
  return Array.from({length:total},(_,i)=>`<div class="ob-progress-bar ${i<step?'done':''}"></div>`).join('');
}

function renderOnboarding(){
  const el=document.getElementById('view-onboard');
  el.innerHTML='';
  const screens=[
    renderObWelcome,
    renderObEsporte,
    renderObDistancia,
    renderObProva,
    renderObMeta,
    renderObModalidades,
    renderObFitness,
    renderObHoras,
    renderObDias,
    renderObStrava,
    renderObFim,
  ];
  if(obStep>=screens.length){obFinish();return;}
  const totalBars=screens.length-1;
  const prog=`<div class="ob-progress">${obProgress(obStep,totalBars)}</div>`;
  const back=obStep>0?`<button onclick="obBack()" style="position:absolute;top:52px;left:20px;background:none;border:none;color:var(--muted2);font-size:22px;cursor:pointer;z-index:10">&#8592;</button>`:'';
  el.innerHTML=prog+back+`<div id="ob-screen-wrap" style="flex:1;display:flex;flex-direction:column;overflow-y:auto"></div>`;
  screens[obStep](document.getElementById('ob-screen-wrap'));
}

  renderOnboarding();
}

  // Bloqueia sync do Supabase por 30s para não sobrescrever dados novos
  localStorage.setItem('mytri_ob_just_saved','1');

}

async function showPlanSummary(profile){
  const el=document.getElementById('view-plan-summary');

  // Show loading
  el.innerHTML=`

    </div>`;

  try{
    const resp=await fetch('/.netlify/functions/plan-summary',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({profile})
    });

  }
}

function renderPlanSummary(el,profile,text){
  const dist={
    'super-sprint':'Super Sprint',
    'sprint':'Sprint',
    'olimpico':'Olimpico',
    'half':'Half Ironman 70.3',
    'full':'Ironman Full'
  }[profile.raceDist||profile.distancia]||'Sprint';

  const daysToRace=profile.raceDate?Math.max(0,Math.round((new Date(profile.raceDate+'T12:00:00')-new Date())/(1000*60*60*24))):'?';

  // Strip markdown completamente
  function stripMd(s){
    if(!s)return '';
    return s
      .replace(/#{1,4}\s*/g,'')
      .replace(/\*\*([^*]+)\*\*/g,'$1')
      .replace(/\*([^*]+)\*/g,'$1')
      .replace(/^[-—–]\s*/gm,'')
      .replace(/\s*—\s*##[^#\n]*/g,'')
      .replace(/\s*—+\s*/g,' ')
      .replace(/`/g,'')
      .trim();
  }

  // Parse sections — suporta formatos variados do Haiku
  function extractSection(titles){
    const t=titles instanceof Array?titles:[titles];
    for(const title of t){
      const escaped=title.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');
      // Tenta com ** ao redor também
      const variants=[escaped,'\\*\\*'+escaped+'\\*\\*'];
      for(const v of variants){
        const re=new RegExp('(?:'+v+')[:\\s]*\\n([\\s\\S]*?)(?=\\n(?:\\*\\*)?[A-ZÁÉÍÓÚÀÂÊÔÃÕ]{3}|$)','i');
        const m=text.match(re);
        if(m&&m[1].trim())return stripMd(m[1]);
      }
    }
    return '';
  }

  const visao=extractSection(['VISÃO GERAL','VISAO GERAL','VISAO']);
  const critico=extractSection(['PONTO CRÍTICO','PONTO CRITICO']);
  const fases=extractSection(['FASES DO PLANO','FASES']);
  const estrategia=extractSection(['ESTRATÉGIA DE PROVA','ESTRATEGIA DE PROVA','ESTRATEGIA']);
  const mensagem=extractSection(['MENSAGEM DO COACH','MENSAGEM']);

  // Se parsing falhou (texto existe mas seções não extraíram), exibe o texto limpo inteiro
  const anySection=visao||critico||fases||estrategia||mensagem;

  el.innerHTML=`
    <div style="padding:52px 20px 16px;border-bottom:1px solid var(--border);background:var(--surface)">
      <div style="font-family:var(--font-ui);font-size:10px;color:var(--accent);letter-spacing:2px;margin-bottom:8px">SEU PLANO MYTRI</div>
      <div style="font-family:var(--font-display);font-size:28px;letter-spacing:1px;line-height:1.1;margin-bottom:8px">${profile.raceName||dist}</div>
      <div style="display:flex;gap:16px;margin-top:12px">
        <div style="text-align:center">
          <div style="font-family:var(--font-display);font-size:32px;color:var(--accent)">${daysToRace}</div>
          <div style="font-family:var(--font-ui);font-size:9px;color:var(--muted);letter-spacing:1px">DIAS</div>
        </div>
        <div style="width:1px;background:var(--border)"></div>
        <div style="text-align:center">
          <div style="font-family:var(--font-display);font-size:32px;color:var(--text)">${dist}</div>
          <div style="font-family:var(--font-ui);font-size:9px;color:var(--muted);letter-spacing:1px">DISTANCIA</div>
        </div>
        ${profile.goalTime?`<div style="width:1px;background:var(--border)"></div>
        <div style="text-align:center">
          <div style="font-family:var(--font-display);font-size:32px;color:var(--text)">${profile.goalTime}</div>
          <div style="font-family:var(--font-ui);font-size:9px;color:var(--muted);letter-spacing:1px">META</div>
        </div>`:''}
      </div>
    </div>

    ${anySection?`
    ${visao?`<div class="plan-section">
      <div class="plan-section-title">VISAO GERAL</div>
      <div class="plan-section-body">${visao}</div>
    </div>`:''}
    ${critico?`<div class="plan-section">
      <div class="plan-section-title">PONTO CRITICO</div>
      <div class="plan-section-body">${critico}</div>
    </div>`:''}
    ${fases?`<div class="plan-section">
      <div class="plan-section-title">FASES DO PLANO</div>
      <div style="margin-top:4px">
        ${fases.split('\n').filter(l=>l.trim().length>2).map(l=>`
          <div class="plan-phase">
            <div class="plan-phase-dot"></div>
            <div class="plan-section-body" style="margin:0">${l.trim()}</div>
          </div>`).join('')}
      </div>
    </div>`:''}
    ${estrategia?`<div class="plan-section">
      <div class="plan-section-title">ESTRATEGIA DE PROVA</div>
      <div class="plan-section-body">${estrategia}</div>
    </div>`:''}
    ${mensagem?`<div class="plan-section" style="padding-bottom:16px">
      <div style="background:rgba(0,230,118,.08);border:1px solid rgba(0,230,118,.2);border-radius:6px;padding:16px;margin-top:8px">
        <div style="font-family:var(--font-ui);font-size:9px;color:var(--accent);letter-spacing:2px;margin-bottom:8px">MENSAGEM DO COACH</div>
        <div style="font-family:var(--font-body);font-size:14px;color:var(--text);line-height:1.7">${mensagem}</div>
      </div>
    </div>`:''}
    `:fallbackText?`<div class="plan-section"><div class="plan-section-body">${fallbackText.split('\n').filter(l=>l.trim()).join('</div><div class="plan-section-body" style="margin-top:10px">')}</div></div>`
    :`<div class="plan-section"><div class="plan-section-body">Plano criado com base no seu perfil. Boa sorte na prova!</div></div>`}

    <div style="padding:20px 20px 40px">
      <button onclick="closePlanSummary()" style="width:100%;padding:18px;background:var(--accent);color:#000;font-family:var(--font-ui);font-size:14px;font-weight:700;letter-spacing:2px;border:none;border-radius:4px;cursor:pointer">ENTRAR NO MYTRI</button>
    </div>`;
}

function closePlanSummary(){
  document.getElementById('view-plan-summary').classList.remove('active');
  renderAgenda();
}


function renderBikeFitText(el, text){
  const clean = text
    .replace(/#{1,3}\s*/g,'')
    .replace(/\*\*/g,'')
    .replace(/\*/g,'')
    .replace(/`/g,'')
    .replace(/\|[-| :]+\|/g,'')
    .replace(/\|/g,' ');

  const lines = clean.split('\n');
  let html = '';
  lines.forEach(function(line){
    const t = line.trim();
    if(!t){ html += '<div style="height:10px"></div>'; return; }
    if(/^[A-ZÀ-Ü][A-ZÀ-Ü\s\.0-9]{3,}:$/.test(t)){
      html += '<div style="font-family:var(--font-ui);font-size:11px;color:var(--accent);letter-spacing:2px;margin:20px 0 10px;padding-top:14px;border-top:1px solid var(--border)">'+t.replace(':','')+'</div>';
    } else if(t.charAt(0)==='-'){
      html += '<div style="padding-left:14px;margin-bottom:6px;color:var(--muted2);border-left:2px solid var(--border);padding-left:12px;margin-left:4px">'+t.substring(1).trim()+'</div>';
    } else {
      html += '<div style="margin-bottom:6px">'+t+'</div>';
    }
  });
  el.innerHTML = html;
}
