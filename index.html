function openCompleteSession(w,d,si,key){
  const sessions=getEffectiveSessions(w,d);
  const sess=sessions.find(s=>s._origin==='plan'&&s._si===si)||sessions[si]||sessions[0];
  if(!sess){ _commitComplete(key); return; }

  const typeLabels={swim:'NATAÇÃO',bike:'BIKE',run:'CORRIDA',brick:'TIJOLO',gym:'FORÇA',rest:'DESCANSO'};
  const color=(typeof colorMap!=='undefined'&&colorMap[sess.type])||'#00e676';
  const strava=_findStravaMatch(w,d,si);
  const m=_completeModalEl();

  // Campos por modalidade
  const isSwim=sess.type==='swim';
  const isSupport=sess.type==='FORCE'||/Força|Força|Core|Mobilidade|Alongamento/i.test(sess.text||'');
  const distLabel=isSwim?'Distancia (m)':'Distancia (km)';
  const paceLabel=sess.type==='bike'?'Velocidade média (km/h)':'Pace medio (min/km)';

  const zoneOpts=['Z1','Z2','Z3','Z4'].map(z=>`<button type="button" class="cmp-zone" data-zone="${z}" onclick="_cmpSelZone(this,'${z}')" style="flex:1;padding:10px 4px;background:var(--surface);border:1.5px solid var(--border);color:var(--muted2);font-family:var(--font-ui);font-size:11px;font-weight:700;border-radius:6px;cursor:pointer">${z}</button>`).join('');

  const senseOpts=[['Fácil','😌'],['Moderado','💪'],['Forte','🔥'],['Máximo','⚡']].map(([t])=>`<button type="button" class="cmp-sense" data-sense="${t}" onclick="_cmpSelSense(this,'${t}')" style="flex:1;padding:10px 4px;background:var(--surface);border:1.5px solid var(--border);color:var(--muted2);font-family:var(--font-ui);font-size:10px;font-weight:700;border-radius:6px;cursor:pointer">${t}</button>`).join('');

  const stravaBanner = strava ? `
    <div style="background:rgba(252,76,2,0.1);border:1px solid rgba(252,76,2,0.35);border-radius:10px;padding:12px 14px;margin-bottom:16px">
      <div style="font-family:var(--font-ui);font-size:9px;color:#fc4c02;letter-spacing:1.5px;margin-bottom:4px">DADOS DO STRAVA ENCONTRADOS</div>
      <div style="font-family:var(--font-body);font-size:13px;color:var(--text)">${strava.stravaData||strava.stravaDist||''}</div>
      <div style="font-family:var(--font-body);font-size:11px;color:var(--muted2);margin-top:6px">Estes dados reais serao usados no treino. Você pode ajustar abaixo se quiser.</div>
    </div>` : `
    <div style="font-family:var(--font-body);font-size:12px;color:var(--muted2);margin-bottom:16px;line-height:1.5">Preencha os dados do treino que você realizou. Eles substituem os valores sugeridos e alimentam seu report.</div>`;

  // Pre-preenche do strava quando houver
  const pv=(k)=>{ if(!strava||!strava.stravaData) return ''; return ''; };

  m.innerHTML=`
    <div style="background:var(--surface);border-top:1px solid var(--border);border-radius:16px 16px 0 0;width:100%;max-height:88vh;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:0 0 40px">
      <div style="position:sticky;top:0;background:var(--surface);padding:20px 22px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;z-index:1">
        <div>
          <div style="font-family:var(--font-ui);font-size:10px;color:${color};letter-spacing:2px;margin-bottom:4px">CONCLUIR ${typeLabels[sess.type]||''}</div>
          <div style="font-family:var(--font-display);font-size:22px;color:var(--text);line-height:1">${sess.text||''}</div>
        </div>
        <button onclick="closeCompleteSession()" style="background:none;border:none;color:var(--muted2);font-size:26px;cursor:pointer;line-height:1;padding:0 4px">&times;</button>
      </div>
      <div style="padding:18px 22px 0">
        ${stravaBanner}
        ${isSupport?`
        <div style="display:flex;gap:10px;margin-bottom:14px">
          <div style="flex:1"><div style="font-family:var(--font-ui);font-size:9px;color:var(--muted);letter-spacing:1px;margin-bottom:5px">TEMPO (min)</div><input id="cmp-time" type="number" inputmode="numeric" placeholder="ex: 45" style="width:100%;background:var(--bg);border:1px solid var(--border);color:var(--text);font-family:var(--font-body);font-size:15px;padding:11px;border-radius:6px"></div>
          <div style="flex:1"><div style="font-family:var(--font-ui);font-size:9px;color:var(--muted);letter-spacing:1px;margin-bottom:5px">FC MEDIA (bpm) — opcional</div><input id="cmp-hr" type="number" inputmode="numeric" placeholder="ex: 120" style="width:100%;background:var(--bg);border:1px solid var(--border);color:var(--text);font-family:var(--font-body);font-size:15px;padding:11px;border-radius:6px"></div>
        </div>
        `:`
        <div style="display:flex;gap:10px;margin-bottom:14px">
          <div style="flex:1"><div style="font-family:var(--font-ui);font-size:9px;color:var(--muted);letter-spacing:1px;margin-bottom:5px">TEMPO (min)</div><input id="cmp-time" type="number" inputmode="numeric" placeholder="ex: 45" style="width:100%;background:var(--bg);border:1px solid var(--border);color:var(--text);font-family:var(--font-body);font-size:15px;padding:11px;border-radius:6px"></div>
          <div style="flex:1"><div style="font-family:var(--font-ui);font-size:9px;color:var(--muted);letter-spacing:1px;margin-bottom:5px">${distLabel.toUpperCase()}</div><input id="cmp-dist" type="number" inputmode="decimal" step="0.1" placeholder="${isSwim?'ex: 1000':'ex: 10'}" style="width:100%;background:var(--bg);border:1px solid var(--border);color:var(--text);font-family:var(--font-body);font-size:15px;padding:11px;border-radius:6px"></div>
        </div>
        <div style="display:flex;gap:10px;margin-bottom:14px">
          <div style="flex:1"><div style="font-family:var(--font-ui);font-size:9px;color:var(--muted);letter-spacing:1px;margin-bottom:5px">${paceLabel.toUpperCase()}</div><input id="cmp-pace" type="text" placeholder="${sess.type==='bike'?'ex: 30':'ex: 5:30'}" style="width:100%;background:var(--bg);border:1px solid var(--border);color:var(--text);font-family:var(--font-body);font-size:15px;padding:11px;border-radius:6px"></div>
          <div style="flex:1"><div style="font-family:var(--font-ui);font-size:9px;color:var(--muted);letter-spacing:1px;margin-bottom:5px">FC MEDIA (bpm)</div><input id="cmp-hr" type="number" inputmode="numeric" placeholder="ex: 135" style="width:100%;background:var(--bg);border:1px solid var(--border);color:var(--text);font-family:var(--font-body);font-size:15px;padding:11px;border-radius:6px"></div>
        </div>
        <div style="margin-bottom:14px"><div style="font-family:var(--font-ui);font-size:9px;color:var(--muted);letter-spacing:1px;margin-bottom:5px">FC MAX (bpm) — opcional</div><input id="cmp-hrmax" type="number" inputmode="numeric" placeholder="ex: 165" style="width:100%;background:var(--bg);border:1px solid var(--border);color:var(--text);font-family:var(--font-body);font-size:15px;padding:11px;border-radius:6px"></div>
        ${sess.type==='bike'?`<div style="margin-bottom:14px"><div style="font-family:var(--font-ui);font-size:9px;color:var(--muted);letter-spacing:1px;margin-bottom:5px">POTENCIA MEDIA (watts) — opcional</div><input id="cmp-watts" type="number" inputmode="numeric" placeholder="ex: 210" style="width:100%;background:var(--bg);border:1px solid var(--border);color:var(--text);font-family:var(--font-body);font-size:15px;padding:11px;border-radius:6px"><div style="font-family:var(--font-body);font-size:11px;color:var(--muted2);margin-top:5px;line-height:1.4">Se você treina com medidor de potencia, informe a média. Deixa a analise do treino mais precisa que só a FC.</div></div>`:''}
        <div style="margin-bottom:14px">
          <div style="font-family:var(--font-ui);font-size:9px;color:var(--muted);letter-spacing:1px;margin-bottom:6px">ZONA FC PREDOMINANTE</div>
          <div style="display:flex;gap:8px">${zoneOpts}</div>
        </div>
        `}
        <div style="margin-bottom:20px">
          <div style="font-family:var(--font-ui);font-size:9px;color:var(--muted);letter-spacing:1px;margin-bottom:6px">COMO FOI O ESFORCO?</div>
          <div style="display:flex;gap:8px">${senseOpts}</div>
        </div>
        <button onclick="_saveComplete(${w},${d},${si},'${key}')" style="width:100%;padding:16px;background:var(--accent);color:#000;font-family:var(--font-ui);font-size:13px;font-weight:700;letter-spacing:2px;border:none;border-radius:6px;cursor:pointer;margin-bottom:10px">CONCLUIR TREINO</button>
        <button onclick="_saveComplete(${w},${d},${si},'${key}',true)" style="width:100%;padding:12px;background:transparent;color:var(--muted2);font-family:var(--font-ui);font-size:11px;letter-spacing:1px;border:1px solid var(--border);border-radius:6px;cursor:pointer">MARCAR SEM DADOS</button>
      </div>
    </div>`;
  m.style.display='flex';
  m.onclick=(e)=>{ if(e.target===m) closeCompleteSession(); };
  // Reseta o scroll do conteudo do modal — reaproveita o mesmo elemento a cada abertura, e sem
  // isso podia reabrir já rolado pra onde ficou da última vez, cortando o topo do card.
  const _cmpInner=m.firstElementChild; if(_cmpInner)_cmpInner.scrollTop=0;

  // Pre-selecionar zona do strava
  if(strava&&strava.stravaZone){ setTimeout(()=>{ const b=m.querySelector(`.cmp-zone[data-zone="${strava.stravaZone}"]`); if(b)_cmpSelZone(b,strava.stravaZone); },50); }
}

let _cmpZone=null,_cmpSense=null;
function _cmpSelZone(btn,z){ _cmpZone=z; document.querySelectorAll('.cmp-zone').forEach(b=>{b.style.background='var(--surface)';b.style.borderColor='var(--border)';b.style.color='var(--muted2)';}); const c=zones[z]?zones[z].color:'var(--accent)'; btn.style.background=c+'22';btn.style.borderColor=c;btn.style.color=c; }
function _cmpSelSense(btn,t){ _cmpSense=t; document.querySelectorAll('.cmp-sense').forEach(b=>{b.style.background='var(--surface)';b.style.borderColor='var(--border)';b.style.color='var(--muted2)';}); btn.style.background='var(--accent)22';btn.style.borderColor='var(--accent)';btn.style.color='var(--accent)'; }

function _saveComplete(w,d,si,key,skipData){
  if(!skipData){
    const time=document.getElementById('cmp-time')?.value||'';
    const dist=document.getElementById('cmp-dist')?.value||'';
    const pace=document.getElementById('cmp-pace')?.value||'';
    const hr=document.getElementById('cmp-hr')?.value||'';
    const hrmax=document.getElementById('cmp-hrmax')?.value||'';
    const watts=document.getElementById('cmp-watts')?.value||'';
    const sess=getEffectiveSessions(w,d).find(s=>s._origin==='plan'&&s._si===si);
    const isSwim=sess&&sess.type==='swim';
    const isBike=sess&&sess.type==='bike';
    // Montar linha de dados reais (mesmo formato do strava)
    const parts=[];
    if(dist)parts.push(isSwim?(dist+'m'):(dist+'km'));
    if(pace)parts.push(isBike?(pace+'km/h'):(pace+'/km'));
    if(time)parts.push(time+'min');
    if(hr)parts.push(hr+'bpm');
    if(hrmax)parts.push('max '+hrmax);
    if(watts)parts.push(watts+'W');
    if(_cmpSense)parts.push(_cmpSense);
    const realData=parts.join(' · ');
    const patch={ manualData:realData };
    if(realData)patch.stravaData=realData; // reusa o campo que já e exibido/sobreposto
    if(dist)patch.stravaDist=isSwim?(dist+'m'):(dist+'km');
    if(_cmpZone)patch.manualZone=_cmpZone;
    if(_cmpSense)patch.sensacao=_cmpSense;
    patch.completedManual=true;
    try{ setOverride(w,d,si,patch); }catch(e){}
  }
  _cmpZone=null;_cmpSense=null;
  closeCompleteSession();
  _commitComplete(key);
  // Garante que o tick apareca na mesma tela (o modal de conclusão fecha com animacao de
  // ~400ms; sem este refresh atrasado, a re-renderizacao rodava no meio da animacao e o
  // tick só aparecia ao trocar de aba e voltar).
  setTimeout(()=>{
    try{
      if(currentTab==='hoje'){ _renderHoje(hojeWeek,hojeDay); }
      else if(currentTab==='semana'){ _renderSemana(semanaWeek); }
    }catch(e){}
  }, 450);
  // Report pos-execução automático se houver dados
  const ov=getOverride(w,d,si);
  if(ov && (ov.stravaData||ov.manualData)){
    const sess=getEffectiveSessions(w,d).find(s=>s._origin==='plan'&&s._si===si);
    if(sess) setTimeout(()=>maybeShowSessionAnalysis(key,sess,w,d),500);
    // Meia Branca: check-in automático em todos os grupos que participo — sem precisar
    // abrir a aba Club e apertar nada. E o que o GymRats NAO faz (e a maior reclamacao dele).
    if(sess) autoCheckinAllGroups(sess,key);
  }
}

// Faz parse do key no formato wN_dN_sN (plano) para {w,d,si}
function _parseKey(key){
  const m=String(key).match(/^w(\d+)_d(\d+)_s(\d+)$/);
  if(m) return {w:+m[1],d:+m[2],si:+m[3],isPlan:true};
  const e=String(key).match(/^ex_w(\d+)_d(\d+)_i(\d+)$/);
  if(e) return {w:+e[1],d:+e[2],idx:+e[3],isPlan:false};
  return null;
}

function toggleCheck(e,key){
  if(e&&e.stopPropagation)e.stopPropagation();
  const c=loadChecks();
  const wasChecked=!!c[key];
  const pk=_parseKey(key);

  // AO MARCAR uma sessão do PLANO: abre o modal de conclusão (dados reais/manuais)
  // em vez de só marcar. Ao DESMARCAR: remove direto.
  if(!wasChecked && pk && pk.isPlan){
    openCompleteSession(pk.w,pk.d,pk.si,key);
    return;
  }

  // Desmarcar (ou sessão extra): comportamento direto
  if(c[key])delete c[key];else c[key]=true;
  saveChecks(c);
  _refreshAfterCheck(e,key,c);
}

// Marca a sessão como concluida de fato (chamado pelo modal após salvar dados)
function _commitComplete(key){
  const c=loadChecks();
  c[key]=true;
  saveChecks(c);
  _refreshAfterCheck(null,key,c);
}

function _refreshAfterCheck(e,key,c){
  // Re-renderiza a view ativa inteira para refletir o tick imediatamente
  try{
    if(currentTab==='hoje'){ _renderHoje(hojeWeek,hojeDay); }
    else if(currentTab==='semana'){ _renderSemana(semanaWeek); }
  }catch(err){}
  try{ renderStats(); }catch(err){}
}

function updateDayBadges(w){
  const week=getWeek(w);if(!week)return;const checks=loadChecks();
  document.querySelectorAll('#view-semana .day-done-badge').forEach(b=>b.remove());
  document.querySelectorAll('#view-semana .day-block-header').forEach((header,di)=>{
    const daySessions=week.days[di]||[];
    const hasSessions=daySessions.some(s=>s.type!==REST);
    const allDone=daySessions.filter(s=>s.type!==REST).every((_,si)=>checks[ck(w,di,si)]);
    if(hasSessions&&allDone){const badge=document.createElement('span');badge.className='day-done-badge';badge.textContent='FEITO';header.appendChild(badge);}
  });
}

function updateVolumeSummary(w){
  const week=getWeek(w);if(!week)return;
  let swimKm=0,bikeKm=0,runKm=0;
  for(let d=0;d<7;d++){getEffectiveSessions(w,d).forEach(sess=>{const v=sessionVolume(sess);swimKm+=v.swim;bikeKm+=v.bike;runKm+=v.run;});}
  const summary=document.querySelector('#view-semana .week-summary');
  if(summary){
    summary.innerHTML=`
      <div class="week-summary-title">VOLUME DA SEMANA</div>
      <div class="summary-row">
        <div class="summary-pill"><div class="summary-pill-val" style="color:#1a6cf0">${swimKm.toFixed(1)}</div><div class="summary-pill-label">km natação</div></div>
        <div class="summary-pill"><div class="summary-pill-val" style="color:#e05c2a">${bikeKm.toFixed(1)}</div><div class="summary-pill-label">km bike</div></div>
        <div class="summary-pill"><div class="summary-pill-val" style="color:#00e676">${runKm.toFixed(1)}</div><div class="summary-pill-label">km corrida</div></div>
      </div>`;
  }
}

// ── SEMANA ──
let semanaWeek;
function renderSemana(){const {w}=getCurrentWeekAndDay();semanaWeek=w;_renderSemana(w);}
function _renderSemana(w){
  semanaWeek=w;const container=document.getElementById('agenda-content')||document.getElementById('view-semana');container.innerHTML='';
  if(!plan||!plan[0]||!plan[0].weeks||!plan[0].weeks.length){
    try{ initPlan(); }catch(e){}
    if(!plan||!plan[0]||!plan[0].weeks||!plan[0].weeks.length){ try{ loadPlanFromProfile(); }catch(e){} }
  }
  let week=getWeek(w);
  if(!week){
    // clampar para uma semana válida do plano
    const all=getAllWeeks();
    if(all.length){ week=getWeek(all[0].w)||all[0]; semanaWeek=week.w; }
  }
  if(!week){
    container.innerHTML=`<div style="padding:48px 24px;text-align:center;font-family:var(--font-body);font-size:14px;color:var(--muted2)">Nenhum plano gerado ainda.<br>Complete o onboarding para ver sua semana.</div>`;
    return;
  }
  const nav=document.createElement('div');nav.className='week-nav';
  nav.innerHTML=`
    <button class="nav-btn" onclick="changeSemana(-1)" ${w<=1?'disabled':''}>&#8592;</button>
    <div class="week-nav-title">SEMANA ${w}</div>
    <button class="nav-btn" onclick="changeSemana(1)" ${w>=16?'disabled':''}>&#8594;</button>`;
  container.appendChild(nav);
  const dateLabel=document.createElement('div');dateLabel.className='week-dates-label';dateLabel.textContent=getWeekDates(w);container.appendChild(dateLabel);

  // ── CARD DE RECALIBRAÇÃO SEMANAL ──
  (function(){
    let recal=loadRecal()[w];
    const prevWeek=w-1;
    const prevAnalysis = prevWeek>=1 ? analyzeWeek(prevWeek) : null;
    // Recalibração AUTOMÁTICA: se a semana anterior teve execução e está ainda não foi recalibrada
    if(!recal && prevAnalysis && prevAnalysis.done>0){
      recalibrateWeek(prevWeek);
      recal=loadRecal()[w];
    }
    const adj=getWeekAdjust(w);
    const canRecalibrate=false; // agora e automático

    // Se já existe ajuste aplicado nesta semana, mostra o resultado
    if(recal && recal.factor && recal.factor!==1){
      const up=recal.factor>1;
      const pct=Math.round(Math.abs(recal.factor-1)*100);
      const col=up?'#00e676':(recal.factor<1?'#f0a500':'var(--muted)');
      const card=document.createElement('div');
      card.style.cssText=`background:var(--surface);border:1px solid var(--border);border-left:3px solid ${col};border-radius:8px;padding:14px 16px;margin:0 0 14px`;
      card.innerHTML=`
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px">
          <div style="font-family:var(--font-ui);font-size:9px;color:${col};letter-spacing:1.5px">COACH RECALIBROU · ${recal.reason.toUpperCase()}</div>
          <div style="font-family:var(--font-display);font-size:18px;color:${col}">${up?'+':''}${up?pct:(recal.factor<1?'-'+pct:'0')}%</div>
        </div>
        <div style="font-family:var(--font-body);font-size:12px;color:var(--muted2);line-height:1.5">${recal.detail||''}</div>`;
      container.appendChild(card);
    } else if(recal && recal.factor===1){
      const card=document.createElement('div');
      card.style.cssText='background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:12px 16px;margin:0 0 14px';
      card.innerHTML=`<div style="font-family:var(--font-ui);font-size:9px;color:var(--muted);letter-spacing:1.5px;margin-bottom:4px">COACH · ${(recal.reason||'MANTIDO').toUpperCase()}</div><div style="font-family:var(--font-body);font-size:12px;color:var(--muted2);line-height:1.5">${recal.detail||'Volume mantido para está semana.'}</div>`;
      container.appendChild(card);
    }

    // Botao para recalibrar (se a semana anterior tem execução e ainda não recalibrou está)
    if(canRecalibrate){
      const adherPct=Math.round(prevAnalysis.adherence*100);
      const btn=document.createElement('div');
      btn.style.cssText='background:rgba(0,230,118,0.06);border:1px dashed rgba(0,230,118,0.4);border-radius:8px;padding:14px 16px;margin:0 0 14px;cursor:pointer';
      btn.innerHTML=`
        <div style="display:flex;align-items:center;gap:10px">
          <div style="width:32px;height:32px;border-radius:50%;background:rgba(0,230,118,0.15);display:flex;align-items:center;justify-content:center;flex-shrink:0">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M23 4v6h-6M1 20v-6h6M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
          </div>
          <div style="flex:1">
            <div style="font-family:var(--font-ui);font-size:11px;font-weight:700;color:var(--accent);letter-spacing:.5px">RECALIBRAR ESTÁ SEMANA</div>
            <div style="font-family:var(--font-body);font-size:11px;color:var(--muted2);margin-top:2px">Você completou ${adherPct}% da semana ${prevWeek}. Deixe o coach ajustar seu volume.</div>
          </div>
        </div>`;
      btn.onclick=()=>{ recalibrateWeek(prevWeek); _renderSemana(w); };
      container.appendChild(btn);
    }
  })();

  const checks=loadChecks();
  for(let di=0;di<7;di++){
    const daySessions=week.days[di]||[];
    const effective=getEffectiveSessions(w,di);
    const block=document.createElement('div');block.className='day-block';block.style.cursor='pointer';
    block.addEventListener('click',(e)=>{if(e.target.classList.contains('mini-check'))return;hojeWeek=w;hojeDay=di;switchTabHoje();});

    const hasSessions=effective.length>0;
    const allDone=hasSessions&&effective.every(sess=>{
      const key=sess._origin==='plan'?ck(w,di,sess._si):`ex_w${w}_d${di}_i${sess._idx}`;
      return!!checks[key];
    });
    const mainType=effective[0]?.type||REST;
    if(hasSessions&&allDone)block.style.borderLeftColor=colorMap[mainType];

    const weekStart=new Date(PLAN_START);weekStart.setDate(weekStart.getDate()+(w-1)*7);
    const dayDate=new Date(weekStart);dayDate.setDate(weekStart.getDate()+di);
    const dayDateStr=`${dayDate.getDate().toString().padStart(2,'0')}/${(dayDate.getMonth()+1).toString().padStart(2,'0')}`;
    const isToday=dayDate.toDateString()===new Date().toDateString();

    // Clima compacto: ícone + max/min
    let weatherHtml='';
    if(_weatherCache&&_weatherCache.forecast){
      const today=new Date();today.setHours(0,0,0,0);
      const dd=new Date(dayDate);dd.setHours(0,0,0,0);
      const diffDays=Math.round((dd-today)/(1000*60*60*24));
      if(diffDays>=0&&diffDays<6){
        const f=_weatherCache.forecast[diffDays];
        if(f)weatherHtml=`<span style="font-family:var(--font-ui);font-size:10px;color:var(--muted2);margin-left:auto;flex-shrink:0">${f.icon} <span style="color:var(--muted)">${f.min}°</span>/<span style="color:var(--text);font-weight:700">${f.max}°</span></span>`;
      }
    }

    block.innerHTML=`
      <div class="day-block-header">
        <span class="day-name" ${isToday?'style="color:var(--accent)"':''}>${DAY_NAMES[di]}</span>
        <span style="font-family:var(--font-ui);font-size:10px;color:${isToday?'var(--accent)':'var(--muted)'};letter-spacing:.5px;margin-left:6px">${dayDateStr}</span>
        ${weatherHtml}
        ${isToday?'<span style="font-family:var(--font-ui);font-size:9px;font-weight:700;letter-spacing:1.5px;background:var(--accent);color:#000;padding:2px 7px;border-radius:2px;margin-left:6px;flex-shrink:0">HOJE</span>':''}
        ${hasSessions&&allDone?'<span class="day-done-badge" style="flex-shrink:0">FEITO</span>':''}
      </div>`;
    if(isToday)block.style.borderLeftColor='var(--accent)';

    const sessionsDiv=document.createElement('div');sessionsDiv.className='day-sessions';

    // Dia de descanso puro (sem sessões efetivas e sem extras)
    const isRestDay=daySessions.every(s=>s.type===REST)&&getExtras(w,di).length===0;
    if(isRestDay){
      sessionsDiv.innerHTML=`<span style="font-size:11px;color:var(--rest);font-family:var(--font-ui);letter-spacing:.5px;text-transform:uppercase">${daySessions[0]?.text||'Descanso'}</span>`;
    }else{
      effective.forEach(sess=>{
        const key=sess._origin==='plan'?ck(w,di,sess._si):`ex_w${w}_d${di}_i${sess._idx}`;
        const isDone=!!checks[key];
        const wrap=document.createElement('div');wrap.style.cssText='position:relative;overflow:hidden;';
        const row=document.createElement('div');row.className='mini-session'+(isDone?' done':'');
        row.style.cssText='transition:transform .25s;position:relative;z-index:1;background:var(--surface);';
        row.innerHTML=`
          <div class="mini-dot" style="background:${colorMap[sess.type]}"></div>
          <span class="mini-text">${sess.text}</span>
          ${(()=>{const _m=sessionMetricLabel(sess);if(!_m)return '';let d=_m;if(sess.type===SWIM&&d&&d.endsWith('km')){const km=parseFloat(d);if(!isNaN(km))d=Math.round(km*1000)+'m';}return `<span class="mini-dist">${d}</span>`;})()}
          <div class="mini-check ${isDone?'done':''}" onclick="toggleCheck(event,'${key}')">${isDone?'&#10003;':''}</div>`;
        // Botão delete atrás
        const delBtn=document.createElement('div');
        delBtn.style.cssText='position:absolute;right:0;top:0;bottom:0;width:60px;background:#c0392b;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:14px;z-index:0;';
        delBtn.innerHTML='&#x1F5D1;';
        delBtn.onclick=()=>{
          if(sess._origin==='plan')deleteSession(w,di,sess._si);
          else{removeExtra(w,di,sess._idx);}
          refreshHoje();
          _renderSemana(w);
        };
        // Swipe simples
        let sx=0,dragging=false;
        row.addEventListener('touchstart',e=>{sx=e.touches[0].clientX;dragging=true;},{passive:true});
        row.addEventListener('touchmove',e=>{
          if(!dragging)return;
          const dx=e.touches[0].clientX-sx;
          if(dx<-10&&dx>-70)row.style.transform=`translateX(${dx}px)`;
          else if(dx<=-70)row.style.transform='translateX(-60px)';
          else if(dx>5)row.style.transform='translateX(0)';
        },{passive:true});
        row.addEventListener('touchend',()=>{
          const cur=parseInt(row.style.transform.replace(/[^-\d]/g,'')||'0');
          if(cur<-30)row.style.transform='translateX(-60px)';
          else row.style.transform='translateX(0)';
          dragging=false;
        });
        wrap.appendChild(delBtn);wrap.appendChild(row);
        sessionsDiv.appendChild(wrap);
      });
    }
    block.appendChild(sessionsDiv);container.appendChild(block);
  }
  let swimKm=0,bikeKm=0,runKm=0;
  for(let d=0;d<7;d++){getEffectiveSessions(w,d).forEach(sess=>{const v=sessionVolume(sess);swimKm+=v.swim;bikeKm+=v.bike;runKm+=v.run;});}
  const summary=document.createElement('div');summary.className='week-summary';
  summary.innerHTML=`
    <div class="week-summary-title">VOLUME DA SEMANA</div>
    <div class="summary-row">
      <div class="summary-pill"><div class="summary-pill-val" style="color:#1a6cf0">${swimKm.toFixed(1)}</div><div class="summary-pill-label">km natação</div></div>
      <div class="summary-pill"><div class="summary-pill-val" style="color:#e05c2a">${bikeKm}</div><div class="summary-pill-label">km bike</div></div>
      <div class="summary-pill"><div class="summary-pill-val" style="color:#00e676">${runKm}</div><div class="summary-pill-label">km corrida</div></div>
    </div>`;
  container.appendChild(summary);
  _attachGenericSwipe(container,
    ()=>changeSemana(1),
    ()=>changeSemana(-1)
  );
}
function changeSemana(dir){semanaWeek=Math.max(1,Math.min(16,semanaWeek+dir));_renderSemana(semanaWeek);}

// ── FASES ──
function renderFases(){
  const container=document.getElementById('agenda-content')||document.getElementById('view-fases');container.innerHTML='';const checks=loadChecks();
  const allWeeks=getAllWeeks();
  if(!allWeeks.length){
    container.innerHTML=`<div style="padding:48px 24px;text-align:center;font-family:var(--font-body);font-size:14px;color:var(--muted2)">Nenhum plano gerado ainda.<br>Complete o onboarding para ver as fases.</div>`;
    return;
  }
  const FASE_LABELS={base:'BASE',build:'CONSTRUÇÃO',peak:'PICO',taper:'AFUNILAMENTO',race:'SEMANA DA PROVA'};
  const FASE_COLORS={base:'#1a6cf0',build:'#00e676',peak:'#e05c2a',taper:'#f0a500',race:'#9b6af0'};
  let lastFase=null;
  allWeeks.forEach(rawWeek=>{
    const week=getWeek(rawWeek.w); // adaptado: days = {di:[sessões]}
    if(!week)return;
    const fase=rawWeek.fase||'base';
    // cabeçalho de fase quando muda
    if(fase!==lastFase){
      lastFase=fase;
      const label=document.createElement('div');label.className='block-label';
      label.style.cssText='font-family:var(--font-ui);font-size:11px;letter-spacing:2px;color:'+(FASE_COLORS[fase]||'#00e676')+';margin:20px 0 10px;padding-bottom:6px;border-bottom:1px solid var(--border)';
      label.textContent=FASE_LABELS[fase]||fase.toUpperCase();
      container.appendChild(label);
    }
    // contar total/done da semana (via getEffectiveSessions para incluir extras)
    let total=0,done=0;
    for(let _di=0;_di<7;_di++){
      getEffectiveSessions(rawWeek.w,_di).forEach(s=>{
        if(s.type===REST)return;
        total++;
        const _k=s._origin==='plan'?ck(rawWeek.w,_di,s._si):`ex_w${rawWeek.w}_d${_di}_i${s._idx}`;
        if(checks[_k])done++;
      });
    }
    const wDiv=document.createElement('div');wDiv.className='phase-week';
    let badge='';
    if(fase==='race')badge='<span class="badge">PROVA</span>';
    else if(fase==='taper')badge='<span class="badge" style="background:#f0a500">TAPER</span>';
    else if(rawWeek.isRecovery)badge='<span class="badge" style="background:#9b6af0">REC</span>';
    wDiv.innerHTML=`
      <div class="phase-week-header" onclick="togglePhaseWeek(this)">
        <span class="phase-week-num">SEM ${rawWeek.w}${badge}</span>
        <span class="phase-week-dates">${getWeekDates(rawWeek.w)}</span>
        <span class="phase-week-progress">${done}/${total}</span>
      </div>
      <div class="phase-week-body" id="pw${rawWeek.w}"></div>`;
    const body=wDiv.querySelector(`#pw${rawWeek.w}`);
    for(let di=0;di<7;di++){
      // Usa getEffectiveSessions: aplica distancia real (Strava/manual) E inclui treinos extras
      // (ex: pedal sincronizado sem sessão correspondente). Antes usava week.days[di] cru, que
      // mostrava a distancia planejada e ignorava os extras.
      const daySessions=getEffectiveSessions(rawWeek.w,di).filter(s=>s.type!==REST);
      const row=document.createElement('div');row.className='phase-day-row';
      const _dayDate=new Date(getPlanStart());_dayDate.setDate(_dayDate.getDate()+(rawWeek.w-1)*7+di);
      const _dayNum=_dayDate.getDate();const _dayMon=_dayDate.toLocaleString('pt-BR',{month:'short'}).replace('.','').toUpperCase();
      const dl=document.createElement('span');dl.className='phase-day-label';dl.textContent=DAY_NAMES[di];row.appendChild(dl);
      const dr=document.createElement('span');dr.style.cssText='font-family:var(--font-ui);font-size:9px;color:var(--muted);letter-spacing:.5px;margin-left:auto;padding-right:8px';dr.textContent=_dayNum+' '+_dayMon;row.appendChild(dr);
      const ps=document.createElement('div');ps.className='phase-sessions';
      if(!daySessions.length){
        const r=document.createElement('span');r.style.cssText='font-size:10px;color:var(--rest);font-family:var(--font-ui);letter-spacing:.5px;text-transform:uppercase';r.textContent='Descanso';ps.appendChild(r);
      }else{
        daySessions.forEach((sess)=>{
          const key=sess._origin==='plan'?ck(rawWeek.w,di,sess._si):`ex_w${rawWeek.w}_d${di}_i${sess._idx}`;
          const isDone=!!checks[key];
          const sessEl=document.createElement('div');sessEl.className='phase-session';sessEl.style.cursor='pointer';
          const _metric=sessionMetricLabel(sess);
          sessEl.innerHTML=`<div class="phase-dot" style="background:${colorMap[sess.type]}"></div><span style="${isDone?'text-decoration:line-through;opacity:.35':''}font-family:var(--font-ui);font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:.3px">${sess.text}${_metric?` <span style="color:var(--accent);font-family:var(--font-display);font-size:11px">${_metric}</span>`:''}</span>`;
          sessEl.onclick=()=>{hojeWeek=rawWeek.w;hojeDay=di;switchTabHoje();};
          ps.appendChild(sessEl);
        });
      }
      row.appendChild(ps);body.appendChild(row);
    }
    container.appendChild(wDiv);
  });
}

let _consultHistory=[];
// Histórico persistido — antes era só uma variavel em memoria, perdia a conversa toda vez
// que o app recarregava (fechar/abrir de novo, refresh). Agora salva e recarrega.
const CONSULT_HISTORY_KEY='mytri_consult_history';
try{ _consultHistory=JSON.parse(localStorage.getItem(CONSULT_HISTORY_KEY)||'[]'); }catch(e){ _consultHistory=[]; }
function _saveConsultHistory(){
  try{ localStorage.setItem(CONSULT_HISTORY_KEY, JSON.stringify(_consultHistory.slice(-40))); }catch(e){}
  // CLC item 4: histórico da consultoria também vai pra nuvem agora — antes ficava só no
  // aparelho, e trocar de celular ou limpar o navegador perdia a conversa inteira com o coach.
  sbSet('mytri_consult_history', _consultHistory.slice(-40)).catch(()=>{});
}
async function _loadConsultHistoryFromCloud(){
  try{
    const cloud=await sbGet('mytri_consult_history');
    if(Array.isArray(cloud)&&cloud.length){
      _consultHistory=cloud;
      localStorage.setItem(CONSULT_HISTORY_KEY, JSON.stringify(_consultHistory));
    }else if(_consultHistory.length){
      // Primeira sincronizacao: tinha histórico só local (de antes dessa migracao) e nada na
      // nuvem ainda — manda o que já existe pra não perder a conversa.
      sbSet('mytri_consult_history', _consultHistory).catch(()=>{});
    }
  }catch(e){}
}

// Coleta metricas reais da janela (semana atual / ultimas 4 semanas / ciclo todo)
function _reportData(type){
  const prof=getMytriProfile();
  const checks=loadChecks();
  const {w:curW}=getCurrentWeekAndDay();
  const totalW=planWeekCount()||16;
  const daysToRace=countdownDays();
  const distLabels={'super-sprint':'Super Sprint','sprint':'Sprint','olimpico':'Olimpico','half':'Half','full':'Ironman','corrida-5k':'5km','corrida-10k':'10km','corrida-meia':'Meia Maratona','corrida-maratona':'Maratona'};

  function windowStats(wStart,wEnd){
    let done=0,total=0,swimKm=0,bikeKm=0,runKm=0,strengthDone=0;
    for(let w=Math.max(1,wStart);w<=Math.min(totalW,wEnd);w++){
      for(let d=0;d<7;d++){
        getEffectiveSessions(w,d).forEach(sess=>{
          if(sess.type===REST)return;
          total++;
          const key=sess._origin==='plan'?ck(w,d,sess._si):`ex_w${w}_d${d}_i${sess._idx}`;
          if(checks[key]){
            done++;
            const v=sessionVolume(sess);
            swimKm+=v.swim;bikeKm+=v.bike;runKm+=v.run;
            if(sess.type===GYM)strengthDone++;
          }
        });
      }
    }
    return {done,total,pct:Math.round(done/Math.max(total,1)*100),
      swimKm:+swimKm.toFixed(1),bikeKm:+bikeKm.toFixed(1),runKm:+runKm.toFixed(1),strengthDone};
  }

  const base={name:prof.name||'atleta',sport:prof.sport||'triathlon',
    raceName:prof.raceName||'sua prova',raceDist:distLabels[prof.raceDist]||prof.raceDist||'',
    daysToRace,phase:(getAllWeeks().find(wk=>wk.w===curW)||{}).faseLabel||''};

  if(type==='weekly'){
    const st=windowStats(curW,curW);
    return {...base,...st,week:curW,totalWeeks:totalW};
  }
  if(type==='monthly'){
    const st=windowStats(curW-3,curW);
    const trend=[];
    for(let w=Math.max(1,curW-3);w<=curW;w++){ trend.push(windowStats(w,w).pct); }
    return {...base,...st,weeklyTrend:trend};
  }
  if(type==='race'){
    const st=windowStats(1,totalW);
    return {...base,...st,goalTime:prof.goalTime||'',actualTime:'',notes:''};
  }
  return base;
}

  const m=_reportModal();
  const titles={weekly:'REPORT SEMANAL',monthly:'REPORT MENSAL',race:'RETROSPECTIVA POS-PROVA'};
  m.innerHTML=`

      </div>
      <div id="report-body" style="padding:22px">
        <div style="display:flex;flex-direction:column;align-items:center;gap:14px;padding:24px 0">

        </div>
      </div>
    </div>`;
  m.style.display='flex';

// ── INDICE DE CONSISTENCIA MYTRI (ranking por constancia, não performance) ──
// Combina: aderencia ao plano (peso 50) + streak de semanas (peso 30) + volume relativo (peso 20).
// Democratico: premia quem treina constante, não quem e mais rápido. Iniciante dedicado bate avancado preguicoso.
function computeConsistencyIndex(){
  const totalW = (typeof planWeekCount==='function') ? planWeekCount() : 12;
  const {w:cw} = getCurrentWeekAndDay();
  const upTo = Math.min(cw, totalW);
  let sumAdh=0, sumVol=0, weeks=0, streak=0, bestStreak=0;
  for(let w=1; w<=upTo; w++){
    const a=analyzeWeek(w);
    if(a.planned>0){
      sumAdh += a.adherence;
      sumVol += Math.min(a.volRatio,1.2); // cap pra não inflar com excesso
      weeks++;
      // streak: semana conta se aderencia >= 60%
      if(a.adherence>=0.6){ streak++; if(streak>bestStreak)bestStreak=streak; }
      else { streak=0; }
    }
  }
  const avgAdh = weeks>0 ? sumAdh/weeks : 0;         // 0..1
  const avgVol = weeks>0 ? (sumVol/weeks) : 0;        // 0..1.2
  const streakScore = Math.min(bestStreak/8, 1);     // 8 semanas seguidas = máximo
  // Indice 0..100
  const idx = Math.round( (avgAdh*50) + (streakScore*30) + (Math.min(avgVol,1)*20) );
  return { index: Math.max(0,Math.min(100,idx)), avgAdh, streak:bestStreak, avgVol, weeks };
}

// Calcula volume total do ciclo atual usando checks + effective sessions
function calcCycleVolume(){
  const checks=loadChecks();
  let swim=0,bike=0,run=0,sessoesDone=0,sessoesTotal=0;
  getAllWeeks().forEach(week=>{
    for(let di=0;di<7;di++){
      getEffectiveSessions(week.w,di).forEach(sess=>{
        if(sess.type===REST)return;
        sessoesTotal++;
        const key=sess._origin==='plan'
          ?ck(week.w,di,sess._si)
          :`ex_w${week.w}_d${di}_i${sess._idx}`;
        if(checks[key]){
          sessoesDone++;
          const v=sessionVolume(sess);
          swim+=v.swim;bike+=v.bike;run+=v.run;
        }
      });
    }
  });
  return{swim,bike,run,sessoesDone,sessoesTotal};
}

    const cached=JSON.parse(localStorage.getItem('nano_coach_cache')||'{}');
    const {w:cw}=getCurrentWeekAndDay();
    if(cached.text&&cached.week===cw&&(Date.now()-cached.ts)<6*3600*1000){
      el.textContent=cached.text;return;
    }
  }catch(e){}

  const {w,d}=getCurrentWeekAndDay();
  const checks=loadChecks();
  const vol=getVolume();
  const pct=Math.round((vol.done/Math.max(vol.total,1))*100);

  // Calcular completude por modalidade na semana atual
  let swimDone=0,swimTotal=0,bikeDone=0,bikeTotal=0,runDone=0,runTotal=0,gymDone=0,gymTotal=0;
  for(let dd=0;dd<7;dd++){
    getEffectiveSessions(w,dd).forEach(sess=>{
      const key=sess._origin==='plan'?ck(w,dd,sess._si):`ex_w${w}_d${dd}_i${sess._idx}`;
      const done=!!checks[key];
      if(sess.type===SWIM){swimTotal++;if(done)swimDone++;}
      else if(sess.type===BIKE||sess.type===BRICK){bikeTotal++;if(done)bikeDone++;}
      else if(sess.type===RUN){runTotal++;if(done)runDone++;}
      else if(sess.type===GYM){gymTotal++;if(done)gymDone++;}
    });
  }

  // Dados REAIS do perfil/plano (não mais hardcoded para triathlon/Guaruja)
  const prof=getMytriProfile();
  const totalW=planWeekCount()||16;
  const daysLeft=Math.max(0,totalW-w);
  const rawWeek=getAllWeeks().find(wk=>wk.w===w);
  const phase=(rawWeek&&rawWeek.faseLabel)?rawWeek.faseLabel:(w<=Math.ceil(totalW*0.35)?'Base':w<=Math.ceil(totalW*0.7)?'Construção':w<=Math.ceil(totalW*0.9)?'Pico':'Afunilamento');
  const raceName=prof.raceName||(prof.city?('sua prova em '+prof.city):'sua prova');
  const swimPct=swimTotal?Math.round(swimDone/swimTotal*100):0;
  const bikePct=bikeTotal?Math.round(bikeDone/bikeTotal*100):0;
  const runPct=runTotal?Math.round(runDone/runTotal*100):0;

  // Quais modalidades existem de fato neste plano
  const mods=[];
  if(swimTotal)mods.push({n:'Natação',pct:swimPct,done:swimDone,total:swimTotal});
  if(bikeTotal)mods.push({n:'Bike',pct:bikePct,done:bikeDone,total:bikeTotal});
  if(runTotal)mods.push({n:'Corrida',pct:runPct,done:runDone,total:runTotal});

  let pontoForte='',pontoAtencao='',dica='';
  if(mods.length){
    const forte=mods.reduce((a,b)=>b.pct>a.pct?b:a);
    const fraco=mods.reduce((a,b)=>b.pct<a.pct?b:a);
    pontoForte=`${forte.n} em dia`;
    if(fraco.pct<forte.pct||fraco.done<fraco.total)pontoAtencao=`${fraco.n} precisa de atenção (${fraco.done}/${fraco.total} sessões)`;
    else pontoAtencao='Tudo em dia está semana';
  }else{ pontoForte='Sem sessões planejadas'; pontoAtencao='Adicione treinos à sua semana'; }

  // Dica pela fase real
  const pl=phase.toLowerCase();
  if(pl.includes('base'))dica='Mantenha o ritmo em Z2. Consistência agora vale mais que intensidade.';
  else if(pl.includes('constru')||pl.includes('build'))dica='Aumente o volume gradualmente. Foque no seu ponto mais fraco — cada sessão conta.';
  else if(pl.includes('pico')||pl.includes('peak'))dica='Os treinos-chave desta fase são cruciais. Execute em ritmo de prova.';
  else dica='Reduza o volume mas mantenha a intensidade. Confie no trabalho feito.';

  const faltamTxt = daysLeft>0 ? `faltam ${daysLeft} ${daysLeft===1?'semana':'semanas'} para ${raceName}` : `é a semana de ${raceName}`;
  const text=`Semana ${w} de ${totalW} — ${phase}. ${pct}% do plano concluído, ${faltamTxt}. ${pontoForte} está semana. Atenção: ${pontoAtencao}. ${dica}`;

  el.textContent=text;
  localStorage.setItem('nano_coach_cache',JSON.stringify({text,ts:Date.now(),week:w}));
}

function checkWeeklySummary(){
  const now=new Date();
  const isSaturday=now.getDay()===6;
  if(!isSaturday)return;
  const {w}=getCurrentWeekAndDay();
  const lastKey=`nano_weekly_summary_${w}`;
  if(localStorage.getItem(lastKey))return;

  const checks=loadChecks();
  let done=0,total=0,swimKm=0,bikeKm=0,runKm=0;

    getEffectiveSessions(w,d).forEach(sess=>{

      total++;
      const key=sess._origin==='plan'?ck(w,d,sess._si):`ex_w${w}_d${d}_i${sess._idx}`;
      if(checks[key]){done++;const v=sessionVolume(sess);swimKm+=v.swim;bikeKm+=v.bike;runKm+=v.run;}
    });

  const pct=total?Math.round(done/total*100):0;
  const phase=w<=4?'Base':w<=8?'Construção I':w<=12?'Construção II':'Taper';
  const emoji=pct>=90?'':pct>=70?'':pct>=50?'':'';
  const msg=pct>=90?'Semana excelente. Consistência é o que leva à prova preparado.':
    pct>=70?'Boa semana. Recupera as sessões perdidas nos próximos dias.':
    pct>=50?'Semana abaixo do esperado. Identifica o que está impedindo e ajusta.':
    'Semana difícil. Não acumula — foca no que vem pela frente.';

  const ov=document.createElement('div');
  ov.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:9999;display:flex;align-items:center;justify-content:center;padding:24px';
  ov.innerHTML=`
    <div style="background:var(--surface);border:1px solid var(--border);border-top:3px solid var(--accent);padding:28px 24px;max-width:380px;width:100%">
      <div style="font-family:var(--font-ui);font-size:9px;font-weight:700;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin-bottom:6px">RESUMO · SEMANA ${w} · ${phase.toUpperCase()}</div>
      <div style="font-family:var(--font-display);font-size:32px;color:var(--accent);margin-bottom:4px">${emoji} ${pct}%</div>
      <div style="font-family:var(--font-ui);font-size:12px;color:var(--muted2);margin-bottom:20px">${done} de ${total} sessões concluídas está semana</div>
      <div style="display:flex;gap:12px;margin-bottom:24px">
        ${swimKm>0?`<div style="flex:1;text-align:center;border:1px solid var(--border);padding:10px"><div style="font-family:var(--font-display);font-size:18px;color:#1a6cf0">${swimKm.toFixed(1)}km</div><div style="font-family:var(--font-ui);font-size:9px;color:var(--muted);margin-top:2px">NATAÇÃO</div></div>`:''}
        ${bikeKm>0?`<div style="flex:1;text-align:center;border:1px solid var(--border);padding:10px"><div style="font-family:var(--font-display);font-size:18px;color:#e05c2a">${bikeKm.toFixed(0)}km</div><div style="font-family:var(--font-ui);font-size:9px;color:var(--muted);margin-top:2px">BIKE</div></div>`:''}
        ${runKm>0?`<div style="flex:1;text-align:center;border:1px solid var(--border);padding:10px"><div style="font-family:var(--font-display);font-size:18px;color:#00e676">${runKm.toFixed(0)}km</div><div style="font-family:var(--font-ui);font-size:9px;color:var(--muted);margin-top:2px">CORRIDA</div></div>`:''}

    </div>`;
  document.body.appendChild(ov);

let calYear=new Date().getFullYear(), calMonth=new Date().getMonth();

// Dado um Date, retorna {w, d} do plano ou null se fora do plano
function getWDFromDate(date){
  const diff=Math.floor((date-PLAN_START)/(1000*60*60*24));
  // Usa a contagem REAL de semanas do plano (não fixo 16). Em plano curto ou modo livre,
  // o limite 16*7 podia rejeitar/errar o casamento de atividades do Strava.
  let _tw=16; try{ _tw=planWeekCount()||16; }catch(e){}
  if(diff<0||diff>=_tw*7)return null;
  const w=Math.floor(diff/7)+1;
  const d=diff%7; // SEG=0...DOM=6
  return{w,d};
}

function renderCalendario(){
  const container=document.getElementById('agenda-content')||document.getElementById('view-calendario');
  container.innerHTML='';
  const checks=loadChecks();
  const now=new Date();

  const firstDay=new Date(calYear,calMonth,1);
  const lastDay=new Date(calYear,calMonth+1,0);
  // isoWeekday: 1=Mon...7=Sun → we want Mon=0
  let startDow=firstDay.getDay(); // 0=Sun
  startDow=(startDow+6)%7; // convert: Mon=0

  const monthNames=['Janeiro','Fevereiro','Marco','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];

  // Header
  const header=document.createElement('div');header.className='cal-header';
  header.innerHTML=`
    <div>
      <div class="cal-month-title">${monthNames[calMonth]}</div>
      <div class="cal-year">${calYear}</div>
    </div>
    <div class="cal-nav-btns">
      <button class="nav-btn" onclick="calNav(-1)">&#8592;</button>
      <button class="nav-btn" onclick="calNav(1)">&#8594;</button>
    </div>`;
  container.appendChild(header);

  // Grid
  const grid=document.createElement('div');grid.className='cal-grid';

  // Weekday labels (Mon first)
  const wdRow=document.createElement('div');wdRow.className='cal-weekdays';
  ['SEG','TER','QUA','QUI','SEX','SAB','DOM'].forEach(d=>{
    const wd=document.createElement('div');wd.className='cal-wd';wd.textContent=d;wdRow.appendChild(wd);
  });
  grid.appendChild(wdRow);

  const daysGrid=document.createElement('div');daysGrid.className='cal-days';

  // Pad previous month days
  const prevMonth=new Date(calYear,calMonth,0);
  for(let i=startDow-1;i>=0;i--){
    const dayEl=document.createElement('div');dayEl.className='cal-day other-month';
    dayEl.innerHTML=`<div class="cal-day-num">${prevMonth.getDate()-i}</div>`;
    daysGrid.appendChild(dayEl);
  }

  // Current month days
  for(let day=1;day<=lastDay.getDate();day++){
    const date=new Date(calYear,calMonth,day);
    const isToday=date.toDateString()===now.toDateString();
    const isRace=date.toDateString()===RACE_DATE.toDateString();
    const wd=getWDFromDate(date);

    const dayEl=document.createElement('div');
    dayEl.className='cal-day'+(isToday?' today':'')+(isRace?' has-race':'');

    dayEl.innerHTML=`<div class="cal-day-num">${day}</div><div class="cal-bars"></div>`;
    const barsEl=dayEl.querySelector('.cal-bars');

    if(wd){
      const sessions=getEffectiveSessions(wd.w,wd.d);
      // Group by type, show max 5 bars
      const shown=sessions.slice(0,5);
      shown.forEach((sess,si)=>{
        const key=sess._origin==='plan'?ck(wd.w,wd.d,sess._si):null;
        const isDone=key?!!checks[key]:false;
        const bar=document.createElement('div');
        bar.className='cal-bar '+(isDone?'done':'planned');
        bar.style.background=colorMap[sess.type]||'#555';
        barsEl.appendChild(bar);
      });
    }else if(isRace){
      const bar=document.createElement('div');bar.className='cal-bar done';bar.style.background='#f0a500';barsEl.appendChild(bar);
    }

    // Tap → modal
    dayEl.addEventListener('click',()=>{
      if(dayEl.classList.contains('other-month'))return;
      showCalDayModal(date,wd,checks);
    });

    daysGrid.appendChild(dayEl);
  }

  // Pad next month
  const totalCells=startDow+lastDay.getDate();
  const remainder=totalCells%7===0?0:7-(totalCells%7);
  for(let i=1;i<=remainder;i++){
    const dayEl=document.createElement('div');dayEl.className='cal-day other-month';
    dayEl.innerHTML=`<div class="cal-day-num">${i}</div>`;
    daysGrid.appendChild(dayEl);
  }

  grid.appendChild(daysGrid);
  container.appendChild(grid);

  // Legenda
  const legend=document.createElement('div');legend.className='cal-legend';
  const legItems=[
    {color:'#1a6cf0',label:'Natação'},
    {color:'#e05c2a',label:'Bike'},
    {color:'#00e676',label:'Corrida'},
    {color:'#9b6af0',label:'Musculação'},
    {color:'#c8cad0',label:'Tenis'},
    {color:'#f0a500',label:'Tijolo'},
  ];
  legItems.forEach(({color,label})=>{
    const li=document.createElement('div');li.className='cal-leg-item';
    li.innerHTML=`<div class="cal-leg-dot" style="background:${color}"></div>${label}`;
    legend.appendChild(li);
  });
  container.appendChild(legend);
  _attachGenericSwipe(container,
    ()=>calNav(1),
    ()=>calNav(-1)
  );
}

function calNav(dir){
  calMonth+=dir;
  if(calMonth<0){calMonth=11;calYear--;}
  if(calMonth>11){calMonth=0;calYear++;}
  renderCalendario();
}

function showCalDayModal(date,wd,checks){
  const dayNames=['Domingo','Segunda','Terca','Quarta','Quinta','Sexta','Sábado'];
  const monthNames=['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
  const dow=dayNames[date.getDay()];
  const dateStr=`${dow}, ${date.getDate()} ${monthNames[date.getMonth()]} ${date.getFullYear()}`;
  const isRace=date.toDateString()===RACE_DATE.toDateString();

  const ov=document.createElement('div');ov.className='cal-modal-overlay';
  const modal=document.createElement('div');modal.className='cal-modal';

  // Head
  const head=document.createElement('div');head.className='cal-modal-head';
  head.innerHTML=`
    <div class="cal-modal-date">${dateStr.toUpperCase()}</div>
    <div class="cal-modal-title">${wd?'SEM '+wd.w+' &middot; '+['SEG','TER','QUA','QUI','SEX','SAB','DOM'][wd.d]:isRace?'DIA DA PROVA':'&mdash;'}</div>`;
  modal.appendChild(head);

  // Body
  const body=document.createElement('div');body.className='cal-modal-body';

  function buildRows(){
    body.innerHTML='';
    const currentChecks=loadChecks();

    if(isRace){
      body.innerHTML=`<div class="cal-sess-row">
        <div class="cal-sess-bar" style="background:#f0a500"></div>
        <div class="cal-sess-info">
          <div class="cal-sess-name">PROVA — SPRINT TRIATHLON</div>
          <div class="cal-sess-dist">750m · 20km · 5km</div>
        </div>
        <span class="cal-sess-status done">DIA DA PROVA</span>
      </div>`;
      return;
    }
    if(!wd){body.innerHTML=`<div class="cal-modal-empty">FORA DO PLANO</div>`;return;}

    const sessions=getEffectiveSessions(wd.w,wd.d);
    if(!sessions.length){body.innerHTML=`<div class="cal-modal-empty">DESCANSO</div>`;return;}

    sessions.forEach(sess=>{
      const key=sess._origin==='plan'
        ?ck(wd.w,wd.d,sess._si)
        :`ex_w${wd.w}_d${wd.d}_i${sess._idx}`;
      const isDone=!!currentChecks[key];
      const color=colorMap[sess.type]||'#555';

      const row=document.createElement('div');
      row.className='cal-sess-row';
      row.style.cursor='pointer';

      const distHtml=sess.type===GYM&&sess.note&&/^\d+$/.test(sess.note.trim())
        ?`<div class="cal-sess-dist">${sess.note.trim()} series</div>`
        :(()=>{const _m=sessionMetricLabel(sess);return _m?`<div class="cal-sess-dist">${_m}</div>`:'';})();

      row.innerHTML=`
        <div class="cal-sess-bar" style="background:${color}"></div>
        <div class="cal-sess-info">
          <div class="cal-sess-name" style="${isDone?'text-decoration:line-through;opacity:.45':''}">${sess.text}</div>
          ${distHtml}
        </div>
        <span class="cal-sess-status ${isDone?'done':'open'}" style="cursor:pointer">${isDone?'FEITO':'ABERTO'}</span>`;

      // Toggle ao tocar na linha ou no badge
      row.addEventListener('click',()=>{
        const c=loadChecks();
        if(c[key])delete c[key];else c[key]=true;
        saveChecks(c);
        buildRows(); // re-renderiza as linhas
        // Atualizar calendário e stats em background
        renderCalendario();
        if(currentTab==='stats')renderStats();
      });

      body.appendChild(row);
    });
  }

  buildRows();
  modal.appendChild(body);

  const closeBtn=document.createElement('button');
  closeBtn.className='cal-modal-close';
  closeBtn.textContent='FECHAR';
  closeBtn.addEventListener('click',()=>ov.remove());
  modal.appendChild(closeBtn);

  ov.appendChild(modal);
  document.body.appendChild(ov);
  ov.addEventListener('click',(e)=>{if(e.target===ov)ov.remove();});
}

const STRAVA_CLIENT_ID='257886';
// client_secret NUNCA fica no client — token exchange vai pela Netlify Function /strava-token
const STRAVA_REDIRECT=window.location.origin;
const PLAN_START_ISO='2026-05-26T00:00:00Z';

// Detectar se voltou do OAuth com código
async function stravaHandleOAuthCallback(){
  const params=new URLSearchParams(window.location.search);
  const code=params.get('code');
  if(!code)return;
  // Limpar URL
  window.history.replaceState({},'',window.location.pathname);
  // Trocar código por tokens
  try{
    const r=await authedFetch('/.netlify/functions/strava-token',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        code,
        grant_type:'authorization_code'
      })
    });
    const data=await r.json();
    if(data.access_token){
      const tokens={
        access_token:data.access_token,
        refresh_token:data.refresh_token,
        expires_at:data.expires_at,
        athlete:data.athlete
      };
      localStorage.setItem('strava_tokens',JSON.stringify(tokens));
      await sbSet('strava_tokens',tokens);
      showStravaStatus('Strava conectado! Sincronizando treinos...');
      await stravaSyncActivities();
    }
  }catch(e){console.error('Strava OAuth error',e);}
}

async function stravaGetValidToken(){
  let tokens=null;
  try{tokens=JSON.parse(localStorage.getItem('strava_tokens'));}catch(e){}
  if(!tokens&&_syncReady){tokens=await sbGet('strava_tokens');}
  if(!tokens)return null;
  // Refresh se expirado
  if(Date.now()/1000>tokens.expires_at-60){
    try{
      const r=await authedFetch('/.netlify/functions/strava-token',{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({
          refresh_token:tokens.refresh_token,
          grant_type:'refresh_token'
        })
      });
      const data=await r.json();
      if(!data.access_token)throw new Error('refresh sem token');
      tokens.access_token=data.access_token;
      tokens.expires_at=data.expires_at;
      localStorage.setItem('strava_tokens',JSON.stringify(tokens));
      await sbSet('strava_tokens',tokens);
    }catch(e){
      // Refresh falhou — limpar tokens
      localStorage.removeItem('strava_tokens');
      try{await sbSet('strava_tokens',null);}catch(_){}
      return null;
    }
  }
  return tokens.access_token;
}

async function stravaSyncActivities(){
  const token=await stravaGetValidToken();
  if(!token)return;
  // Garante que o plano está carregado ANTES de casar atividades (senao getEffectiveSessions
  // não acha as sessões e nada casa, sem erro visivel).
  try{ if(!plan||!plan[0]||!plan[0].weeks||!plan[0].weeks.length){ initPlan(); } }catch(e){}
  try{
    // A API do Strava, SEM 'after', retorna as atividades mais RECENTES primeiro (ordem decrescente).
    // Com 'after', ela inverte e traz as mais antigas primeiro - por isso o treino de hoje ficava
    // fora das 100 primeiras quando havia muitas atividades no período. Buscamos as 50 mais recentes,
    // que sempre incluem as de hoje, e filtramos por data no próprio código.
    const r=await fetch(`https://www.strava.com/api/v3/athlete/activities?per_page=50`,{
      headers:{Authorization:'Bearer '+token}
    });
    const activities=await r.json();
    if(!Array.isArray(activities)){
      console.error('Strava resposta inesperada:',r.status,JSON.stringify(activities));
      if(r.status===429){
        localStorage.setItem('strava_rate_limit_until',(Date.now()+900000).toString()); // bloqueia por 15min
        showStravaStatus('Limite de requisições do Strava atingido. Aguarde 15 min e tente novamente.');
      }else if(r.status===401){
        localStorage.removeItem('strava_tokens');
        await sbSet('strava_tokens',null);
        renderStats();
        showStravaStatus('Sessão Strava expirada. Clique em CONECTAR para reconectar.');
      }else{
        showStravaStatus('Erro Strava ('+r.status+'): '+(activities.message||'resposta inesperada'));
      }
      return;
    }
    console.log('Strava activities:', activities.length, activities.map(a=>({date:a.start_date_local,type:a.sport_type||a.type,dist:a.distance})));

    // Historico de pace/velocidade pra grafico de evolucao nos Stats. So guarda o essencial
    // (data, tipo, valor numerico comparavel) — nao precisa rebuscar do Strava pra plotar depois.
    try{
      const paceHistory=[];
      activities.forEach(act=>{
        const actType=(act.sport_type||act.type||'').toLowerCase();
        const distKm=(act.distance||0)/1000;
        const dateStr=(act.start_date_local||'').slice(0,10);
        if(!dateStr||!act.moving_time||act.moving_time<=0)return;
        if(actType.includes('run')&&distKm>0.5){
          const secPerKm=act.moving_time/distKm;
          paceHistory.push({date:dateStr,sport:'corrida',secPerUnit:secPerKm,label:`${Math.floor(secPerKm/60)}:${String(Math.round(secPerKm%60)).padStart(2,'0')}/km`});
        }else if((actType.includes('ride')||actType.includes('virtual'))&&distKm>1){
          const kmh=distKm/(act.moving_time/3600);
          paceHistory.push({date:dateStr,sport:'ciclismo',kmh,label:`${kmh.toFixed(1)}km/h`});
        }else if(actType.includes('swim')&&distKm>0.05){
          const secPer100=act.moving_time/(distKm*10);
          paceHistory.push({date:dateStr,sport:'natacao',secPerUnit:secPer100,label:`${Math.floor(secPer100/60)}:${String(Math.round(secPer100%60)).padStart(2,'0')}/100m`});
        }
      });
      paceHistory.sort((a,b)=>a.date.localeCompare(b.date));
      localStorage.setItem('mytri_pace_history',JSON.stringify(paceHistory));
    }catch(e){}

    // Cache de rotas GPS pro mapa de atividades. O Strava ja manda o tracado (summary_polyline)
    // na propria listagem de atividades — sem precisar de chamada extra por atividade. So guarda
    // atividades com rota real (indoor/rolo sem GPS nao tem polyline) e ja decodifica os pontos,
    // pra nao precisar redecodificar toda vez que o mapa abrir.
    try{
      const routes=activities
        .filter(a=>a.map&&a.map.summary_polyline)
        .slice(0,20)
        .map(a=>{
          const actType=(a.sport_type||a.type||'').toLowerCase();
          let sport='outro';
          if(actType.includes('run')||actType.includes('walk')||actType.includes('hike'))sport='corrida';
          else if(actType.includes('ride'))sport='ciclismo';
          else if(actType.includes('swim'))sport='natacao';
          return{
            id:a.id,date:(a.start_date_local||'').slice(0,10),sport,
            distKm:Math.round((a.distance||0)/100)/10,
            name:a.name||'',
            points:decodePolyline(a.map.summary_polyline)
          };
        })
        .filter(r=>r.points.length>1);
      localStorage.setItem('mytri_routes_cache',JSON.stringify(routes));
    }catch(e){}

    let matched=0;
    const checks=loadChecks();

    // Cache de calorias — prioriza atividades de hoje e recentes sem cache
    let calCache={};
    try{calCache=JSON.parse(localStorage.getItem('nano_cal_cache')||'{}');}catch(e){}
    const todayStr=_localDateStr();
    const uncached=activities.filter(a=>calCache[a.id]===undefined);
    // Priorizar: hoje primeiro, depois mais recentes
    const todayUncached=uncached.filter(a=>(a.start_date_local||'').slice(0,10)===todayStr);
    const otherUncached=uncached.filter(a=>(a.start_date_local||'').slice(0,10)!==todayStr);
    const toFetchList=[...todayUncached,...otherUncached].slice(0,5);
    if(toFetchList.length>0){
      for(const toFetch of toFetchList){
        try{
          const dr=await fetch(`https://www.strava.com/api/v3/activities/${toFetch.id}`,{headers:{Authorization:'Bearer '+token}});
          if(dr.status===429){
            localStorage.setItem('strava_rate_limit_until',(Date.now()+900000).toString());
            break;
          }else if(dr.ok){
            const d=await dr.json();
            const cal=d.calories?Math.round(d.calories):d.kilojoules?Math.round(d.kilojoules/4.184):0;
            calCache[toFetch.id]=cal;
          }
        }catch(e){}
      }
      localStorage.setItem('nano_cal_cache',JSON.stringify(calCache));
    }

    for(const act of activities){

      // Usar start_date_local que já está no fuso do atleta
      const actDate=new Date(act.start_date_local);
      // Garantir que a data local está correta
      const localDateStr=act.start_date_local?act.start_date_local.slice(0,10):null;
      if(!localDateStr)continue;
      const localDate=new Date(localDateStr+'T12:00:00');
      const wd=getWDFromDate(localDate);
      if(!wd)continue;

      const actType=(act.sport_type||act.type||'').toLowerCase();
      const actDistKm=Math.round((act.distance||0)/100)/10;
      const actTime=act.moving_time?Math.round(act.moving_time/60)+'min':null;
      const actHR=act.average_heartrate?Math.round(act.average_heartrate)+'bpm':null;
      const _bpm=act.average_heartrate?Math.round(act.average_heartrate):0;
      const actZone=_bpm>=143?'Z4':_bpm>=125?'Z3':_bpm>=107?'Z2':_bpm>0?'Z1':null;
      const actElev=act.total_elevation_gain>5?Math.round(act.total_elevation_gain)+'m↑':null;
      const _cachedCal=calCache[act.id];
      const actCal=_cachedCal>0?_cachedCal+'kcal':act.calories?Math.round(act.calories)+'kcal':act.kilojoules?Math.round(act.kilojoules/4.184)+'kcal':null;
      // Pace para corrida (min/km), velocidade para bike (km/h)
      let actPace=null;
      if(actDistKm>0&&act.moving_time){
        if(actType.includes('run')){
          const minPerKm=act.moving_time/60/actDistKm;
          const min=Math.floor(minPerKm);
          const sec=Math.round((minPerKm-min)*60).toString().padStart(2,'0');
          actPace=`${min}:${sec}/km`;
        }else if(actType.includes('ride')){
          actPace=Math.round(actDistKm/(act.moving_time/3600)*10)/10+'km/h';
        }
      }
      // Fallback velocidade média para bike sem distancia (ex: rolo sem sensor de velocidade)
      if(!actPace&&actType.includes('ride')&&act.average_speed&&act.average_speed>0){
        actPace=Math.round(act.average_speed*3.6*10)/10+'km/h';
      }

      // Mapear tipo Strava → nosso tipo
      let targetType=null;
      if(actType.includes('swim'))targetType=SWIM;
      else if(actType.includes('ride')||actType.includes('virtual'))targetType=BIKE;
      else if(actType.includes('run'))targetType=RUN;
      else if(actType.includes('weight')||actType==='workout')targetType=GYM;
      else if(actType.includes('tennis'))targetType=TENNIS;
      else if(actType==='pickleball')targetType=TENNIS;
      else if(actType==='walk'||actType.includes('walk')||actType.includes('hike'))targetType=RUN;
      else if(actType.includes('ski')||actType.includes('snow')||actType.includes('surf')||actType.includes('yoga'))targetType=GYM;
      // Tipo desconhecido: não descarta silenciosamente. Vira atividade generica (GYM) para
      // aparecer como treino extra no dia, com o nome real do Strava.
      if(!targetType) targetType=GYM;

      // Identificar se é indoor e calcular dados
      const actDistKmFmt=actDistKm>0.1?actDistKm+'km':null;
      // Natação sempre em metros
      const actDistSwimFmt=act.distance>10?Math.round(act.distance)+'m':null;
      const isIndoor=act.trainer===true||actType==='virtualride'||actType==='virtualrun'||actType==='workout';
      const isWalk=actType==='walk'||actType.includes('walk');

      // Construir linha sombreada por modalidade
      const hasElev=!isIndoor&&actElev;
      if(targetType===RUN||isWalk){
        // Corrida/caminhada: dist · pace · tempo · bpm · kcal [· elev se externo]
        realData=[actDistKmFmt,actPace,actTime,actHR,actCal,hasElev?actElev:null].filter(Boolean).join(' · ');
      }else if(targetType===BIKE){
        // Bike: dist · vel · tempo · bpm · kcal [· elev se externo]
        realData=[actDistKmFmt,actPace,actTime,actHR,actCal,hasElev?actElev:null].filter(Boolean).join(' · ');
      }else if(targetType===SWIM){
        // Natação: dist(m) · tempo · bpm · kcal
        realData=[actDistSwimFmt,actTime,actHR,actCal].filter(Boolean).join(' · ');
      }else if(targetType===GYM){
        // Musculação: tempo · bpm · kcal (repetições vêm do Garmin, não do Strava)
        realData=[actTime,actHR,actCal].filter(Boolean).join(' · ');
      }else if(targetType===TENNIS){
        // Tênis/Pickleball: dist · bpm · kcal
        realData=[actDistKmFmt,actHR,actCal].filter(Boolean).join(' · ');
      }else{
        // Ski/Snow: dist · vel · bpm · kcal · elev
        realData=[actDistKmFmt,actPace,actHR,actCal,hasElev?actElev:null].filter(Boolean).join(' · ');
      }
      const actName=act.sport_type||act.type||'';
      const actTitle=(act.name||'').toLowerCase();
      const nameMap={
        'Pickleball':'Pickleball','Pickleball ':'Pickleball','Tennis':'Tenis','Squash':'Squash','Badminton':'Badminton',
        'Skiing':'Ski','BackcountrySkiing':'Ski','NordicSki':'Ski Cross-Country',
        'Snowboard':'Snowboard','Snowshoe':'Snowshoe',
        'Surfing':'Surf','Yoga':'Yoga','Hike':'Trilha','Walk':'Caminhada','Hike':'Trilha',
        'WeightTraining':'Musculação','Workout':'Treino Funcional',
        'Run':'Corrida','Ride':'Bike','VirtualRide':'Bike (Rolo)','Swim':'Natação'
      };
      // Verificar também pelo título da atividade (ex: "Pickleball" no nome)
      let friendlyName=nameMap[actName]||typeLabels[targetType]||'Atividade';
      if(actTitle.includes('pickle'))friendlyName='Pickleball';
      else if(actTitle.includes('tenis')||actTitle.includes('tennis'))friendlyName='Tenis';
      else if(actTitle.includes('ski'))friendlyName='Ski';
      else if(actTitle.includes('snow'))friendlyName='Snowboard';

      // Encontrar sessão correspondente no plano e editar com dados reais
      let foundMatch=false;
      getEffectiveSessions(wd.w,wd.d).forEach(sess=>{
        // Ignorar extras criados pelo próprio Strava
        if(sess._origin==='extra'&&sess.note&&sess.note.includes('via Strava'))return;
        const typeMatch=sess.type===targetType
          ||(targetType===BIKE&&sess.type===BRICK)
          ||(targetType===RUN&&sess.type===BRICK);
        if(!typeMatch)return;
        const key=sess._origin==='plan'?ck(wd.w,wd.d,sess._si):`ex_w${wd.w}_d${wd.d}_i${sess._idx}`;
        checks[key]=true;
        if(sess._origin==='plan'&&realData){
          const o=loadOverrides();
          const ok=ovKey(wd.w,wd.d,sess._si);
          const existing=o[ok]||{};
          // Sempre sobrescreve dados do Strava com os mais recentes
          o[ok]={...existing,type:sess.type,stravaData:realData,stravaDist:targetType===SWIM?actDistSwimFmt:actDistKmFmt,stravaTime:actTime,stravaPace:actPace,stravaHR:actHR,stravaCal:actCal,stravaZone:actZone};
          saveOverrides(o);
        }
        matched++;      // conta sempre que casa e salva dados (não só quando marca novo)
        foundMatch=true;
      });

      // Se não achou sessão do plano, atualizar extra existente ou criar novo
      if(!foundMatch&&wd){
        const label=friendlyName;
        const extraNote=[actPace,actTime,actHR,actElev].filter(Boolean).join(' · ');
        const existingExtras=getExtras(wd.w,wd.d);
        const existingIdx=existingExtras.findIndex(e=>e.type===targetType&&(e.text===label||e.manualLabel));
        // Para linha principal: tempo para tênis/musc, dist para resto
        const mainVal=(targetType===TENNIS||targetType===GYM)?actTime||'':targetType===SWIM?actDistSwimFmt||actTime||'':actDistKmFmt||actTime||'';
        if(existingIdx>=0){
          const e=loadExtras();const k=extraKey(wd.w,wd.d);
          const _hasManualLabel=e[k][existingIdx].manualLabel;
          e[k][existingIdx]={...e[k][existingIdx],dist:mainVal,note:realData,cal:actCal,stravaZone:actZone};
          // Preservar nome manual se o usuário editou
          if(_hasManualLabel){e[k][existingIdx].manualLabel=true;}
          saveExtras(e);
          checks[`ex_w${wd.w}_d${wd.d}_i${existingIdx}`]=true;
        }else{
          const extras=addExtra(wd.w,wd.d,{type:targetType,text:label,dist:mainVal,note:realData,cal:actCal,stravaZone:actZone});
          checks[`ex_w${wd.w}_d${wd.d}_i${extras.length-1}`]=true;
        }
        matched++;
      }
    }

    // Meia Branca: check-in automático com o dado real dessa atividade, em todos os grupos
    // que participo — cobre tanto sessão do plano quanto extra (atividade sem sessão planejada).
    try{
      const _ckSess={type:targetType, dist:targetType===SWIM?(actDistSwimFmt||actTime||''):(actDistKmFmt||actTime||''), _stravaTime:actTime};
      autoCheckinAllGroups(_ckSess,'strava_'+act.id);
    }catch(e){}

    // Salva os checks e overrides SEMPRE (não só quando matched>0), para não perder dados salvos.
    saveChecks(checks);
    try{ if(typeof refreshHoje==='function') refreshHoje(); }catch(e){}
    try{ if(currentTab==='agenda'||currentTab==='semana'){ if(typeof renderAgenda==='function') renderAgenda(); } }catch(e){}
    try{ renderStats(); }catch(e){}

    if(matched>0){
      showStravaStatus(`${matched} treino(s) sincronizado(s) do Strava!`);
    }else{
      const total=activities.length;
      // Diagnostico detalhado: por que nada casou? Mostra o que veio pra facilitar o debug.
      const hoje=_localDateStr();
      const deHoje=activities.filter(a=>(a.start_date_local||'').slice(0,10)===hoje);
      if(total===0){
        showStravaStatus('Strava conectado, mas nenhuma atividade nos ultimos 45 dias. Verifique se o treino saiu do relogio para o Strava.');
      }else if(deHoje.length===0){
        // ordena por data desc para achar a real mais recente
        const ord=[...activities].sort((a,b)=>(b.start_date_local||'').localeCompare(a.start_date_local||''));
        const ult=ord[0];
        const ultData=ult&&ult.start_date_local?ult.start_date_local.slice(0,10):'?';
        showStravaStatus(`${total} atividade(s) no Strava. Nenhuma de hoje (${hoje}). Mais recente: ${ultData}. Confira se a corrida de hoje aparece no app do Strava (não só no Garmin).`);
      }else{
        const tipos=deHoje.map(a=>a.sport_type||a.type).join(', ');
        showStravaStatus(`${deHoje.length} atividade(s) de hoje [${tipos}] encontrada(s), mas não encaixaram. Me avise esse tipo.`);
      }
    }
    // Salvar timestamp do último sync e atualizar display
    localStorage.setItem('strava_last_sync',Date.now().toString());
  }catch(e){console.error('Strava sync error',e); try{showStravaStatus('Erro no sync: '+(e.message||e));}catch(_){}}
}

function showStravaStatus(msg){
  const el=document.getElementById('strava-status');
  if(el){el.textContent=msg;el.style.display='block';setTimeout(()=>{el.style.display='none';},5000);}
}

function stravaConnect(){
  // Limpar tokens antigos para garantir novo scope
  localStorage.removeItem('strava_tokens');
  sbSet('strava_tokens',null);
  const url=`https://www.strava.com/oauth/authorize?client_id=${STRAVA_CLIENT_ID}&response_type=code&redirect_uri=${encodeURIComponent(STRAVA_REDIRECT)}&approval_prompt=force&scope=activity:read_all`;
  window.location.href=url;
}

function stravaDisconnect(){
  localStorage.removeItem('strava_tokens');
  sbSet('strava_tokens',null);
  renderStats();
}

function renderBikeFit(){
  if(localStorage.getItem('mytri_fit_terms')!=='1'){
    showFitDisclaimer();
    return;
  }
  renderBikeFitReal();
}

function showFitDisclaimer(){
  const overlay=document.createElement('div');
  overlay.className='disclaimer-overlay';
  overlay.id='fit-disclaimer';
  overlay.innerHTML=`
    <div class="disclaimer-sheet">
      <div class="disclaimer-title">Bike Fit <span style="color:var(--accent)">IA</span></div>
      <div class="disclaimer-body">
        Está ferramenta gera <strong style="color:var(--text)">estimativas orientativas</strong> baseadas nos dados que você fornece e em referencias técnicas gerais do ciclismo.<br><br>
        Os resultados <strong style="color:var(--text)">não substituem</strong> uma avaliação presencial com profissional certificado em bike fitting. Fatores como flexibilidade real, histórico de lesoes e caracteristicas individuais exigem analise humana especializada.<br><br>
        Use como ponto de partida — não como diagnostico definitivo.
      </div>
      <label class="disclaimer-check">
        <input type="checkbox" id="cb-fit" onchange="checkFitTerms()">
        <span>Entendo que está e uma ferramenta <strong style="color:var(--text)">orientativa</strong> e não substitui avaliação profissional</span>
      </label>
      <button class="disclaimer-btn" id="fit-disc-btn" onclick="acceptFitTerms()">CONTINUAR</button>
      <button class="disclaimer-btn-cancel" onclick="document.getElementById('fit-disclaimer').remove();switchTab('hoje')">Voltar</button>
    </div>`;
  document.body.appendChild(overlay);
}

function checkFitTerms(){
  const ok=document.getElementById('cb-fit')?.checked;
  const btn=document.getElementById('fit-disc-btn');
  if(btn)btn.classList.toggle('ready',!!ok);
}

function acceptFitTerms(){
  localStorage.setItem('mytri_fit_terms','1');
  document.getElementById('fit-disclaimer')?.remove();
  renderBikeFitReal();
}

    wrap.appendChild(lbl);
    if(f.type==='select'){
      const sel=document.createElement('select');
      sel.id=f.id;

      f.options.forEach(opt=>{const o=document.createElement('option');o.value=opt;o.textContent=opt;if(f.value===opt)o.selected=true;sel.appendChild(o);});

      const inp=document.createElement('input');

      inp.style.cssText='width:100%;background:var(--surface);border:1px solid var(--border);color:var(--text);font-family:var(--font-ui);font-size:14px;padding:12px;border-radius:4px;-webkit-appearance:none';
      wrap.appendChild(inp);

  });

  // Guia de como medir — evita que o atleta chute os números de selim/guidao.
  const medirGuide=document.createElement('div');

  medirGuide.innerHTML=`
    <div style="font-family:var(--font-ui);font-size:10px;color:var(--bike);letter-spacing:1.5px;margin-bottom:8px">COMO MEDIR</div>

      Selim: com uma fita metrica, meca do chao até o topo do selim, com o pedal alinhado na posição mais baixa (as 6 horas).<br>
      Guidao: meca do chao até o centro do guidao (ou do centro do aerobar, se usar), na mesma posição de pedal.

  form.appendChild(medirGuide);

  // Foto
  const photoWrap=document.createElement('div');
  photoWrap.innerHTML=`
    <label style="font-family:var(--font-ui);font-size:10px;color:var(--muted);letter-spacing:1.5px;text-transform:uppercase;display:block;margin-bottom:6px">Foto pedalando de lado (perfil)</label>
    <div id="bf-photo-preview" style="width:100%;aspect-ratio:3/4;max-height:420px;background:var(--surface);border:1px dashed var(--border2);border-radius:4px;display:flex;align-items:center;justify-content:center;cursor:pointer;margin-bottom:0" onclick="document.getElementById('bf-photo-input').click()">
      <span style="font-family:var(--font-ui);font-size:11px;color:var(--muted);letter-spacing:1px;text-align:center;padding:0 20px">TOQUE PARA ADICIONAR FOTO<br>(vertical, tirada pelo celular)</span>

  if(c)c.scrollIntoView({behavior:'smooth',block:'start'});
