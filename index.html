// Distancias em km/m por raceDist — usado pra calcular o pace/velocidade NECESSARIO pra bater
// a meta ANTES de mandar pro coach de IA. Sem isso, o modelo tinha que calcular tempo-alvo /
// distancia de cabeca e errava a conta (ex: dizia que precisava MELHORAR o pace quando o pace
// atual do atleta já era mais rápido que o necessário pra meta).
const RACE_KM_META={
  'super-sprint':{s:0.4,b:10,r:2.5},'sprint':{s:0.75,b:20,r:5},'olimpico':{s:1.5,b:40,r:10},
  'half':{s:1.9,b:90,r:21.1},'full':{s:3.8,b:180,r:42.2},
  'corrida-5k':{r:5},'corrida-10k':{r:10},'corrida-meia':{r:21.097},'corrida-maratona':{r:42.195},'corrida-trail':{r:21},
  'bike-gran-fondo':{b:100},'bike-criterium':{b:40},'bike-mtb':{b:50},'bike-century':{b:160},
  'swim-1500':{s:1.5},'swim-3800':{s:3.8},'swim-open':{s:2},
  'du-sprint':{r:5,b:20},'du-standard':{r:10,b:40},
};
function calcPaceNecessarioMeta(profile){
  try{
    if(!profile.goalTime||!profile.raceDist)return '';
    // Usa o tempo EXATO (com segundos) quando disponivel — o HH:MM sozinho arredonda pro
    // minuto cheio e distorcia o pace calculado de volta (ex: digitou 5:35/km, o relatorio
    // mostrava 5:36/km porque só tinha o tempo já arredondado pra trabalhar).
    let totalSec=profile.goalTimeExactSec;
    if(!totalSec){
      const parts=String(profile.goalTime).split(':');
      if(parts.length!==2)return '';
      totalSec=(parseInt(parts[0])||0)*3600+(parseInt(parts[1])||0)*60;
    }
    if(totalSec<=0)return '';
    const d=RACE_KM_META[profile.raceDist]; if(!d)return '';
    const soCorrida=d.r&&!d.s&&!d.b, soBike=d.b&&!d.s&&!d.r, soNado=d.s&&!d.b&&!d.r;
    if(soCorrida){ const secKm=totalSec/d.r; const m=Math.floor(secKm/60),s=Math.round(secKm%60); return `${m}:${String(s).padStart(2,'0')}/km`; }
    if(soBike){ const kmh=d.b/(totalSec/3600); return `${kmh.toFixed(1)}km/h`; }
    if(soNado){ const per100=totalSec/(d.s*10); const m=Math.floor(per100/60),s=Math.round(per100%60); return `${m}:${String(s).padStart(2,'0')}/100m`; }
    // Triathlon/duatlo: se a pessoa determinou um pace exato pra perna de corrida (editando
    // a meta por perna no onboarding), usa ESSE valor direto — é o que ela realmente definiu.
    // Só cai pra estimativa de 42% quando esse dado exato não existe.
    if(d.r&&profile.goalRunPaceSec){
      const secKm=profile.goalRunPaceSec; const m=Math.floor(secKm/60),s=Math.round(secKm%60);
      return `${m}:${String(s).padStart(2,'0')}/km na corrida`;
    }
    if(d.r){ const secKm=(totalSec*0.42)/d.r; const m=Math.floor(secKm/60),s=Math.round(secKm%60); return `~${m}:${String(s).padStart(2,'0')}/km na corrida (estimativa dentro do tempo total)`; }
    return '';
  }catch(e){ return ''; }
}
// Distancias EXATAS da prova, formatadas por extenso — manda pronto pro relatorio de IA pra
// impedir o modelo de inventar números (já aconteceu: relatorio de um sprint triathlon, que e
// 750m/20km/5km, saiu dizendo "1h9 de natação e 90km de bike", números de outra prova inteira).
function calcDistanciasProva(profile){
  try{
    const d=RACE_KM_META[profile.raceDist]; if(!d)return '';
    const parts=[];
    if(d.s)parts.push(`Natação ${d.s<2?Math.round(d.s*1000)+'m':d.s+'km'}`);
    if(d.b)parts.push(`Bike ${d.b}km`);
    if(d.r)parts.push(`Corrida ${d.r}km`);
    return parts.join(', ');
  }catch(e){ return ''; }
}
// Veredito PRONTO da comparação pace atual vs necessário — a IA repetidamente errava/invertia
// essa comparação (dizia "precisa melhorar" quando o pace atual já era mais rápido que o
// necessário, ou vice versa, e o valor mudava de forma inconsistente entre execuções). Calculando
// aqui e mandando o veredito pronto, a IA só precisa repetir a frase, não julgar os números.
function calcComparacaoPace(profile, paceNecessario){
  try{
    if(!paceNecessario)return '';
    const toSec=(s)=>{ const p=String(s).replace(/[^0-9:]/g,'').split(':'); if(p.length!==2)return null; return (parseInt(p[0])||0)*60+(parseInt(p[1])||0); };

    // CORRIDA: comparacao exata, pace atual vs pace necessário pra bater a meta.
    if(profile.sport==='corrida'&&profile.pace){
      const atualSec=toSec(profile.pace), necSec=toSec(paceNecessario);
      if(atualSec==null||necSec==null)return '';
      if(atualSec<=necSec) return `O pace ATUAL do atleta (${profile.pace}/km) já e MAIS RÁPIDO (ou igual) que o pace NECESSARIO pra bater a meta (${paceNecessario}). Isso significa que o atleta JA TEM velocidade suficiente — o foco do plano deve ser resistencia específica, consistencia e chegar saudavel na largada, NÃO ganho de velocidade.`;
      return `O pace ATUAL do atleta (${profile.pace}/km) e MAIS LENTO que o pace NECESSARIO pra bater a meta (${paceNecessario}). O atleta precisa GANHAR velocidade — esse e um foco real do plano.`;
    }

    // NATACAO: mesma logica, mas por 100m.
    if(profile.sport==='natacao'&&profile.swim){
      const atualSec=toSec(profile.swim), necSec=toSec(paceNecessario);
      if(atualSec==null||necSec==null)return '';
      if(atualSec<=necSec) return `O pace ATUAL de nado do atleta (${profile.swim}/100m) já e MAIS RÁPIDO (ou igual) que o pace NECESSARIO pra bater a meta (${paceNecessario}). O atleta JA TEM velocidade suficiente — o foco deve ser resistencia e tecnica, NÃO ganho de velocidade.`;
      return `O pace ATUAL de nado do atleta (${profile.swim}/100m) e MAIS LENTO que o pace NECESSARIO pra bater a meta (${paceNecessario}). O atleta precisa GANHAR velocidade de nado — esse e um foco real do plano.`;
    }

    // TRIATHLON/DUATHLON: se "pace necessário" veio do valor EXATO que a pessoa determinou pra
    // perna de corrida, a comparacao e exata. Só vira estimativa quando esse dado não existe e
    // caimos na regra generica de 42% do tempo total.
    if((profile.sport==='triathlon'||profile.sport==='duathlon')&&profile.pace){
      const necMatch=String(paceNecessario).match(/(\d+):(\d{2})/);
      const isEstimate=String(paceNecessario).includes('estimativa');
      if(necMatch){
        const necSec=parseInt(necMatch[1])*60+parseInt(necMatch[2]);
        const atualSec=toSec(profile.pace);
        if(atualSec!=null){
          const cmp=atualSec<=necSec?'JA E MAIS RÁPIDO (ou igual) que':'e MAIS LENTO que';
          if(isEstimate) return `ESTIMATIVA (a perna de corrida do triathlon representa aproximadamente 42% do tempo total — não e uma conta exata): o pace ATUAL de corrida do atleta (${profile.pace}/km) ${cmp} a estimativa de pace necessário pra essa perna dentro da meta total (${paceNecessario}). Trate isso como uma referencia aproximada, não um número cravado — mas USE essa direcao (precisa melhorar ou já tem capacidade) em vez de calcular você mesmo.`;
          return `O pace ATUAL de corrida do atleta (${profile.pace}/km) ${cmp} o pace NECESSARIO que ele mesmo determinou pra essa perna dentro da meta (${paceNecessario}). Esse número e EXATO (foi definido pela pessoa, não estimado) — use-o direto, não trate como aproximacao.`;
        }
      }
    }

    return '';
  }catch(e){ return ''; }
}

// Versao VISUAL (gauge de barras) da mesma comparacao que calcComparacaoPace faz em texto —
// pra reduzir a leitura no relatorio. Duas barras numa escala comum "maior=melhor" (pace
// vira velocidade invertida, bike ja e velocidade direta), com veredito curto embaixo.
function renderPaceGaugeHTML(profile){
  try{
    const paceNecessario=calcPaceNecessarioMeta(profile);
    if(!paceNecessario)return '';
    const toSec=(s)=>{ const m=String(s).match(/(\d+):(\d{2})/); return m?parseInt(m[1])*60+parseInt(m[2]):null; };
    let atualLabel='',necLabel='',atualVal=null,necVal=null,tituloLabel='';

    if(profile.sport==='corrida'&&profile.pace){
      const necSec=toSec(paceNecessario),atualSec=toSec(profile.pace);
      if(necSec==null||atualSec==null)return '';
      atualVal=1000/atualSec;necVal=1000/necSec;
      atualLabel=profile.pace+'/km';necLabel=paceNecessario;
      tituloLabel='PACE DE CORRIDA';
    }else if(profile.sport==='natacao'&&profile.swim){
      const necSec=toSec(paceNecessario),atualSec=toSec(profile.swim);
      if(necSec==null||atualSec==null)return '';
      atualVal=1000/atualSec;necVal=1000/necSec;
      atualLabel=profile.swim+'/100m';necLabel=paceNecessario;
      tituloLabel='PACE DE NATACAO';
    }else if((profile.sport==='triathlon'||profile.sport==='duathlon')&&profile.pace){
      const necMatch=String(paceNecessario).match(/(\d+):(\d{2})/);
      if(!necMatch)return '';
      const necSec=parseInt(necMatch[1])*60+parseInt(necMatch[2]);
      const atualSec=toSec(profile.pace);
      if(atualSec==null)return '';
      atualVal=1000/atualSec;necVal=1000/necSec;
      atualLabel=profile.pace+'/km';necLabel=necMatch[0]+'/km';
      tituloLabel='PACE DE CORRIDA (perna do triathlon)';
    }else{
      return '';
    }

    const maxV=Math.max(atualVal,necVal);
    const atualPct=Math.max(8,Math.round((atualVal/maxV)*100));
    const necPct=Math.max(8,Math.round((necVal/maxV)*100));
    const isReady=atualVal>=necVal;
    const barColor=isReady?'#00e676':'#f0a500';

    return `<div class="plan-section">
      <div class="plan-section-title">${tituloLabel}: ATUAL VS NECESSARIO</div>
      <div style="margin-top:10px">
        <div style="display:flex;justify-content:space-between;font-family:var(--font-ui);font-size:9px;color:var(--muted);letter-spacing:1px;margin-bottom:4px"><span>SEU RITMO ATUAL</span><span style="color:${barColor}">${atualLabel}</span></div>
        <div style="height:10px;border-radius:5px;background:rgba(255,255,255,.06);overflow:hidden;margin-bottom:14px"><div style="height:100%;width:${atualPct}%;background:${barColor};border-radius:5px"></div></div>
        <div style="display:flex;justify-content:space-between;font-family:var(--font-ui);font-size:9px;color:var(--muted);letter-spacing:1px;margin-bottom:4px"><span>NECESSARIO PRA META</span><span>${necLabel}</span></div>
        <div style="height:10px;border-radius:5px;background:rgba(255,255,255,.06);overflow:hidden"><div style="height:100%;width:${necPct}%;background:rgba(255,255,255,0.3);border-radius:5px"></div></div>
      </div>
      <div style="margin-top:12px;padding:10px 12px;border-radius:6px;background:${isReady?'rgba(0,230,118,.08)':'rgba(240,165,0,.1)'};border:1px solid ${isReady?'rgba(0,230,118,.25)':'rgba(240,165,0,.3)'}">
        <div style="font-family:var(--font-body);font-size:12px;color:${barColor}">${isReady?'Voce ja tem o ritmo necessario pra bater a meta. Foco: resistencia e consistencia.':'Voce precisa ganhar ritmo pra bater a meta. Foco: velocidade especifica.'}</div>
      </div>
    </div>`;
  }catch(e){ return ''; }
}

async function showPlanSummary(profile){
  const el=document.getElementById('view-plan-summary');
  el.classList.add('active');

  // Modo treino livre (sem prova): não chama a API. Mostra resumo local positivo.
  const _hasRaceSum=!!(profile.raceName&&String(profile.raceName).trim()&&profile.raceDate);
  if(!_hasRaceSum){
    renderPlanSummary(el,profile,'');
    return;
  }

  // Show loading
  el.innerHTML=`
    <div class="plan-loading">
      <div class="plan-loading-ring"></div>
      <div style="font-family:var(--font-ui);font-size:13px;color:var(--muted);letter-spacing:1.5px;text-align:center">CRIANDO SEU PLANO<br>PERSONALIZADO...</div>
      <div style="font-family:var(--font-body);font-size:12px;color:var(--muted2);text-align:center;line-height:1.6">Analisando seu perfil,<br>prova e objetivos</div>
    </div>`;

  try{
    // Dispara a geracao em background — recebe 202 na hora, o texto ainda nao vem aqui.
    // Teto de 10s aqui: so pra confirmar que a function aceitou o pedido, nao pra esperar o
    // resultado (isso e o polling abaixo).
    await fetchComTimeout('/.netlify/functions/plan-summary-background',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({profile:{...profile,
        paceNecessarioMeta: calcPaceNecessarioMeta(profile),
        distanciasProva: calcDistanciasProva(profile),
        comparacaoPace: calcComparacaoPace(profile, calcPaceNecessarioMeta(profile))
      }})
    },10000);
  }catch(e){
    renderPlanSummary(el,profile,'',`Erro de rede/fetch ao iniciar geracao: ${e.name==='AbortError'?'sem resposta em 10s':e.message}`);
    return;
  }

  // Fica consultando o status ate sair de "pending" — cada tentativa é rapida (so le uma
  // linha do banco), entao nao esbarra em nenhum teto de tempo de function. 40 tentativas de
  // 1.5s = 60s de espera maxima, bem acima do que a geracao real costuma levar. Cada chamada
  // individual tambem tem teto proprio de 8s, entao mesmo que uma trave, a proxima tentativa
  // ainda roda dentro do prazo total.
  const maxAttempts=40;
  for(let attempt=0;attempt<maxAttempts;attempt++){
    await new Promise(r=>setTimeout(r,1500));
    let statusResp;
    try{
      statusResp=await fetchComTimeout('/.netlify/functions/plan-summary-status',{method:'GET'},8000);
    }catch(e){ continue; } // falha de rede/timeout pontual no polling, so tenta de novo
    let statusData={};
    try{ statusData=await statusResp.json(); }catch(e){ continue; }
    if(statusData.status==='done'){
      renderPlanSummary(el,profile,statusData.text_result||'');
      return;
    }
    if(statusData.status==='error'){
      renderPlanSummary(el,profile,'',`Erro ao gerar: ${statusData.error_message||'erro desconhecido'}`);
      return;
    }
    // status 'pending' — continua esperando
  }
  renderPlanSummary(el,profile,'',`A geracao esta demorando mais que o esperado (mais de ${Math.round(maxAttempts*1.5)}s). Tente novamente em instantes.`);
}

// Transforma o texto de "FASES DO PLANO" (uma fase por linha, formato livre da IA) em cards
// de timeline horizontal: numero, nome da fase, periodo (se veio entre parenteses) e objetivo.
// Reduz 4 linhas de texto corrido a algo escaneavel em 2 segundos.
function renderFasesTimeline(fasesText){
  const linhas=fasesText.split('\n').map(l=>l.trim()).filter(l=>l.length>2);
  if(!linhas.length)return '';
  const fases=linhas.map(l=>{
    let linha=l.replace(/^\d+[\).\s-]+/,'').trim();
    let periodo='';
    const parenMatch=linha.match(/\(([^)]+)\)/);
    if(parenMatch){ periodo=parenMatch[1]; linha=linha.replace(parenMatch[0],'').trim(); }
    let titulo=linha,objetivo='';
    const sep=linha.match(/^([^:—–-]+)[:—–-]\s*(.+)$/);
    if(sep){ titulo=sep[1].trim(); objetivo=sep[2].trim(); }
    return{titulo,periodo,objetivo};
  });
  return `<div style="display:flex;gap:10px;overflow-x:auto;padding:12px 2px 6px;margin-top:4px">
    ${fases.map((f,i)=>`
      <div style="flex:0 0 190px;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px">
        <div style="width:24px;height:24px;border-radius:50%;background:var(--accent);color:#000;display:flex;align-items:center;justify-content:center;font-family:var(--font-ui);font-size:11px;font-weight:700;margin-bottom:10px">${i+1}</div>
        <div style="font-family:var(--font-display);font-size:15px;color:var(--text);line-height:1.2;margin-bottom:4px">${f.titulo}</div>
        ${f.periodo?`<div style="font-family:var(--font-ui);font-size:9px;color:var(--accent);letter-spacing:.5px;margin-bottom:8px">${f.periodo}</div>`:''}
        <div style="font-family:var(--font-body);font-size:11px;color:var(--muted2);line-height:1.5">${f.objetivo}</div>
      </div>${i<fases.length-1?`<div style="flex:0 0 14px;display:flex;align-items:center;justify-content:center;color:var(--border);font-size:16px">&rsaquo;</div>`:''}`).join('')}
  </div>`;
}

function renderPlanSummary(el,profile,text,debugMsg){

    'full':'Ironman Full'
  }[profile.raceDist||profile.distancia]||(profile.raceName?'Sprint':'Treino Livre');

  const _hasRace=!!(profile.raceName&&String(profile.raceName).trim()&&profile.raceDate);
  const daysToRace=_hasRace?Math.max(0,Math.round((new Date(profile.raceDate+'T12:00:00')-new Date())/(1000*60*60*24))):null;

  // Strip markdown completamente
  function stripMd(s){
    if(!s)return '';
    return s
      .replace(/#{1,4}\s*/g,'')
      .replace(/\*\*([^*]+)\*\*/g,'$1')
      .replace(/\*([^*]+)\*/g,'$1')
      .replace(/^[-—–]\s*/gm,'')
      .replace(/\s*—\s*##[^#\n]*/g,'')
      .replace(/\s*—+\s*/g,' ')
      .replace(/`/g,'')
      .trim();
  }

  // Parse sections — suporta formatos variados do Haiku
  function extractSection(titles){
    const t=titles instanceof Array?titles:[titles];
    const allTitles=['VISÃO GERAL','VISAO GERAL','PONTO CRÍTICO','PONTO CRITICO','FASES DO PLANO','ESTRATÉGIA DE PROVA','ESTRATEGIA DE PROVA','MENSAGEM DO COACH'];
    for(const title of t){
      const escaped=title.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');
      const variants=[escaped,'\\*\\*'+escaped+'\\*\\*'];
      for(const v of variants){
        // Só corta a seção quando encontra outro TÍTULO conhecido, não qualquer linha maiúscula
        const otherTitles=allTitles.filter(x=>!t.includes(x)).map(x=>x.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')).join('|');
        const re=new RegExp('(?:'+v+')[:\\s]*\\n([\\s\\S]*?)(?=\\n(?:\\*\\*)?(?:'+otherTitles+')|$)','i');
        const m=text.match(re);
        if(m&&m[1].trim())return stripMd(m[1]);
      }
    }
    return '';
  }

  const visao=extractSection(['VISÃO GERAL','VISAO GERAL','VISAO']);
  const critico=extractSection(['PONTO CRÍTICO','PONTO CRITICO']);
  const fases=extractSection(['FASES DO PLANO','FASES']);
  const estratégia=extractSection(['ESTRATÉGIA DE PROVA','ESTRATEGIA DE PROVA','ESTRATÉGIA','ESTRATEGIA']);
  const mensagem=extractSection(['MENSAGEM DO COACH','MENSAGEM']);

  // Se parsing falhou (texto existe mas seções não extraíram), exibe o texto limpo inteiro
  const anySection=visao||critico||fases||estratégia||mensagem;
  const fallbackText=!anySection&&text?stripMd(text):'';

  el.innerHTML=`
    <div style="padding:52px 20px 16px;border-bottom:1px solid var(--border);background:var(--surface)">
      <div style="font-family:var(--font-ui);font-size:10px;color:var(--accent);letter-spacing:2px;margin-bottom:8px">SEU PLANO MYTRI</div>

      ${_hasRace&&profile.raceUrl?`<a href="${profile.raceUrl}" target="_blank" style="display:inline-flex;align-items:center;gap:5px;font-family:var(--font-ui);font-size:10px;color:var(--accent);letter-spacing:1px;text-decoration:none;margin-bottom:4px"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><path d="M15 3h6v6"/><path d="M10 14L21 3"/></svg> VER PAGINA DE INSCRICAO</a>`:''}
      <div style="display:flex;gap:16px;margin-top:12px">
        ${_hasRace?`<div style="text-align:center">
          <div style="font-family:var(--font-display);font-size:32px;color:var(--accent)">${daysToRace}</div>
          <div style="font-family:var(--font-ui);font-size:9px;color:var(--muted);letter-spacing:1px">DIAS</div>
        </div>
        <div style="width:1px;background:var(--border)"></div>`:''}
        <div style="text-align:center">
          <div style="font-family:var(--font-display);font-size:32px;color:var(--text)">${_hasRace?dist:'BASE'}</div>
          <div style="font-family:var(--font-ui);font-size:9px;color:var(--muted);letter-spacing:1px">${_hasRace?'DISTANCIA':'MODO'}</div>
        </div>
        ${_hasRace&&profile.goalTime?`<div style="width:1px;background:var(--border)"></div>
        <div style="text-align:center">
          <div style="font-family:var(--font-display);font-size:32px;color:var(--text)">${profile.goalTime}</div>
          <div style="font-family:var(--font-ui);font-size:9px;color:var(--muted);letter-spacing:1px">META</div>
        </div>`:''}
      </div>
    </div>

    ${_hasRace?renderPaceGaugeHTML(profile):''}

    ${anySection?`
    ${visao?`<div class="plan-section">
      <div class="plan-section-title">VISAO GERAL</div>
      <div class="plan-section-body">${visao}</div>
    </div>`:''}
    ${critico?`<div class="plan-section">
      <div class="plan-section-title">PONTO CRITICO</div>
      <div class="plan-section-body">${critico}</div>
    </div>`:''}
    ${fases?`<div class="plan-section">
      <div class="plan-section-title">FASES DO PLANO</div>

    ${estratégia?`<div class="plan-section">
      <div class="plan-section-title">ESTRATÉGIA DE PROVA</div>
      <div class="plan-section-body">${estratégia}</div>
    </div>`:''}
    ${mensagem?`<div class="plan-section" style="padding-bottom:16px">
      <div style="background:rgba(0,230,118,.08);border:1px solid rgba(0,230,118,.2);border-radius:6px;padding:16px;margin-top:8px">
        <div style="font-family:var(--font-ui);font-size:9px;color:var(--accent);letter-spacing:2px;margin-bottom:8px">MENSAGEM DO COACH</div>
        <div style="font-family:var(--font-body);font-size:14px;color:var(--text);line-height:1.7">${mensagem}</div>
      </div>
    </div>`:''}
    `:fallbackText?`<div class="plan-section"><div class="plan-section-body">${fallbackText.split('\n').filter(l=>l.trim()).join('</div><div class="plan-section-body" style="margin-top:10px">')}</div></div>`
    :(!_hasRace?`<div class="plan-section">
      <div class="plan-section-title">MODO TREINO LIVRE</div>
      <div class="plan-section-body">Você começou sem uma prova específica, então montei um plano de BASE focado em consistencia e evolução geral nas suas modalidades.</div>
      <div class="plan-section-body" style="margin-top:10px">Os treinos já estão na Agenda, ajustados aos seus dias disponíveis, nível e lesoes. Quando quiser mirar uma prova, e só definir no Perfil que o plano se reorganiza em periodizacao (base, build, pico, taper) até a data.</div>
    </div>
    <div class="plan-section" style="padding-bottom:16px">
      <div style="background:rgba(0,230,118,.08);border:1px solid rgba(0,230,118,.2);border-radius:6px;padding:16px;margin-top:8px">
        <div style="font-family:var(--font-ui);font-size:9px;color:var(--accent);letter-spacing:2px;margin-bottom:8px">MENSAGEM DO COACH</div>
        <div style="font-family:var(--font-body);font-size:14px;color:var(--text);line-height:1.7">Constancia vence intensidade. Sem a pressao de uma data, o foco e criar o hábito e ganhar base aerobica. Cada treino conta.</div>
      </div>
    </div>`
    :`<div class="plan-section"><div class="plan-section-body">Não foi possível gerar o resumo detalhado do plano agora. Isso pode acontecer por instabilidade temporaria. Seu plano de treino já está ativo na Agenda.${debugMsg?`<br><br><span style="color:#e05c2a;font-size:11px">[debug: ${String(debugMsg).slice(0,250).replace(/</g,'')}]</span>`:''}<br><br><button onclick="showPlanSummary(getMytriProfile())" style="padding:12px 20px;background:var(--accent);color:#000;border:none;border-radius:4px;font-family:var(--font-ui);font-size:11px;letter-spacing:1.5px;cursor:pointer">TENTAR NOVAMENTE</button></div></div>`)}

    <div style="padding:20px 20px 40px">
      <button onclick="closePlanSummary()" style="width:100%;padding:18px;background:var(--accent);color:#000;font-family:var(--font-ui);font-size:14px;font-weight:700;letter-spacing:2px;border:none;border-radius:4px;cursor:pointer">ENTRAR NO MYTRI</button>

  // diferente) nao atualizava o cabeçalho, que ficava preso mostrando a prova antiga pra sempre
  // ate a pagina ser recarregada. Agora atualiza assim que entra no app de verdade.
  try{ updateCountdown(); }catch(e){}

      setTimeout(()=>{ stravaSyncActivities().catch(()=>{}); }, 1200);
    }
  }catch(e){}
}


function renderBikeFitText(el, text){
  const clean = text
    .replace(/#{1,3}\s*/g,'')
    .replace(/\*\*/g,'')
    .replace(/\*/g,'')
    .replace(/`/g,'')
    .replace(/\|[-| :]+\|/g,'')
    .replace(/\|/g,' ');

  const lines = clean.split('\n');
  let html = '';
  lines.forEach(function(line){
    const t = line.trim();
    if(!t){ html += '<div style="height:10px"></div>'; return; }
    if(/^[A-ZÀ-Ü][A-ZÀ-Ü\s\.0-9]{3,}:$/.test(t)){
      html += '<div style="font-family:var(--font-ui);font-size:11px;color:var(--accent);letter-spacing:2px;margin:20px 0 10px;padding-top:14px;border-top:1px solid var(--border)">'+t.replace(':','')+'</div>';
    } else if(t.charAt(0)==='-'){
      html += '<div style="padding-left:14px;margin-bottom:6px;color:var(--muted2);border-left:2px solid var(--border);padding-left:12px;margin-left:4px">'+t.substring(1).trim()+'</div>';
    } else {
      html += '<div style="margin-bottom:6px">'+t+'</div>';
    }
  });
  el.innerHTML = html;
}

// Auth gate: precisa de sessão valida antes de mostrar onboarding ou o app. Trata primeiro o
// link de recuperação de senha (se a pessoa clicou em "esqueci minha senha" no email), senao
// verifica/renova a sessão salva, senao mostra a tela de login/cadastro.
(async function initAuthGate(){
  if(checkRecoveryRedirect()){
    authMode='reset';
    showAuthScreen();
    return;
  }
  const session=await ensureValidSession();
  if(session&&session.access_token){
    enforceCacheOwnership(session);
    // CRITICO: conectar Strava no meio do onboarding exige sair da pagina (OAuth), o que
    // apagava obData (só vivia na memória) — ao voltar, o app não sabia que o onboarding
    // estava no meio e ou reiniciava do zero ou (pior) achava que já tinha terminado e pulava
    // direto pra Agenda com dado velho. O progresso já era salvo em mytri_ob_tmp antes de sair,
    // mas nunca era lido de volta — estava órfão. Agora retoma exatamente de onde parou.
    const _obTmp=localStorage.getItem('mytri_ob_tmp');
    if(_obTmp){
      try{ obData=JSON.parse(_obTmp); }catch(e){ obData={}; }
      obStep=parseInt(localStorage.getItem('mytri_ob_step')||'0',10)||0;
      localStorage.removeItem('mytri_ob_tmp');
      localStorage.removeItem('mytri_ob_step');
      document.body.classList.add('onboarding-active');
      const _fab=document.getElementById('consult-fab'); if(_fab)_fab.style.display='none';
      const el=document.getElementById('view-onboard');
      if(el)el.classList.add('active');
      // Mostra "conectando..." enquanto troca o code do Strava por token — antes ficava uns
      // 5 segundos sem nenhum feedback visual, parecia que travou.
      window._stravaConnecting=true;
      renderOnboarding();
      sbInit().then(async()=>{
        await stravaHandleOAuthCallback();
        window._stravaConnecting=false;
        renderOnboarding();
      }).catch(()=>{ window._stravaConnecting=false; renderOnboarding(); });
      return;
    }
    checkOnboarding();
  }else{
    // Sem sessão: comeca pelo onboarding normal (Welcome + Intro, que explicam o app) — o
    // login só e pedido DEPOIS disso, na transicao pra pergunta de esporte (ver obNext()).
    // Antes o login aparecia seco, primeira tela, sem nenhum contexto do que e o app.
    showOnboarding();
  }
})();

const SA_CACHE_KEY = 'mytri_session_analysis';

function loadAnalysisCache(){
  try{ return JSON.parse(localStorage.getItem(SA_CACHE_KEY)||'{}'); }catch{ return {}; }
}
function saveAnalysisCache(cache){
  try{ localStorage.setItem(SA_CACHE_KEY, JSON.stringify(cache)); }catch{}
}

async function maybeShowSessionAnalysis(key, sess, w, d){
  // Sessão do plano: usa o override. Extra: monta um objeto equivalente a partir dos campos
  // que o sync do Strava já salvou na própria sessão (dist/note/cal), já que extras não tem override.
  let ov;
  if(sess._origin==='plan'){
    ov = getOverride(w, d, sess._si);
    if(!ov || (!ov.stravaData && !ov.manualData)) return;
  }else{
    if(!sess.dist && !sess.note && !sess.cal) return;
    ov = {stravaDist: sess.dist||'', stravaData: sess.note||'', stravaCal: sess.cal||'', stravaZone: sess.stravaZone||''};
  }

  const modal = document.getElementById('session-analysis-modal');
  const colorMap2 = {swim:'#1a6cf0',bike:'#e05c2a',run:'#00e676',gym:'#9b6af0',brick:'#f0a500',tennis:'#c8cad0',rest:'#3a3f4a'};
  const typeNames2 = {swim:'Natação',bike:'Bike',run:'Corrida',gym:'Musculação',brick:'Tijolo',tennis:'Tenis',rest:'Descanso'};
  const dotColor = colorMap2[sess.type] || '#5a6070';
  const typeName = typeNames2[sess.type] || sess.type || 'Treino';
  const pillText = (sess.text || typeName) + (sess.dist ? ' ' + sess.dist : '');

  // Distancia PLANEJADA original (antes do override real) — pro strip numerico e o report
  // compararem planejado vs feito. Movido pra ANTES do check de cache, pra aparecer nos dois casos.
  let plannedDist = '';
  try{
    const rawWeek = getWeek(w);
    const rawDay = rawWeek && rawWeek.days ? rawWeek.days[d] : null;
    if(rawDay && rawDay[sess._si]) plannedDist = rawDay[sess._si].dist || '';
  }catch(e){}

  // Check cache
  const cache = loadAnalysisCache();
  if(cache[key]){
    renderSessionAnalysis(modal, dotColor, pillText, cache[key], ov, plannedDist);
    return;
  }

  // Show loading
  modal.innerHTML = `
    <div class="sa-header">
      <span class="sa-label">Analise do Treino</span>
      <span class="sa-close" onclick="closeSessionAnalysis()">FECHAR</span>
    </div>
    <div class="sa-session-pill">
      <div class="sa-session-pill-dot" style="background:${dotColor}"></div>
      <span class="sa-session-pill-text">${pillText}</span>
    </div>
    <div class="sa-spinner">
      <div class="sa-spinner-ring"></div>
      <span style="font-family:var(--font-ui);font-size:11px;color:var(--muted);letter-spacing:1px">ANALISANDO SEU TREINO...</span>
    </div>`;
  modal.classList.add('active');

  // Build strava string
  const stravaStr = [
    ov.stravaDist ? 'Distancia: ' + ov.stravaDist : '',
    ov.stravaTime ? 'Tempo: ' + ov.stravaTime : '',
    ov.stravaHR   ? 'FC média: ' + ov.stravaHR + 'bpm' : '',
    ov.stravaCal  ? 'Calorias: ' + ov.stravaCal + 'kcal' : '',
    ov.stravaZone ? 'Zona: ' + ov.stravaZone : '',
    ov.stravaData ? 'Dados extras: ' + ov.stravaData : ''
  ].filter(Boolean).join(', ');

  const profile = getMytriProfile();
  const {w: cw} = getCurrentWeekAndDay();
  const week2 = getWeek(w);
  const phase = week2 ? week2.phase : 'Base';
  const raceDate = profile.raceDate || '2026-09-13';
  const daysToRace = Math.max(0, Math.round((new Date(raceDate+'T12:00:00') - new Date()) / (1000*60*60*24)));

  // Distancia PLANEJADA já foi calculada acima (antes do check de cache).
  // Sinaliza se o real ficou acima/abaixo do planejado (para o coach comentar coerentemente)
  let volComparison = '';
  try{
    const pKm = parseFloat(plannedDist)||0;
    const rKm = parseFloat(ov.stravaDist||'')||0;
    if(pKm>0 && rKm>0){
      const diff = Math.round((rKm/pKm - 1)*100);
      if(diff>=10) volComparison = `O atleta fez ${diff}% ACIMA do volume planejado (planejado ${plannedDist}, feito ${ov.stravaDist}). Comente essa carga extra e o impacto na recuperação/semana.`;
      else if(diff<=-10) volComparison = `O atleta fez ${Math.abs(diff)}% ABAIXO do volume planejado (planejado ${plannedDist}, feito ${ov.stravaDist}). Comente de forma construtiva, sem culpa.`;
      else volComparison = `Volume próximo do planejado (planejado ${plannedDist}, feito ${ov.stravaDist}).`;
    }
  }catch(e){}

  try{
    const resp = await authedFetch('/.netlify/functions/session-analysis', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({
        session: {type: sess.type, text: sess.text, dist: sess.dist, plannedDist, volComparison},
        strava: stravaStr,
        profile: {name: profile.name || 'Nano', injuries: profile.lesoes||[], injuryDetail: profile.lesaoDetalhe||''},
        daysToRace,
        week: w,
        phase
      })
    });
    const data = await resp.json();
    const text = data.text || '';
    if(text){
      const c2 = loadAnalysisCache();
      c2[key] = text;
      saveAnalysisCache(c2);
      renderSessionAnalysis(modal, dotColor, pillText, text, ov, plannedDist);
    } else {
      modal.classList.remove('active');
    }
  }catch{
    modal.classList.remove('active');
  }
}

// Strip de numeros grandes (distancia, tempo, FC, calorias, zona) + barra planejado vs feito.
// Fica ACIMA do texto da IA no relatorio pos-treino: os dados exatos primeiro, o texto como
// contexto/interpretacao depois — antes só existia o texto narrando esses mesmos numeros.
function renderSessionStatStrip(ov, plannedDist){
  if(!ov)return '';
  const stats=[];
  if(ov.stravaDist)stats.push({label:'DISTANCIA',val:ov.stravaDist,color:'var(--accent)'});
  if(ov.stravaTime)stats.push({label:'TEMPO',val:ov.stravaTime,color:'var(--text)'});
  if(ov.stravaHR)stats.push({label:'FC MEDIA',val:ov.stravaHR+'bpm',color:'#e05c2a'});
  if(ov.stravaCal)stats.push({label:'CALORIAS',val:ov.stravaCal+'kcal',color:'#f0a500'});
  if(ov.stravaZone)stats.push({label:'ZONA',val:ov.stravaZone,color:'#9b6af0'});
  if(!stats.length)return '';
  let barHtml='';
  const pKm=parseFloat(plannedDist)||0,rKm=parseFloat(ov.stravaDist||'')||0;
  if(pKm>0&&rKm>0){
    const pct=Math.round((rKm/pKm)*100);
    const barColor=(pct>=90&&pct<=130)?'#00e676':(pct>130?'#f0a500':'#e05c2a');
    barHtml=`<div style="margin-top:10px">
      <div style="display:flex;justify-content:space-between;font-family:var(--font-ui);font-size:8px;color:var(--muted);letter-spacing:1px;margin-bottom:3px"><span>PLANEJADO ${plannedDist}</span><span style="color:${barColor}">FEITO ${ov.stravaDist} (${pct}%)</span></div>
      <div style="height:6px;border-radius:3px;background:rgba(255,255,255,.08);overflow:hidden"><div style="height:100%;width:${Math.min(100,pct)}%;background:${barColor}"></div></div>
    </div>`;
  }
  return `<div style="display:grid;grid-template-columns:repeat(${Math.min(stats.length,3)},1fr);gap:8px;margin:14px 0">
    ${stats.map(s=>`<div style="background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:10px 6px;text-align:center">
      <div style="font-family:var(--font-display);font-size:16px;color:${s.color}">${s.val}</div>
      <div style="font-family:var(--font-ui);font-size:7px;color:var(--muted);letter-spacing:1px;margin-top:2px">${s.label}</div>
    </div>`).join('')}
  </div>${barHtml}`;
}

function renderSessionAnalysis(modal, dotColor, pillText, text, ov, plannedDist){
  modal.innerHTML = `
    <div class="sa-header">
      <span class="sa-label">Analise do Treino</span>
      <span class="sa-close" onclick="closeSessionAnalysis()">FECHAR</span>
    </div>
    <div class="sa-session-pill">
      <div class="sa-session-pill-dot" style="background:${dotColor}"></div>
      <span class="sa-session-pill-text">${pillText}</span>
    </div>
    ${renderSessionStatStrip(ov,plannedDist)}
    <div class="sa-text">${text.replace(/\n\n/g,'</p><p style="margin-top:12px">').replace(/\n/g,' ')}</div>`;
  modal.classList.add('active');
}

function closeSessionAnalysis(){
  const modal = document.getElementById('session-analysis-modal');
  modal.classList.remove('active');
  setTimeout(()=>{ modal.innerHTML=''; }, 400);
  // Re-renderiza a view ativa para o tick de concluido reaparecer (bug: sumia após fechar report)
  try{
    if(currentTab==='hoje'){ _renderHoje(hojeWeek,hojeDay); }
    else if(currentTab==='semana'){ _renderSemana(semanaWeek); }
    renderStats();
  }catch(e){}
}
</script>
</body>
</html>
