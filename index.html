// Anel de progresso circular (estilo Apple Watch). frac de 0 a 1.
function svgRing(frac,color,size,stroke){
  size=size||64;stroke=stroke||7;
  const r=(size-stroke)/2,c=2*Math.PI*r;
  const off=c*(1-Math.max(0,Math.min(1,frac)));
  return `<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}" style="transform:rotate(-90deg);display:block">
    <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="var(--border)" stroke-width="${stroke}"/>
    <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="${color}" stroke-width="${stroke}" stroke-dasharray="${c.toFixed(1)}" stroke-dashoffset="${off.toFixed(1)}" stroke-linecap="round"/>
  </svg>`;
}

// Grafico de evolucao de pace/velocidade por modalidade, a partir do historico de atividades
// do Strava (mytri_pace_history, gravado em stravaSyncActivities). Eixo Y sempre normalizado
// pra "pra cima = mais rapido", mesmo pace (menor=melhor) e velocidade (maior=melhor) juntos.
function renderPaceEvolutionChart(){
  let hist=[];
  try{ hist=JSON.parse(localStorage.getItem('mytri_pace_history')||'[]'); }catch(e){ return ''; }
  if(!hist.length)return '';
  const prof=(getMytriProfile&&getMytriProfile())||{};
  const sportsToShow=(prof.sport==='triathlon'||prof.sport==='duathlon')?['corrida','ciclismo','natacao']
    :prof.sport==='corrida'?['corrida']:prof.sport==='ciclismo'?['ciclismo']:prof.sport==='natacao'?['natacao']
    :['corrida','ciclismo','natacao'];
  const sportMeta={corrida:{color:'#00e676',label:'Corrida'},ciclismo:{color:'#e05c2a',label:'Ciclismo'},natacao:{color:'#1a6cf0',label:'Natacao'}};
  // Converte o valor normalizado do eixo Y (so serve pra desenhar a linha) de volta pra uma
  // unidade real que faz sentido mostrar como legenda dos dois lados do grafico.
  function formatY(sp,y){
    if(sp==='ciclismo')return y.toFixed(1)+'km/h';
    const secPerUnit=1000/y;
    const m=Math.floor(secPerUnit/60),s=Math.round(secPerUnit%60);
    return `${m}:${String(s).padStart(2,'0')}${sp==='natacao'?'/100m':'/km'}`;
  }
  function formatDate(d){
    const parts=String(d||'').split('-');
    return parts.length===3?`${parts[2]}/${parts[1]}`:'';
  }
  let blocks='';
  sportsToShow.forEach(sp=>{
    const pts=hist.filter(h=>h.sport===sp).slice(-15);
    if(pts.length<2)return;
    const meta=sportMeta[sp];
    const yVals=pts.map(p=>sp==='ciclismo'?p.kmh:(1000/p.secPerUnit));
    const minY=Math.min(...yVals),maxY=Math.max(...yVals);
    const rangeY=(maxY-minY)||1;
    // Espaco reservado: esquerda pros rotulos do eixo Y, embaixo pras datas do eixo X.
    const W=300,H=110,PAD_L=38,PAD_R=6,PAD_T=10,PAD_B=16;
    const chartW=W-PAD_L-PAD_R,chartH=H-PAD_T-PAD_B;
    const stepX=pts.length>1?chartW/(pts.length-1):0;
    const xOf=i=>PAD_L+i*stepX;
    const yOf=y=>PAD_T+chartH-((y-minY)/rangeY)*chartH;
    const coords=yVals.map((y,i)=>[xOf(i),yOf(y)]);
    const pathD=coords.map(([x,y],i)=>(i===0?'M':'L')+x.toFixed(1)+','+y.toFixed(1)).join(' ');
    const areaD=pathD+` L${coords[coords.length-1][0].toFixed(1)},${(PAD_T+chartH).toFixed(1)} L${coords[0][0].toFixed(1)},${(PAD_T+chartH).toFixed(1)} Z`;
    const first=pts[0],last=pts[pts.length-1];
    const improved=sp==='ciclismo'?last.kmh>=first.kmh:last.secPerUnit<=first.secPerUnit;
    // 3 linhas de grade horizontais com o valor real (nao o numero normalizado) do lado esquerdo.
    const gridVals=[maxY,minY+rangeY/2,minY];
    const gridLines=gridVals.map(gv=>{
      const gy=yOf(gv);
      return `<line x1="${PAD_L}" y1="${gy.toFixed(1)}" x2="${W-PAD_R}" y2="${gy.toFixed(1)}" stroke="var(--border)" stroke-width="0.6" stroke-dasharray="2,2"/>
        <text x="${PAD_L-4}" y="${(gy+2.5).toFixed(1)}" text-anchor="end" font-size="7" fill="var(--muted)">${formatY(sp,gv)}</text>`;
    }).join('');
    // Datas no eixo X: primeira, meio e ultima atividade — o suficiente pra dar referencia de
    // periodo sem poluir, ja que ate 15 pontos nao cabem 15 datas legiveis nesse espaco.
    const midIdx=Math.floor((pts.length-1)/2);
    const xLabels=[[0,first.date],[midIdx,pts[midIdx].date],[pts.length-1,last.date]]
      .filter((v,i,arr)=>arr.findIndex(w=>w[0]===v[0])===i)
      .map(([i,d])=>`<text x="${xOf(i).toFixed(1)}" y="${H-3}" text-anchor="${i===0?'start':i===pts.length-1?'end':'middle'}" font-size="7" fill="var(--muted)">${formatDate(d)}</text>`).join('');
    const gradId=`paceGrad_${sp}`;
    blocks+=`
      <div style="margin-bottom:20px">
        <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:6px">
          <span style="font-family:var(--font-ui);font-size:10px;font-weight:700;color:${meta.color};letter-spacing:1px;text-transform:uppercase">${meta.label}</span>
          <span style="font-family:var(--font-ui);font-size:9px;color:${improved?'#00e676':'var(--muted)'}">${first.label} &rarr; ${last.label}${improved?' &#9650;':' &#9660;'}</span>
        </div>
        <svg viewBox="0 0 ${W} ${H}" style="width:100%;height:${H}px;display:block">
          <defs>
            <linearGradient id="${gradId}" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%" stop-color="${meta.color}" stop-opacity="0.35"/>
              <stop offset="100%" stop-color="${meta.color}" stop-opacity="0"/>
            </linearGradient>
          </defs>
          ${gridLines}
          <path d="${areaD}" fill="url(#${gradId})" stroke="none"/>
          <path d="${pathD}" fill="none" stroke="${meta.color}" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>
          ${coords.slice(0,-1).map(([x,y])=>`<circle cx="${x.toFixed(1)}" cy="${y.toFixed(1)}" r="2" fill="${meta.color}" opacity="0.6"/>`).join('')}
          <circle cx="${coords[coords.length-1][0].toFixed(1)}" cy="${coords[coords.length-1][1].toFixed(1)}" r="4" fill="var(--bg)" stroke="${meta.color}" stroke-width="2"/>
          ${xLabels}
        </svg>
        <div style="font-family:var(--font-ui);font-size:8px;color:var(--muted);margin-top:2px">Ultimas ${pts.length} atividades de ${sp} sincronizadas do Strava</div>
      </div>`;
  });
  if(!blocks)return '';
  return `<div class="stats-section" style="background:var(--surface);border:1px solid var(--border);border-top:2px solid var(--accent);padding:16px;margin-bottom:8px">
    <div style="font-family:var(--font-ui);font-size:9px;font-weight:700;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin-bottom:4px">EVOLUCAO DE RITMO</div>
    <div style="font-family:var(--font-body);font-size:10px;color:var(--muted2);margin-bottom:14px">Baseado nas atividades sincronizadas do Strava. Linha subindo = ficando mais rapido.</div>
    ${blocks}
  </div>`;
}

let currentTab='hoje';
const TAB_ORDER=['perfil','agenda','stats','conquistas','bikefit','club'];
let agendaSubTab='hoje';

function switchTab(tab){
  // Reseta os 3 alvos de scroll possiveis (window + documentElement + body) com
  // retentativas — precisa ser chamado em TODO caminho, inclusive o de Perfil, que antes saia
  // da funcao cedo demais e nunca recebia esse reset.
  const _resetScroll=()=>{ window.scrollTo(0,0); document.documentElement.scrollTop=0; document.body.scrollTop=0; };
  _resetScroll();
  document.querySelectorAll('.bnav-item').forEach(b=>b.classList.remove('active'));
  const idx=TAB_ORDER.indexOf(tab==='hoje'||tab==='semana'||tab==='calendario'?'agenda':tab);
  if(idx>=0)document.querySelectorAll('.bnav-item')[idx].classList.add('active');
  // Fecha defensivamente todas as telas fixed sobrepostas
  ['view-profile','view-onboard','view-plan-summary'].forEach(id=>{
    const el=document.getElementById(id);
    if(el) el.classList.remove('active');
  });
  // CRITICO: os avisos de "orientativo, nao substitui profissional" (Bike Fit, Clube) ficam
  // fixos por cima da tela inteira. Se a pessoa trocar de aba sem responder eles (aceitar ou
  // voltar), ficavam presos ali pra sempre, travando o app inteiro em QUALQUER aba depois.
  document.querySelectorAll('.disclaimer-overlay').forEach(el=>el.remove());
  // Tocar em qualquer aba (ex: Perfil) sai da Consultoria Live direto, sem precisar fechar
  // com o X antes — nav continua clicavel por cima do chat exatamente pra isso.
  closeConsult();
  if(typeof closeGroupChat==='function')closeGroupChat();
  if(typeof closeMatchChat==='function')closeMatchChat();
  if(tab!=='club')clubTabView=null;
  if(tab==='perfil'){
    openProfile();
    const _resetProfileScroll=()=>{ const vp=document.getElementById('view-profile'); if(vp)vp.scrollTop=0; };
    _resetProfileScroll();
    setTimeout(_resetProfileScroll,50);
    setTimeout(_resetProfileScroll,200);
    return;
  }
  document.querySelectorAll('.view').forEach(v=>{
    v.classList.remove('active');
    v.style.display='none';
  });
  const viewId=tab==='hoje'||tab==='semana'||tab==='calendario'?'agenda':tab;
  const activeEl=document.getElementById('view-'+viewId);
  activeEl.classList.add('active');
  activeEl.style.display='block';
  currentTab=tab;
  if(tab==='agenda'||tab==='hoje'||tab==='semana'||tab==='calendario'){
    currentTab='agenda';
    if(tab!=='agenda')agendaSubTab=tab;
    renderAgenda();
  }
  else if(tab==='fases')renderFases();
  else if(tab==='stats')renderStats();
  else if(tab==='conquistas')renderConquistas();
  else if(tab==='bikefit')renderBikeFit();
  else if(tab==='club')renderClub();
  // Chamar de novo DEPOIS do render — a chamada la em cima roda antes do conteudo da tela
  // trocar, e no mobile isso as vezes não "gruda" direito.
  _resetScroll();
  setTimeout(_resetScroll,50);
  setTimeout(_resetScroll,200);
}

const EK='nano_extras_v1';
function loadExtras(){try{return JSON.parse(localStorage.getItem(EK)||'{}')}catch(e){return{}}}
function saveExtras(e){try{localStorage.setItem(EK,JSON.stringify(e))}catch(e){}scheduleSyncToCloud();}
function extraKey(w,d){return'e_w'+w+'_d'+d}
function getExtras(w,d){const e=loadExtras();return e[extraKey(w,d)]||[]}
function addExtra(w,d,item){const e=loadExtras();const k=extraKey(w,d);if(!e[k])e[k]=[];e[k].push(item);saveExtras(e);return e[k]}

// ── OVERRIDES ──
const OK='nano_overrides_v1';
function loadOverrides(){try{return JSON.parse(localStorage.getItem(OK)||'{}')}catch(e){return{}}}
function saveOverrides(o){try{localStorage.setItem(OK,JSON.stringify(o))}catch(e){}scheduleSyncToCloud();}
function ovKey(w,d,si){return'o_w'+w+'_d'+d+'_s'+si}
function getOverride(w,d,si){const o=loadOverrides();return o[ovKey(w,d,si)]||null}
function setOverride(w,d,si,patch){const o=loadOverrides();const k=ovKey(w,d,si);const ex=o[k]||{};o[k]={...ex,...patch};saveOverrides(o)}
function deleteSession(w,d,si){const o=loadOverrides();o[ovKey(w,d,si)]={deleted:true};saveOverrides(o);refreshHoje()}

function restoreDaySessions(w,d){
  const o=loadOverrides();
  const week=getWeek(w);
  if(!week)return;
  week.days[d].forEach((_,si)=>{
    const k=ovKey(w,d,si);
    if(o[k]&&o[k].deleted)delete o[k];
  });
  saveOverrides(o);
  refreshHoje();
}
function applyOverride(sess,w,d,si){
  const ov=getOverride(w,d,si);
  if(!ov)return sess;
  if(ov.deleted)return null;
  // Prioridade da distancia exibida: (1) edição manual do plano (ov.dist), (2) dado REAL
  // executado (ov.stravaDist, vindo do Strava ou da conclusão manual), (3) planejado (sess.dist).
  // Sem isso, completar um treino em distancia diferente da sugerida não atualizava o card.
  let distFinal = sess.dist;
  if(ov.stravaDist!==undefined && ov.stravaDist!=='') distFinal = ov.stravaDist;
  if(ov.dist!==undefined) distFinal = ov.dist;
  // Preserva os campos originais da sessão (structure, coach etc) via spread — antes essa função
  // devolvia um objeto novo só com {type,text,dist,note}, então QUALQUER sessão com override
  // (ex: força sincronizada do Strava) perdia a "structure". Isso quebrava o tempo exibido nas
  // abas Semana/Fases/Cal (forceDurationMin dependia de sess.structure, que sumia) e também o
  // bloco "RACIONAL DO COACH" no detalhe do treino depois de executado.
  return{...sess,type:ov.type||sess.type,text:ov.text||sess.text,dist:distFinal,note:ov.note!==undefined?ov.note:sess.note,_realExecuted:!!(ov.stravaDist||ov.manualData||ov.stravaData),_stravaTime:ov.stravaTime||null};
}

// ── EFFECTIVE SESSIONS ──
// Escala uma string de distancia (ex "10km", "1500m", "20km+5km") por um fator
function _scaleDist(dist,factor){
  if(!dist||!factor||factor===1)return dist;
  return String(dist).replace(/([\d.]+)/g,(num)=>{
    const v=parseFloat(num); if(isNaN(v))return num;
    const scaled=v*factor;
    return (scaled>=10?Math.round(scaled):Math.round(scaled*10)/10).toString();
  });
}
function getEffectiveSessions(w,d){
  const week=getWeek(w);if(!week)return[];
  const raw=week.days[d]||[];
  const out=[];
  const _recalFactor=getWeekAdjust(w);
  raw.forEach((origSess,si)=>{
    if(origSess.type===REST)return;
    const s=applyOverride(origSess,w,d,si);
    if(s===null)return;
    // Aplica recalibração semanal ao volume PLANEJADO (não mexe em força nem no que já foi executado)
    let sAdj=s;
    if(_recalFactor && _recalFactor!==1 && origSess.type!=='FORCE'){
      const ov=getOverride(w,d,si);
      const jaExecutado = ov && (ov.stravaData||ov.manualData||ov.stravaDist);
      if(!jaExecutado && s.dist){
        sAdj=Object.assign({},s,{dist:_scaleDist(s.dist,_recalFactor),_recalApplied:_recalFactor});
      }
    }
    out.push(Object.assign({},sAdj,{_origin:'plan',_si:si}));
  });
  getExtras(w,d).forEach((item,idx)=>{
    out.push({type:item.type,text:item.text||item.label,dist:item.dist,note:item.note,stravaZone:item.stravaZone||null,manualZone:item.manualZone||null,cal:item.cal||null,_origin:'extra',_idx:idx});
  });
  const order=getOrder(w,d);
  if(order&&order.length){
    const keyOf=s=>s._origin+':'+(s._origin==='plan'?s._si:s._idx);
    const map={};out.forEach(s=>map[keyOf(s)]=s);
    const ordered=[];
    order.forEach(k=>{if(map[k]){ordered.push(map[k]);delete map[k];}});
    out.forEach(s=>{if(map[keyOf(s)])ordered.push(s);});
    return ordered;
  }
  return out;
}

function _exImg(id,frame){ return EXDB_BASE+id+'/'+(frame||0)+'.jpg'; }


// Mapa de reconhecimento: termo no texto -> id da foto no banco + nome amigavel
// IDs conforme free-exercise-db (dominio público). Prioriza versoes bodyweight/leves.
const EXERCISE_MAP=[
  [/gluteo bridge|elevacao pelvica|ponte|gl[uú]teo/i,'Butt_Lift_Bridge','Elevacao de quadril'],
  [/clamshell|concha/i,'Bent-Knee_Hip_Raise','Concha (ativacao quadril)'],
  [/dead ?bug/i,'Dead_Bug','Dead bug'],
  [/bird ?dog|quadruped/i,'Cocoons','Bird dog (core)'],

  [/agachamento livre|agachamento/i,'Bodyweight_Squat','Agachamento'],
  [/leg press/i,'Calf_Press_On_The_Leg_Press_Machine','Leg press'],
  [/cadeira extensora|extensora/i,'Bodyweight_Squat','Cadeira extensora'],
  [/cadeira flexora|flexora|mesa flexora/i,'Bodyweight_Squat','Cadeira flexora'],
  [/terra romeno|levantamento terra|stiff/i,'Barbell_Full_Squat','Terra romeno'],
  [/afundo|lunge|passada/i,'Bodyweight_Walking_Lunge','Afundo'],
  [/step ?up|subida no banco/i,'Dumbbell_Step_Ups','Step up'],
  [/prancha lateral/i,'Decline_Oblique_Crunch','Prancha lateral (obliquo)'],
  [/prancha|plank/i,'Butt-Ups','Prancha'],
  [/hollow/i,'Bottoms_Up','Hollow hold'],
  [/russian twist|torcao russa/i,'Cross-Body_Crunch','Russian twist'],
  [/elevacao de pernas|leg raise/i,'Bent-Knee_Hip_Raise','Elevacao de pernas'],
  [/pallof/i,'Cable_Judo_Flip','Pallof press (anti-rotacao)'],
  [/abdominal|crunch|core/i,'Crunches','Abdominal'],
  [/foam roller|liberacao|liberacao miofascial|miofascial/i,'Adductor','Foam roller'],
  [/panturrilha/i,'Calves-SMR','Panturrilha'],
  [/alongamento.*posterior|cadeia posterior|isquio|hamstring/i,'90_90_Hamstring','Along. posterior'],
  [/alongamento.*quadr|quadriceps|quadr[ií]ceps/i,'All_Fours_Quad_Stretch','Along. quadriceps'],
  [/alongamento/i,'Cat_Stretch','Alongamento'],
  [/mobilidade.*quadril|mobilidade de quadril/i,'Adductor','Mobilidade de quadril'],
  [/mobilidade|articular|rotacao/i,'All_Fours_Quad_Stretch','Mobilidade articular'],
];


function _extractExercises(text){
  if(!text)return[];
  const found=[]; const seen=new Set();
  const parts=String(text).split(/[\/,;]/).map(x=>x.trim()).filter(Boolean);
  parts.forEach(part=>{
    for(const [rx,id,nome] of EXERCISE_MAP){
      if(rx.test(part)&&!seen.has(id)){
        const rep=part.match(/\d+\s*x\s*\d+|\d+\s*s\b|\d+\s*seg/i);
        found.push({id,nome,rep:rep?rep[0]:'',img0:_exImg(id,0),img1:_exImg(id,1)});
        seen.add(id); break;
      }
    }
  });
  return found;
}

function _isSupportSession(sess){
  return sess && (sess.type==='FORCE' || sess._type==='FORCE' || /Força|For\u00e7a|Core|Mobilidade|Alongamento/i.test(sess.text||sess.label||''));
}

function openExerciseGuide(w,d,si){
  const sessions=getEffectiveSessions(w,d);
  const sess=sessions.find(s=>s._origin==='plan'&&s._si===si)||sessions[si];
  if(!sess)return;
  const struct=(sess._plan_sess&&sess._plan_sess.structure)||sess.structure||[];
  let allEx=[];
  struct.forEach(b=>{ allEx=allEx.concat(_extractExercises(b.desc||'')); });
  const seen=new Set(); allEx=allEx.filter(e=>{ if(seen.has(e.id))return false; seen.add(e.id); return true; });

  let m=document.getElementById('exguide-modal');
  if(!m){ m=document.createElement('div'); m.id='exguide-modal'; m.style.cssText='display:none;position:fixed;inset:0;z-index:520;background:rgba(0,0,0,0.6);align-items:flex-end'; document.body.appendChild(m); }

  // Placeholder elegante (SVG neutro) para quando a foto não carregar
  const ph="this.onerror=null;this.style.display='none';this.nextElementSibling.style.display='flex';";

  const cards = allEx.length ? allEx.map((e,idx)=>`
    <div style="background:var(--bg);border:1px solid var(--border);border-radius:10px;overflow:hidden">
      <div style="position:relative;width:100%;aspect-ratio:1/1;background:#fff">
        <img src="${e.img0}" data-f0="${e.img0}" data-f1="${e.img1}" class="exg-photo" id="exg-img-${idx}" loading="lazy"
             style="width:100%;height:100%;object-fit:cover;display:block" onerror="${ph}">
        <div style="display:none;position:absolute;inset:0;background:var(--surface);align-items:center;justify-content:center;flex-direction:column;gap:6px">
          <svg width="34" height="34" viewBox="0 0 24 24" fill="none" stroke="var(--muted)" stroke-width="1.5"><circle cx="12" cy="7" r="3.2"/><path d="M5 21c0-4 3.2-6.5 7-6.5s7 2.5 7 6.5"/></svg>
          <div style="font-family:var(--font-ui);font-size:8px;color:var(--muted);letter-spacing:1px">SEM FOTO</div>
        </div>
      </div>
      <div style="padding:9px 10px">
        <div style="font-family:var(--font-body);font-size:12px;color:var(--text);line-height:1.2">${e.nome}</div>
        ${e.rep?`<div style="font-family:var(--font-ui);font-size:10px;color:var(--accent);letter-spacing:.5px;margin-top:2px">${e.rep}</div>`:''}
      </div>
    </div>`).join('') : '<div style="grid-column:1/-1;text-align:center;color:var(--muted2);font-family:var(--font-body);font-size:13px;padding:20px">Sem exercícios reconhecidos para este treino.</div>';

  m.innerHTML=`
    <div style="background:var(--surface);border-top:1px solid var(--border);border-radius:16px 16px 0 0;width:100%;max-height:88vh;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:0 0 40px">
      <div style="position:sticky;top:0;background:var(--surface);padding:18px 20px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;z-index:1">
        <div>
          <div style="font-family:var(--font-ui);font-size:9px;color:var(--accent);letter-spacing:2px;margin-bottom:3px">GUIA VISUAL</div>
          <div style="font-family:var(--font-display);font-size:20px;color:var(--text);line-height:1">${sess.text||sess.label||'Exercicios'}</div>
        </div>
        <button onclick="closeExerciseGuide()" style="background:none;border:none;color:var(--muted2);font-size:26px;cursor:pointer;line-height:1;padding:0 4px">&times;</button>
      </div>
      <div style="padding:16px 18px">
        <div style="display:grid;grid-template-columns:repeat(2,1fr);gap:12px">${cards}</div>
        <div style="font-family:var(--font-body);font-size:11px;color:var(--muted2);text-align:center;margin-top:16px;line-height:1.5">Fotos de referência de execução. As imagens alternam entre inicio e fim do movimento. Execute com controle e boa postura.</div>
        <button onclick="closeExerciseGuide()" style="width:100%;margin-top:18px;padding:15px;background:var(--surface2);border:1px solid var(--border);color:var(--text);font-family:var(--font-ui);font-size:12px;font-weight:700;letter-spacing:2px;border-radius:8px;cursor:pointer">FECHAR</button>
      </div>
    </div>`;
  m.style.display='flex';
  m.onclick=(e)=>{ if(e.target===m) closeExerciseGuide(); };
  // Trava o scroll do body enquanto o modal está aberto — sem isso, no iOS, um swipe pra baixo
  // dentro do modal as vezes "vaza" pro scroll da página de fundo e a tela parece travada
  // (nem o modal nem a página respondem direito ao gesto).
  document.body.style.overflow='hidden';
  // Swipe pra baixo fecha o modal — e o gesto natural que o atleta já tenta usar.
  const _sheet=m.firstElementChild;
  if(_sheet){
    let _touchStartY=null;
    _sheet.ontouchstart=(e)=>{ if(_sheet.scrollTop<=0) _touchStartY=e.touches[0].clientY; else _touchStartY=null; };
    _sheet.ontouchmove=(e)=>{ if(_touchStartY===null)return; const dy=e.touches[0].clientY-_touchStartY; if(dy>80) closeExerciseGuide(); };
    _sheet.ontouchend=()=>{ _touchStartY=null; };
  }

// ── RECALIBRAÇÃO SEMANAL DINÂMICA ──
// Analisa o que foi REALMENTE executado numa semana e ajusta o volume da próxima,
// fechando o ciclo plano -> execução -> analise -> plano ajustado.
const RECAL_KEY='nano_recal_v1';
function loadRecal(){try{return JSON.parse(localStorage.getItem(RECAL_KEY)||'{}')}catch(e){return{}}}
function saveRecal(o){try{localStorage.setItem(RECAL_KEY,JSON.stringify(o));}catch(e){}}
function getWeekAdjust(w){ const r=loadRecal(); return (r[w]&&typeof r[w].factor==='number')?r[w].factor:1; }

// Analisa a semana w: aderencia, volume real vs planejado, sensacao média
function analyzeWeek(w){
  const checks=loadChecks();
  let planned=0,done=0,volPlanned=0,volDone=0;
  const senseScore={ 'Fácil':1,'Moderado':2,'Forte':3,'Máximo':4 };
  let senseSum=0,senseCount=0;
  for(let d=0;d<7;d++){
    const week=getWeek(w); if(!week)continue;
    const raw=week.days[d]||[];
    raw.forEach((origSess,si)=>{
      if(origSess.type===REST||origSess.type==='FORCE')return; // força não entra no volume aerobico
      planned++;
      const vP=sessionVolume(origSess); const vpTotal=(vP.swim||0)+(vP.bike||0)+(vP.run||0);
      volPlanned+=vpTotal;
      const key=ck(w,d,si);
      if(checks[key]){
        done++;
        const ov=getOverride(w,d,si);
        const vD=sessionVolume(origSess,ov); volDone+=(vD.swim||0)+(vD.bike||0)+(vD.run||0);
        if(ov&&ov.sensacao&&senseScore[ov.sensacao]){ senseSum+=senseScore[ov.sensacao]; senseCount++; }
      }
    });
  }
  const adherence = planned>0 ? done/planned : 0;
  const volRatio = volPlanned>0 ? volDone/volPlanned : 0;
  const avgSense = senseCount>0 ? senseSum/senseCount : 0; // 0=sem dado, 1=fácil ... 4=máximo
  return { w, planned, done, adherence, volPlanned, volDone, volRatio, avgSense, senseCount };
}

// Decide o fator de ajuste para a PRÓXIMA semana com base na analise
function computeAdjustment(a, fase, lesoes){
  const hasLesao = Array.isArray(lesoes) && lesoes.length>0;
  const faseLow = (fase||'').toLowerCase();
  // Taper/pico nunca aumentam volume — são fases de afunilamento
  const isTaper = faseLow.includes('taper')||faseLow.includes('afunil')||faseLow.includes('pico')||faseLow.includes('peak');

  let factor=1, reason='Mantido', detail='';

  // Sem dados suficientes: não mexe
  if(a.done===0 || a.planned===0){
    return { factor:1, reason:'Sem dados', detail:'Marque treinos como concluidos para o coach recalibrar sua próxima semana.' };
  }

  if(isTaper){
    return { factor:1, reason:'Afunilamento', detail:'Fase de taper/pico: volume mantido de proposito para você chegar descansado.' };
  }

  // Regras de ajuste
  if(a.adherence>=0.85 && a.avgSense>0 && a.avgSense<=2.2){
    // Completou quase tudo e achou fácil/moderado -> pode subir
    factor = hasLesao ? 1.07 : 1.12;
    reason = 'Progressao';
    detail = `Você completou ${Math.round(a.adherence*100)}% dos treinos e a percepcao de esforco foi controlada. Subindo o volume${hasLesao?' com cautela pela sua lesao':''}.`;
  } else if(a.adherence>=0.85 && a.avgSense>=3.3){
    // Completou tudo mas achou muito forte -> segura
    factor = 1.0;
    reason = 'Consolidacao';
    detail = `Você completou bastante, mas o esforco percebido foi alto. Mantendo o volume para consolidar antes de subir.`;
  } else if(a.adherence>=0.5 && a.adherence<0.85){
    // Aderencia parcial -> mantem
    factor = 0.97;
    reason = 'Ajuste leve';
    detail = `Aderencia de ${Math.round(a.adherence*100)}%. Reduzindo levemente para você conseguir fechar a semana completa.`;
  } else if(a.adherence<0.5){
    // Aderencia baixa -> reduz para não acumular carga não cumprida
    factor = hasLesao ? 0.85 : 0.9;
    reason = 'Recuperação';
    detail = `Aderencia de ${Math.round(a.adherence*100)}%. Reduzindo o volume para retomar de forma sustentavel, sem culpa.`;
  } else {
    factor = 1.0; reason='Mantido'; detail='Volume mantido para a próxima semana.';
  }

  // ── AJUSTE POR VOLUME REAL EXECUTADO (Strava/manual) ──
  // Decisao do usuário: só conta se a diferença for CONSISTENTE (>=3 treinos na semana),
  // nunca um dia isolado. E sempre modulado pela sensacao, para não empurrar a lesao.
  // volRatio = volume real feito / volume planejado. >1.15 = fez bem mais; <0.85 = fez bem menos.
  if(a.done>=3 && a.volPlanned>0 && a.volRatio>0 && !isTaper){
    const muitoAcima = a.volRatio>=1.15;
    const muitoAbaixo = a.volRatio<=0.85;
    const senseControlada = a.avgSense>0 && a.avgSense<=2.5; // fácil/moderado
    const senseAlta = a.avgSense>=3.3;                        // forte/máximo

    if(muitoAcima && senseControlada){
      // Fez consistentemente mais e aguentou bem -> reforca a subida (com teto pela lesao)
      const bump = hasLesao ? 0.03 : 0.05;
      factor += bump;
      reason = 'Progressao (volume real)';
      const pct=Math.round((a.volRatio-1)*100);
      detail = `Você executou ~${pct}% acima do volume sugerido em ${a.done} treinos, com esforco controlado. O coach acompanhou e subiu o plano${hasLesao?' com cautela pela sua lesao':''}.`;
    } else if(muitoAcima && senseAlta){
      // Fez mais, mas o corpo reclamou -> NÃO sobe por causa do volume; segura
      factor = Math.min(factor, 1.0);
      reason = 'Cautela (esforco alto)';
      detail = `Você fez volume acima do sugerido, mas a percepcao de esforco foi alta. O coach segurou o volume para proteger sua recuperação e evitar lesao.`;
    } else if(muitoAbaixo){
      // Fez consistentemente menos que o planejado (mesmo "completando") -> não insiste em subir
      factor = Math.min(factor, hasLesao ? 0.95 : 0.98);
      reason = 'Ajuste ao real';
      const pct=Math.round((1-a.volRatio)*100);
      detail = `Seu volume executado ficou ~${pct}% abaixo do sugerido em ${a.done} treinos. O coach aproximou o plano do que você está realmente fazendo, para ele ser sustentavel.`;
    }
  }

  // Trava de segurança: nunca ajustar mais que +15% ou -20%
  factor = Math.max(0.8, Math.min(1.15, factor));
  return { factor:+factor.toFixed(3), reason, detail };
}

// ── POP-UP DE RECALIBRAÇÃO NO FECHAMENTO DA SEMANA ──
// Mostra automaticamente (1x por semana) quando uma semana fecha e o coach recalibrou a próxima.
// Fecha o loop emocional: "você evoluiu, seu plano subiu" ou "vamos ajustar, sem culpa".
function checkRecalPopup(){
  try{
    if(!hasRace && !getAllWeeks().length) return;
    const {w:cw}=getCurrentWeekAndDay();
    if(cw<=1) return; // sem semana anterior fechada
    // garante que a recalibração da semana atual (baseada na anterior) exista
    const prevAnalysis=analyzeWeek(cw-1);
    if(prevAnalysis.done<=0) return; // semana anterior sem execução, nada a comunicar
    let recal=loadRecal()[cw];
    if(!recal){ recalibrateWeek(cw-1); recal=loadRecal()[cw]; }
    if(!recal || !recal.factor) return;
    // já mostrou o popup desta semana?
    const shownKey='mytri_recal_popup_shown';
    let shown={}; try{ shown=JSON.parse(localStorage.getItem(shownKey)||'{}'); }catch(e){}
    if(shown[cw]) return;
    // marca como mostrado e exibe
    shown[cw]=Date.now();
    try{ localStorage.setItem(shownKey,JSON.stringify(shown)); }catch(e){}
    setTimeout(()=>showRecalPopup(cw,recal,prevAnalysis),1200);
  }catch(e){}
}

// Recalibra a semana alvo (próxima) com base na analise da semana fonte (anterior)
function recalibrateWeek(sourceWeek){
  const targetWeek = sourceWeek+1;
  const totalW = planWeekCount()||16;
  if(targetWeek>totalW) return null;
  const a = analyzeWeek(sourceWeek);
  const rawWeek = getAllWeeks().find(wk=>wk.w===targetWeek) || {};
  const fase = rawWeek.faseLabel||'';
  const prof = getMytriProfile();
  const adj = computeAdjustment(a, fase, prof.lesoes||[]);
  const r=loadRecal();
  r[targetWeek]={ factor:adj.factor, reason:adj.reason, detail:adj.detail, source:sourceWeek, ts:Date.now(), analysis:{adherence:a.adherence,volRatio:a.volRatio,avgSense:a.avgSense} };
  saveRecal(r);
  return r[targetWeek];
}

// ── VOLUME PARSER ──
function sessionVolume(sess,ov){
  const out={swim:0,bike:0,run:0};
  // Usar stravaDist se disponível (dado real), senão dist do plano.
  // Extras podem ter sess.dist guardando TEMPO (ex "43min") quando o Strava não reportou
  // distancia (rolo sem sensor, GPS perdido) — se contar isso como km, "43min" vira "43km"
  // no volume acumulado e distorce as proporcoes das barras por modalidade.
  let dist=(ov&&ov.stravaDist)||sess.dist||'';
  if(sess._origin==='extra'&&/min/i.test(dist))dist='';
  const parts=dist.split('+').map(s=>s.trim()).filter(Boolean);
  if(sess.type===BRICK&&parts.length>1){
    if(parts.length===2){out.bike=parseFloat(parts[0])||0;out.run=parseFloat(parts[1])||0;}
    else if(parts.length===3){out.swim=(parseFloat(parts[0])||0)/1000;out.bike=parseFloat(parts[1])||0;out.run=parseFloat(parts[2])||0;}
    return out;
  }
  const n=parseFloat(dist)||0;
  if(sess.type===SWIM)out.swim=n/1000;
  else if(sess.type===BIKE||sess.type===BRICK)out.bike=n;
  else if(sess.type===RUN)out.run=n;
  return out;
}

function showWorkoutDetail(w,d,key){
  const sessions=getEffectiveSessions(w,d);
  // achar a sessão pelo key. O card gera o key com ck() (formato "wN_dN_sN") para sessões de
  // plano e "ex_wN_dN_iN" para extras. Antes comparavamos com ovKey() (prefixo "o_"), que NUNCA
  // batia -> caia no fallback e abria SEMPRE a 1a sessão do dia (bug: força abria disclaimer da corrida).
  let sess=null;
  sessions.forEach(s=>{
    const k = s._origin==='plan' ? ck(w,d,s._si) : `ex_w${w}_d${d}_i${s._idx}`;
    if(k===key || s._key===key) sess=s;
  });
  if(!sess) sess=sessions.find(s=>s.text)||sessions[0];
  if(!sess){ return; }
  const modal=document.getElementById('workout-detail-modal');
  const color=(typeof colorMap!=='undefined'&&colorMap[sess.type])||'#00e676';
  const struct=sess.structure||(sess._plan_sess&&sess._plan_sess.structure)||null;
  const coach=sess.coach||(sess._plan_sess&&sess._plan_sess.coach)||'';
  const typeLabels={swim:'NATAÇÃO',bike:'BIKE',run:'CORRIDA',brick:'TIJOLO',gym:'FORÇA',rest:'DESCANSO'};
  // Para corrida/bike medidas em distancia, distribuir a distancia TOTAL real (do cabecalho)
  // entre os blocos, ponderando por duração E velocidade relativa de cada zona.
  const _distStr=(sess.dist||'');
  const _distMatch=_distStr.match(/([\d.]+)\s*km/);
  const _totalKm=_distMatch?parseFloat(_distMatch[1]):0;
  const _isDistBased=(sess.type==='run'||sess.type==='bike')&&_totalKm>0&&struct&&struct.length;
  let _blocoDistMap={};
  if(_isDistBased){
    const zoneSpd = sess.type==='run'
      ? {Z1:8.5,Z2:10,Z3:11.5,Z4:13}
      : {Z1:24,Z2:30,Z3:34,Z4:38};
    // peso = duração * velocidade da zona (aproxima a fracao de distancia de cada bloco)
    let totalWeight=0;
    struct.forEach((b,i)=>{ const spd=zoneSpd[b.zone]||(sess.type==='run'?10:30); const wgt=(b.dur||0)*spd; _blocoDistMap[i]=wgt; totalWeight+=wgt; });
    struct.forEach((b,i)=>{ _blocoDistMap[i]= totalWeight>0 ? (_totalKm*_blocoDistMap[i]/totalWeight) : 0; });
  }
  function _blocoDistKm(b,i){
    if(!_isDistBased)return null;
    const km=_blocoDistMap[i];
    return (km&&km>=0.1)?km.toFixed(1):null;
  }
  let structHtml='';

          <div style="font-family:var(--font-ui);font-size:8px;color:var(--muted);letter-spacing:1px">MIN</div>
          ${_blocoDistKm(b,_bi)?`<div style="font-family:var(--font-ui);font-size:8px;color:${color};letter-spacing:.5px;margin-top:2px">~${_blocoDistKm(b,_bi)}km</div>`:''}
        </div>
        <div style="flex:1">
          <div style="display:flex;align-items:center;gap:8px;margin-bottom:3px">
            <span style="font-family:var(--font-ui);font-size:12px;font-weight:700;color:var(--text);letter-spacing:.3px">${b.part}</span>
            ${b.zone?`<span style="font-family:var(--font-ui);font-size:9px;color:${color};border:1px solid ${color}55;border-radius:3px;padding:1px 5px;letter-spacing:.5px">${b.zone}</span>`:''}
          </div>
          ${b.fc?`<div style="font-family:var(--font-ui);font-size:10px;color:var(--muted);margin-bottom:3px">${b.fc}</div>`:''}
          <div style="font-family:var(--font-body);font-size:12px;color:var(--muted2);line-height:1.45">${b.desc||''}</div>
        </div>
      </div>`).join('');
  } else {
    structHtml=`<div style="font-family:var(--font-body);font-size:13px;color:var(--muted2);padding:16px 0">Treino livre — siga o volume/distancia indicado no card.</div>`;
  }
  modal.innerHTML=`
    <div style="background:var(--surface);border-top:1px solid var(--border);border-radius:16px 16px 0 0;width:100%;max-height:85vh;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:0 0 calc(40px + env(safe-area-inset-bottom))">

        <div style="display:flex;align-items:center;justify-content:space-between">
          <div>
            <div style="font-family:var(--font-ui);font-size:10px;color:${color};letter-spacing:2px;margin-bottom:4px">${typeLabels[sess.type]||''}${sess.dist?' · '+sess.dist:''}</div>
            <div style="font-family:var(--font-display);font-size:24px;color:var(--text);line-height:1">${sess.text||''}</div>
          </div>
          <button onclick="closeWorkoutDetail()" style="background:none;border:none;color:var(--muted2);font-size:26px;cursor:pointer;line-height:1;padding:0 4px">&times;</button>
        </div>
      </div>
      <div style="padding:8px 22px 0">

          // Calcula UMA vez se a sessão já foi executada (real). Se sim: a pessoa já fez o treino,

          const _ov=sess._origin==='plan'?getOverride(w,d,sess._si):null;
          const _isExtra=sess._origin==='extra';
          const _extraReal=_isExtra&&(sess.dist||sess.note||sess.cal);
          const _real=(_ov&&(_ov.stravaData||_ov.stravaDist||_ov.stravaTime))||_extraReal||null;

          const _realBlock=(()=>{

function showAddModal(w,d,opts){
  const isEdit=!!opts;
  const isExtraEdit=isEdit&&opts.extraIdx!==undefined;
  let preIdx=0,preNote='',preVals={};
  function isGym(idx){return activityTypes[idx]&&activityTypes[idx].type===GYM;}
  if(isEdit){
    const s=opts.sess;
    preNote=s.note||'';
    // Para GYM: note guarda número de séries. Para outros: guarda Z1-Z4
    let found=activityTypes.findIndex(a=>a.label.toLowerCase()===(s.text||'').toLowerCase());
    if(found<0)found=activityTypes.findIndex(a=>a.type===s.type);
    if(found>=0)preIdx=found;
    if(!isGym(preIdx)){
      // Usar _zone passada diretamente, ou extrair do note
      if(opts._zone&&zones[opts._zone]){preNote=opts._zone;}
      else{const zMatch=preNote.match(/Z[1-4]/);preNote=zMatch?zMatch[0]:'';}
    }
    // Nao preenche o campo com numeros vindos de um texto de TEMPO (ex "26min") — isso e
    // usado como valor de exibicao quando o treino nao tem distancia real (rolo sem sensor,
    // GPS perdido), e extrair digitos dali fazia "26min" virar "26km" sugerido no campo.
    const distStr=s.dist||'';
    const nums=/min/i.test(distStr) ? [] : (distStr.match(/[\d.]+/g)||[]);
    const flds=activityTypes[preIdx].fields;
    flds.forEach((f,i)=>{if(nums[i]!==undefined)preVals[f.key]=nums[i];});
  }

  function fieldsHtml(idx){
    const flds=activityTypes[idx].fields;
    if(!flds.length)return'';
    return flds.map(f=>`
      <div class="modal-input-row">
        <label class="modal-label">${f.label}</label>
        <div class="mx-field-wrap">
          <input type="number" class="mx-field" data-key="${f.key}" data-unit="${f.unit}" placeholder="" step="0.1" min="0" inputmode="decimal" value="${preVals[f.key]||''}">
          <span class="mx-field-mirror"></span>
          <span class="mx-field-unit" data-unit="${f.unit}"></span>
        </div>
      </div>`).join('');
  }

  function wireFieldUnits(root){
    root.querySelectorAll('.mx-field-wrap').forEach(wrap=>{
      const input=wrap.querySelector('.mx-field');
      const mirror=wrap.querySelector('.mx-field-mirror');
      const unit=wrap.querySelector('.mx-field-unit');
      const u=input.dataset.unit;
      function sync(){
        const v=input.value;
        if(v){mirror.textContent=v;const w=mirror.getBoundingClientRect().width;unit.textContent=u;unit.style.left=(w-6)+'px';unit.classList.add('show');}
        else{unit.classList.remove('show');}
      }
      input.addEventListener('input',sync);sync();
    });
  }

  function extraFieldHtml(idx,preNote){
    if(isGym(idx)){
      const preS=preNote&&/^\d+$/.test(preNote)?preNote:'';
      return`<div class="modal-input-row">
        <label class="modal-label">SERIES REALIZADAS</label>
        <div class="mx-field-wrap">
          <input type="number" class="mx-field" data-key="series" data-unit="x" placeholder="" step="1" min="0" inputmode="numeric" value="${preS}">
          <span class="mx-field-mirror"></span>
          <span class="mx-field-unit" data-unit="x"></span>
        </div></div>`;
    }
    return`<div class="modal-input-row">
      <label class="modal-label" style="margin-top:12px;display:block">ZONA (OPCIONAL)</label>
      <select id="mx-note">
        <option value="">Sem zona</option>
        <option value="Z1"${preNote==='Z1'?' selected':''}>Z1 - Recuperação</option>
        <option value="Z2"${preNote==='Z2'?' selected':''}>Z2 - Aerobico base</option>
        <option value="Z3"${preNote==='Z3'?' selected':''}>Z3 - Tempo/Limiar</option>
        <option value="Z4"${preNote==='Z4'?' selected':''}>Z4 - Intenso</option>
      </select></div>`;
  }

  const ov=document.createElement('div');
  ov.className='modal-overlay';
  ov.innerHTML=`
    <div class="modal">
      <div class="modal-head">
        <div class="modal-title">${isEdit?'EDITAR <span>TREINO</span>':'+ ADICIONAR <span>ATIVIDADE</span>'}</div>
      </div>
      <div class="modal-body">
        <div class="modal-input-row">
          <label class="modal-label">TIPO DE TREINO</label>
          <select id="mx-type">${activityTypes.map((a,i)=>'<option value="'+i+'"'+(i===preIdx?' selected':'')+'>'+a.label+'</option>').join('')}</select>
        </div>
        <div id="mx-fields">${fieldsHtml(preIdx)}</div>
        <div id="mx-extra">${extraFieldHtml(preIdx,preNote)}</div>
      </div>
      <div class="modal-foot">
        <button class="modal-cancel" id="mx-cancel">CANCELAR</button>
        <button class="modal-save" id="mx-save">${isEdit?'SALVAR':'ADICIONAR'}</button>
      </div>
    </div>`;
  document.body.appendChild(ov);
  const sel=ov.querySelector('#mx-type');
  const fieldsBox=ov.querySelector('#mx-fields');
  const extraBox=ov.querySelector('#mx-extra');
  wireFieldUnits(fieldsBox);
  sel.addEventListener('change',function(){
    const i=parseInt(sel.value);
    fieldsBox.innerHTML=fieldsHtml(i);
    wireFieldUnits(fieldsBox);
    extraBox.innerHTML=extraFieldHtml(i,'');
    wireFieldUnits(extraBox);
  });
  ov.querySelector('#mx-cancel').addEventListener('click',function(){ov.remove();});
  ov.addEventListener('click',function(e){if(e.target===ov)ov.remove();});
  ov.querySelector('#mx-save').addEventListener('click',function(){
    const i=parseInt(sel.value);
    const a=activityTypes[i];
    // Pegar nota: zona (select) ou séries (input numérico para GYM)
    let note='';
    if(isGym(i)){
      const si=extraBox.querySelector('.mx-field');
      note=si?si.value.trim():'';
    }else{
      const ns=ov.querySelector('#mx-note');
      note=ns?ns.value:'';
    }
    const parts=[];
    ov.querySelectorAll('#mx-fields .mx-field').forEach(inp=>{const v=inp.value.trim();if(v)parts.push(v+inp.dataset.unit);});
    const distStr=parts.join(' + ');
    if(isExtraEdit){
      const e=loadExtras();const k=extraKey(w,d);
      if(e[k]&&e[k][opts.extraIdx]){
        const origNote=opts._origNote;
        const origCal=opts._origCal;
        // Preservar realData (linha sombreada) e cal — só atualizar label/tipo
        e[k][opts.extraIdx]={...e[k][opts.extraIdx],label:a.label,text:a.label,type:a.type,manualLabel:true};
        if(distStr)e[k][opts.extraIdx].dist=distStr;
        if(note&&zones[note]){e[k][opts.extraIdx].manualZone=note;}
        // Para GYM: incorporar séries na linha sombreada sem apagar dados do Strava
        if(a.type===GYM&&note){
          const baseNote=origNote||'';
          // Se já tem dados do Strava na note, adicionar séries no final
          const seriesStr=note+'x séries';
          if(baseNote&&!baseNote.includes('séries'))e[k][opts.extraIdx].note=baseNote+' · '+seriesStr;
          else if(!baseNote)e[k][opts.extraIdx].note=seriesStr;
          // Salvar séries separadamente também
          e[k][opts.extraIdx].series=note;
        }else if(!origNote||origNote===note){
          e[k][opts.extraIdx].note=note;
        }
        saveExtras(e);
      }
    }else if(isEdit){
      // Preservar campos do Strava — só atualizar campos editáveis pelo usuário
      const existingOv=getOverride(w,d,opts.si)||{};
      const patch={type:a.type,text:a.label,note:note};
      if(distStr)patch.dist=distStr;
      // Salvar zona manual em campo dedicado para não conflitar com note/stravaZone
      if(note&&zones[note])patch.manualZone=note;
      // Para GYM: incorporar séries no stravaData sem apagar
      if(a.type===GYM&&note){
        const baseStrava=existingOv.stravaData||'';
        const seriesStr=note+'x séries';
        if(baseStrava&&!baseStrava.includes('séries'))patch.stravaData=baseStrava+' · '+seriesStr;
        patch.series=note;
      }
      setOverride(w,d,opts.si,patch);
    }else{
      addExtra(w,d,{label:a.label,type:a.type,dist:distStr,note:note});
    }
    ov.remove();refreshHoje();
  });
}

// ── SWIPE TO DELETE ──
function attachSwipe(wrap,card,onDelete){
  let startX=0,startY=0,curX=0,dragging=false,decided=false,horizontal=false;
  const THRESH=80,TRIGGER=160;

  function setX(x,animate){
    if(animate)card.style.transition='transform .3s cubic-bezier(.25,.8,.35,1)';
    else card.style.transition='none';
    card.style.transform='translateX('+x+'px)';
  }
  function snapBack(){setX(0,true);wrap.classList.remove('swiped');}
  function snapOpen(){setX(-THRESH,true);wrap.classList.add('swiped');}
  function doDelete(){
    setX(-window.innerWidth,true);
    wrap.classList.add('removing');
    wrap.style.height=wrap.offsetHeight+'px';
    requestAnimationFrame(()=>{wrap.style.height='0';wrap.style.margin='0';});
    setTimeout(onDelete,280);
  }

  function down(e){
    if(reorderMode)return;
    // Se outro card está aberto, fecha ele
    document.querySelectorAll('.swipe-wrap.swiped').forEach(w=>{
      if(w!==wrap){
        w.classList.remove('swiped');
        w.querySelector('.session-card').style.transition='transform .3s cubic-bezier(.25,.8,.35,1)';
        w.querySelector('.session-card').style.transform='translateX(0)';
      }
    });
    const t=e.touches?e.touches[0]:e;
    startX=t.clientX;startY=t.clientY;curX=0;dragging=true;decided=false;horizontal=false;
  }
  function move(e){
    if(!dragging)return;
    const t=e.touches?e.touches[0]:e;
    const dx=t.clientX-startX,dy=t.clientY-startY;
    if(!decided&&(Math.abs(dx)>6||Math.abs(dy)>6)){
      decided=true;horizontal=Math.abs(dx)>Math.abs(dy);
      if(!horizontal){dragging=false;return;}
    }
    if(!horizontal)return;
    if(e.cancelable)e.preventDefault();
    curX=Math.min(0,dx);
    if(curX<-TRIGGER)curX=-TRIGGER-(Math.abs(curX)-TRIGGER)*0.2;
    setX(curX,false);
  }
  function up(){
    if(!dragging)return;dragging=false;
    if(!horizontal)return;
    if(curX<=-TRIGGER)doDelete();
    else if(curX<-THRESH/2)snapOpen();
    else snapBack();
  }

  wrap.querySelector('.swipe-delete-bg').addEventListener('click',()=>{
    if(wrap.classList.contains('swiped'))doDelete();
  });
  // Tocar no card enquanto está aberto fecha
  card.addEventListener('click',()=>{
    if(wrap.classList.contains('swiped')){snapBack();}
  });

  card.addEventListener('touchstart',down,{passive:true});
  card.addEventListener('touchmove',move,{passive:false});
  card.addEventListener('touchend',up);
  card.addEventListener('mousedown',down);
  window.addEventListener('mousemove',move);
  window.addEventListener('mouseup',up);
}

function commitOrder(list,w,d){const keys=[...list.querySelectorAll('.swipe-wrap')].map(el=>el.dataset.okey);setOrder(w,d,keys);}

function attachLongPressReorder(wrap,card,list,w,d){
  let timer=null,dragging=false,startY=0,placeholder=null,offsetY=0;

  function cleanup(){
    if(!dragging)return;
    dragging=false;
    reorderMode=false;
    // Parar wiggle: remover classe reordering do container imediatamente
    const vh=document.getElementById('agenda-content')||document.getElementById('view-hoje');
    if(vh)vh.classList.remove('reordering');
    // Restaurar card posição
    card.style.transition='';card.style.transform='';card.style.zIndex='';
    card.style.position='';card.style.left='';card.style.right='';
    card.style.top='';card.style.width='';card.style.boxShadow='';card.style.pointerEvents='';
    wrap.classList.remove('dragging');
    if(placeholder&&placeholder.parentNode){placeholder.parentNode.replaceChild(wrap,placeholder);placeholder=null;}
    commitOrder(list,w,d);
    refreshHoje();
  }

  function startDrag(clientY){
    dragging=true;
    if(navigator.vibrate)navigator.vibrate(12);
    const rect=wrap.getBoundingClientRect();
    offsetY=clientY-rect.top;
    placeholder=document.createElement('div');
    placeholder.className='drag-placeholder';
    placeholder.style.height=rect.height+'px';
    list.insertBefore(placeholder,wrap);
    wrap.classList.add('dragging');
    wrap.style.position='fixed';
    wrap.style.left=rect.left+'px';
    wrap.style.right='auto';
    wrap.style.width=rect.width+'px';
    wrap.style.zIndex='999';
    wrap.style.top=(clientY-offsetY)+'px';
    wrap.style.transition='none';
    document.body.appendChild(wrap);
  }

  function moveDrag(clientY){
    if(!dragging)return;
    wrap.style.top=(clientY-offsetY)+'px';
    for(const sib of list.children){
      if(sib===placeholder)continue;
      const r=sib.getBoundingClientRect();
      if(clientY<r.top+r.height/2){list.insertBefore(placeholder,sib);return;}
    }
    list.appendChild(placeholder);
  }

  // Reorder via botão — pressão longa ativa drag
  function onDown(e){
    if(!reorderMode)return;
    const t=e.touches?e.touches[0]:e;
    startY=t.clientY;
    timer=setTimeout(()=>startDrag(t.clientY),120);
  }
  function onMove(e){
    const t=e.touches?e.touches[0]:e;
    if(!dragging){
      if(timer&&Math.abs(t.clientY-startY)>8){clearTimeout(timer);timer=null;}
      return;
    }
    if(e.cancelable)e.preventDefault();
    moveDrag(t.clientY);
  }
  function onUp(){
    if(timer){clearTimeout(timer);timer=null;}
    if(dragging)cleanup();
  }

  // Long-press em qualquer card (~1200ms) entra em reorder e inicia drag
  let lpTimer=null,lpY=0;
  function lpDown(e){
    if(reorderMode)return;
    const t=e.touches?e.touches[0]:e;
    lpY=t.clientY;
    lpTimer=setTimeout(()=>{
      reorderMode=true;
      const c=document.getElementById('agenda-content')||document.getElementById('view-hoje');
      if(c)c.classList.add('reordering');
      const rb=document.getElementById('reorder-btn');
      if(rb){rb.innerHTML='SOLTE PARA CONFIRMAR';rb.classList.add('active');}
      startDrag(t.clientY);
    },1200);
  }
  function lpMove(e){
    const t=e.touches?e.touches[0]:e;
    if(lpTimer&&Math.abs(t.clientY-lpY)>4){clearTimeout(lpTimer);lpTimer=null;}
    if(dragging){if(e.cancelable)e.preventDefault();moveDrag(t.clientY);}
  }
  function lpUp(){
    if(lpTimer){clearTimeout(lpTimer);lpTimer=null;}
    if(dragging)cleanup();
  }

  const handle=card.querySelector('.drag-handle');
  if(handle){
    handle.addEventListener('touchstart',onDown,{passive:true});
    handle.addEventListener('mousedown',onDown);
  }
  card.addEventListener('touchstart',lpDown,{passive:true});
  card.addEventListener('mousedown',lpDown);
  window.addEventListener('touchmove',e=>{onMove(e);lpMove(e);},{passive:false});
  window.addEventListener('touchend',()=>{onUp();lpUp();});
  window.addEventListener('mousemove',e=>{onMove(e);lpMove(e);});
  window.addEventListener('mouseup',()=>{onUp();lpUp();});
}

// ── CLIMA & LOCALIZAÇÃO ──
let _weatherCache=null;

// Helper: data local YYYY-MM-DD
function _localDateStr(d){
  d=d||new Date();
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}
function _weatherIcon(code,hour){
  // Se hora passada e >= 19h ou < 6h, usar lua para tempo bom/parcial
  const noite=(hour!==undefined)&&(hour>=19||hour<6);
  // WMO weather codes
  if(code<=1)return noite?'🌙':'☀';
  if(code<=3)return noite?'🌙':'⛅';
  if(code<=49)return'🌫';
  if(code<=67)return'🌧';
  if(code<=77)return'❄';
  if(code<=82)return'🌧';
  if(code<=99)return'⛈';
  return'🌡';
}

function _dayLabel(offsetDays){
  if(offsetDays===0)return'Hoje';
  if(offsetDays===1)return'Amanhã';
  const days=['Dom','Seg','Ter','Qua','Qui','Sex','Sab'];
  const d=new Date();d.setDate(d.getDate()+offsetDays);
  return days[d.getDay()];
}

async function fetchWeather(){
  if(_weatherCache&&(Date.now()-_weatherCache.ts)<30*60*1000)return _weatherCache;
  return new Promise(resolve=>{
    if(!navigator.geolocation){resolve(null);return;}
    navigator.geolocation.getCurrentPosition(async pos=>{
      try{
        const {latitude:lat,longitude:lon}=pos.coords;
        // Open-Meteo: gratuito, sem API key, retorna forecast 7 dias
        const url=`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,weathercode,windspeed_10m,relativehumidity_2m&daily=weathercode,temperature_2m_max,temperature_2m_min&hourly=temperature_2m,weathercode&timezone=auto&forecast_days=7`;
        const r=await fetch(url);
        const j=await r.json();
        const cur=j.current;
        const daily=j.daily;
        const hourly=j.hourly;
        let city='';
        try{
          const geo=await fetch(`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lon}&format=json`);
          const gj=await geo.json();
          city=gj.address?.city||gj.address?.town||gj.address?.suburb||gj.address?.county||'';
        }catch(e){}
        const forecast=daily.time.map((date,i)=>({
          label:_dayLabel(i),icon:_weatherIcon(daily.weathercode[i]),
          max:Math.round(daily.temperature_2m_max[i]),min:Math.round(daily.temperature_2m_min[i]),
          date:date,
        }));
        // Indexar horas por data (YYYY-MM-DD)
        const hourlyByDay={};
        if(hourly&&hourly.time){
          hourly.time.forEach((t,i)=>{
            const d=t.slice(0,10);
            if(!hourlyByDay[d])hourlyByDay[d]=[];
            const _h=parseInt(t.slice(11,13),10);hourlyByDay[d].push({h:_h+'h',temp:Math.round(hourly.temperature_2m[i]),icon:_weatherIcon(hourly.weathercode[i],_h)});
          });
        }
        _weatherCache={
          temp:Math.round(cur.temperature_2m),icon:_weatherIcon(cur.weathercode,new Date().getHours()),
          humidity:cur.relativehumidity_2m,wind:Math.round(cur.windspeed_10m),
          city,forecast,hourlyByDay,ts:Date.now()
        };
        resolve(_weatherCache);      }catch(e){resolve(null);}
    },()=>resolve(null),{timeout:8000,enableHighAccuracy:false});
  });
}

function _renderWeatherWidgetEl(el,data,dateStr){
  if(!el||!data)return;
  const dayKey=dateStr||_localDateStr();
  const todayKey=_localDateStr();
  const isToday=dayKey===todayKey;
  const hours=(data.hourlyByDay&&data.hourlyByDay[dayKey])||[];
  const nowH=new Date().getHours();
  const filtered=isToday
    ?hours.filter(h=>parseInt(h.h)>=nowH&&parseInt(h.h)<=23)
    :hours.filter(h=>parseInt(h.h)<=23);

  const hourlyHtml=filtered.length?`
    <div style="overflow-x:auto;-webkit-overflow-scrolling:touch;border-top:1px solid var(--border);margin-top:4px;padding-top:4px">
      <div style="display:flex;min-width:max-content">
        ${filtered.map(h=>`
          <div style="text-align:center;min-width:32px;padding:0 2px">
            <div style="font-family:var(--font-ui);font-size:8px;color:var(--muted);letter-spacing:.3px">${h.h}</div>
            <div style="font-size:10px;line-height:1.2">${h.icon}</div>
            <div style="font-family:var(--font-display);font-size:11px;color:var(--text)">${h.temp}°</div>
          </div>`).join('')}
      </div>
    </div>`:'';

  const _mo=new Date(dayKey).getMonth()+1;
  // Hemisfério Sul: Dez/Jan/Fev=Verão, Mar/Abr/Mai=Outono, Jun/Jul/Ago=Inverno, Set/Out/Nov=Primavera
  const _season=_mo>=12||_mo<=2?'VERAO':_mo<=5?'OUTONO':_mo<=8?'INVERNO':'PRIMAVERA';
  if(isToday){
    el.innerHTML=`
      <div style="display:flex;align-items:center">
        <span style="font-family:var(--font-display);font-size:15px;color:var(--text);letter-spacing:1px">${data.temp}°C</span>
        <span style="font-size:12px;margin-left:4px">${data.icon}</span>
        <span style="font-family:var(--font-ui);font-size:8px;color:var(--muted);letter-spacing:.8px;margin-left:7px;text-transform:uppercase;border-left:1px solid var(--border);padding-left:7px">${data.city} &middot; ${data.humidity}% &middot; ${data.wind}km/h &middot; ${_season}</span>
      </div>
      ${hourlyHtml}`;
  }else{
    const f=data.forecast&&data.forecast.find(fd=>fd.date===dayKey);
    el.innerHTML=`
      <div style="display:flex;align-items:center;gap:6px">
        ${f?`<span style="font-size:14px">${f.icon}</span><span style="font-family:var(--font-display);font-size:15px;color:var(--text)">${f.max}°</span><span style="font-family:var(--font-ui);font-size:11px;color:var(--muted)">/ ${f.min}°</span>`:''}
      </div>
      ${hourlyHtml}`;
  }
}

function _loadWeather(){
  fetchWeather().then(data=>{
    if(data){const el=document.getElementById('weather-widget');if(el)_renderWeatherWidgetEl(el,data);}
  });
}

function _buildDaySlide(w,d){
  const slide=document.createElement('div');
  slide.style.cssText='width:100%;box-sizing:border-box;';
  const week=getWeek(w);
  if(!week){
    slide.innerHTML='<div style="padding:40px;text-align:center;color:var(--muted);font-family:var(--font-display);font-size:28px;letter-spacing:1px">PLANO CONCLUIDO</div>';
    return slide;
  }
  const cellDate=new Date(PLAN_START);cellDate.setDate(PLAN_START.getDate()+(w-1)*7+d);
  const cellDateStr2=cellDate.toDateString();
  const isToday=new Date().toDateString()===cellDateStr2;
  const dateStr=cellDate.toLocaleDateString(t('locale_code'),{weekday:'long',day:'numeric',month:'long'});
  const dayName=t('day'+d);
  const header=document.createElement('div');
  header.className='hoje-header';
  const atStart=w===1&&d===0, atEnd=w===16&&d===6;
  // Calcular calorias totais do dia
  const totalCal=(()=>{
    let cal=0;
    getEffectiveSessions(w,d).forEach(sess=>{
      if(sess._origin==='plan'){
        const ov=getOverride(w,d,sess._si);
        if(ov&&ov.stravaCal){cal+=parseInt(ov.stravaCal)||0;}
      }else if(sess._origin==='extra'&&sess.cal){
        cal+=parseInt(sess.cal)||0;
      }
    });
    return cal;
  })();

  header.innerHTML=`
    <div class="hoje-nav-row">
      <button class="hoje-nav-btn" onclick="hojeNavDay(-1)" ${atStart?'disabled':''}>&#8592;</button>
      <div class="hoje-date" style="flex:1;text-align:center">${dateStr.toUpperCase()}</div>
      <button class="hoje-nav-btn" onclick="hojeNavDay(1)" ${atEnd?'disabled':''}>&#8594;</button>
    </div>
    <div class="hoje-title" style="${isToday?'color:var(--accent)':''}">${dayName.toUpperCase()}</div>
    <div style="display:flex;align-items:center;gap:10px">
      <div class="hoje-week">${t('week_label')} ${w} &middot; ${getWeekDates(w)}</div>
      ${totalCal>0?`<div style="font-family:var(--font-ui);font-size:9px;color:var(--muted);letter-spacing:.5px">${totalCal} KCAL</div>`:''}
    </div>`;
  // Profile mini card removido — agora existe aba dedicada PERFIL no nav

  slide.appendChild(header);

  // Widget de clima — dentro do slide
  const wDiv=document.createElement('div');
  wDiv.id='weather-widget';
  wDiv.style.cssText='display:none;margin:0 16px 4px;padding:6px 12px;border-left:2px solid var(--border2);background:transparent;';
  slide.appendChild(wDiv);
  const cellDateKey=cellDate.toISOString().slice(0,10);
  if(_weatherCache){
    // Só mostrar se for hoje OU se tiver previsão para esse dia
    const hasDataForDay=isToday||((_weatherCache.forecast||[]).some(fd=>fd.date===cellDateKey)&&(_weatherCache.hourlyByDay||{})[cellDateKey]);
    if(hasDataForDay){wDiv.style.display='block';_renderWeatherWidgetEl(wDiv,_weatherCache,cellDateKey);}
  }else if(isToday){
    fetchWeather().then(data=>{
      if(data){
        wDiv.style.display='block';
        _renderWeatherWidgetEl(wDiv,data,cellDateKey);
        if(currentTab==='semana')_renderSemana(semanaWeek||hojeWeek);
      }
    });
  }
  const daySessions=week.days[d]||[];
  const effective=getEffectiveSessions(w,d);
  const isAllRest=daySessions.length>0&&daySessions.every(s=>s.type===REST)&&getExtras(w,d).length===0;
  if(isAllRest){
    const rc=document.createElement('div');rc.className='rest-day-card';rc.style.marginTop='16px';
    rc.innerHTML=daySessions[0]?.text||'DESCANSO';
    slide.appendChild(rc);
  }else{
    const list=document.createElement('div');list.className='hoje-list';list.id='hoje-list';
    list.style.cssText='padding:0 16px;padding-top:12px;display:flex;flex-direction:column;gap:8px';
    slide.appendChild(list);
    effective.forEach((sess,si)=>{
      const okey=sess._origin+':'+(sess._origin==='plan'?sess._si:sess._idx);
      const ov=sess._origin==='plan'?getOverride(w,d,sess._si):null;
      const stravaData=ov?.stravaData||null;
      const checks=loadChecks();
      const key=sess._origin==='plan'?ck(w,d,sess._si):`ex_w${w}_d${d}_i${sess._idx}`;
      const isDone=!!checks[key];
      // Zona do override (sessão do plano) ou do extra tem prioridade sobre o plano
      const _manualZone=ov?.manualZone||null; // zona editada manualmente — prioridade absoluta
      const _stravaZone=ov?.stravaZone||sess.stravaZone||null;
      const _ovZone=ov?.note&&zones[ov.note]?ov.note:null;
      const _extraZone=sess._origin==='extra'?(sess.manualZone||sess.stravaZone||(sess.note&&zones[sess.note]?sess.note:null)):null;
      const zoneKey=_manualZone||_ovZone||_extraZone||_stravaZone||getZone(sess.type,w);
      const zoneInfo=zoneKey?zones[zoneKey]:null;
      const nextSess=effective[si+1];
      const prevSess=effective[si-1];
      const isBrickHead=sess.type===BRICK&&nextSess&&nextSess.type===RUN&&(nextSess.text||'').startsWith('+');
      const isBrickTail=sess.type===RUN&&(sess.text||'').startsWith('+')&&prevSess&&prevSess.type===BRICK;
      if(isBrickTail)return;
      const card=document.createElement('div');
      card.className='session-card'+(isDone?' done':'');
      card.dataset.key=key;
      card.style.borderLeftColor=colorMap[sess.type];
      let zoneHtml='';
      if(zoneInfo)zoneHtml=`<span class="session-zone" style="background:${zoneInfo.color}18;color:${zoneInfo.color};border:1px solid ${zoneInfo.color}40">${zoneInfo.label} ${zoneInfo.bpm}</span>`;
      const _editZone=ov?.manualZone||(_ovZone)||_stravaZone||null;
      const _ovNote=_editZone||'';
      const editPayload=JSON.stringify({type:sess.type,text:sess.text,dist:sess.dist,note:_ovNote}).replace(/"/g,'&quot;');
      const editBtn=sess._origin==='plan'
        ?`<div class="session-act-btn" onclick="event.stopPropagation();showAddModal(${w},${d},{si:${sess._si},_zone:'${_editZone||''}',sess:${editPayload}})">EDITAR</div>`
        :`<div class="session-act-btn" onclick="event.stopPropagation();editExtra(${w},${d},${sess._idx})">EDITAR</div>`;
      const checkBtn=`<div class="session-check-btn ${isDone?'done':''}" data-key="${key}" onclick="toggleCheck(event,'${key}')">${isDone?'✓':''}</div>`;
      let bodyHtml='';
      if(isBrickHead){
        const parts=(sess.dist||'').split('+').map(x=>x.trim()).filter(Boolean);
        const isSimulado=parts.length>=3;
        const runDist=nextSess.dist||'';
        const title=isSimulado?'SIMULADO':'TIJOLO';
        const lines=isSimulado
          ?[[colorMap[SWIM],'NATAÇÃO',parts[0]||''],[colorMap[BIKE],'BIKE',parts[1]||''],[colorMap[RUN],'CORRIDA',parts[2]||runDist]]
          :[[colorMap[BIKE],'BIKE',sess.dist||''],[colorMap[RUN],'CORRIDA',runDist]];
        const linesHtml=lines.map(([c,l,v])=>`
          <div style="display:flex;align-items:center;gap:6px">
            <div style="width:5px;height:5px;border-radius:50%;background:${c};flex-shrink:0"></div>
            <span style="font-family:var(--font-ui);font-size:12px;font-weight:600;letter-spacing:.3px;text-transform:uppercase;color:var(--muted2)">${l}</span>
            <span style="font-family:var(--font-display);font-size:13px;color:var(--accent);margin-left:auto">${v}</span>
          </div>`).join('');
        bodyHtml=`
          <div class="session-card-header">
            <div class="drag-handle">&#9776;</div>
            <div style="flex:1">
              <span class="session-card-title">${title}</span>${zoneHtml}
              <div style="display:flex;flex-direction:column;gap:4px;margin-top:8px">${linesHtml}</div>
            </div>
            <div class="session-actions">${editBtn}</div>${checkBtn}
          </div>
          ${sess.note?`<div class="session-notes" style="color:${colorMap[sess.type]};background:${colorMap[sess.type]}0d;border-color:${colorMap[sess.type]}26">${sess.note}</div>`:''}`;
      }else{
        // Para extras do Strava, dados vêm de sess.dist e sess.note
        const isStravaExtra=sess._origin==='extra';
        const timeTypes=[TENNIS,GYM];
        
        // Linha principal
        let mainMetric='';
        if(stravaData){
          // Sessão do plano com dados Strava
          let _sd=ov?.stravaDist||sess.dist||'';
          // Natação: converter km→m se stravaDist ainda vier em km (overrides antigos)
          if(sess.type===SWIM&&_sd&&_sd.endsWith('km')){const _km=parseFloat(_sd);if(!isNaN(_km))_sd=Math.round(_km*1000)+'m';}
          mainMetric=(timeTypes.includes(sess.type))?ov?.stravaTime||sess.dist||'':_sd;
        }else if(isStravaExtra){
          // Extra criado pelo Strava: tempo para tênis/musc, dist para resto
          let _ed=sess.dist||'';
          if(sess.type===SWIM){
            // Para natação: extrair distancia real da linha sombreada (ex: "1375m · 29min · 109bpm")
            const _noteMatch=sess.note&&sess.note.match(/^(\d+m)/);
            if(_noteMatch)_ed=_noteMatch[1];
            else if(_ed&&_ed.endsWith('km')){const _km=parseFloat(_ed);if(!isNaN(_km))_ed=Math.round(_km*1000)+'m';}
          }
          mainMetric=(timeTypes.includes(sess.type))?_ed:_ed;
        }else{
          let _gd=sess.dist||'';
          if(sess.type===SWIM&&_gd&&_gd.endsWith('km')){const _km=parseFloat(_gd);if(!isNaN(_km))_gd=Math.round(_km*1000)+'m';}
          mainMetric=_gd;
        }

        // Para extras do Strava com tipo de tempo, trocar dist por tempo na linha principal
        // sess.dist para extras de tênis/musc contém o tempo (ex: "57min")
        // e sess.note contém os dados completos

        // Linha sombreada
        let shadeContent='';
        if(stravaData){
          shadeContent=stravaData;
        }else if(isStravaExtra&&sess.note){
          shadeContent=sess.note;
        }else if(sess.note&&sess.type!==GYM){
          shadeContent=sess.note;
        }

        bodyHtml=`
          <div class="session-card-header">
            <div class="drag-handle">&#9776;</div>
            <div class="session-type-dot" style="background:${colorMap[sess.type]}"></div>
            <div style="flex:1">
              <span class="session-card-title" onclick="event.stopPropagation();showWorkoutDetail(${w},${d},'${key}')" style="cursor:pointer;text-decoration:underline;text-decoration-color:${colorMap[sess.type]}55;text-underline-offset:3px">${sess.text}</span>${zoneHtml}
            </div>
            <div style="flex-shrink:0">
              <span class="session-card-dist">${mainMetric}</span>
            </div>
            <div class="session-actions">${editBtn}</div>${checkBtn}
          </div>
          ${shadeContent?`<div class="session-notes" style="color:${colorMap[sess.type]};background:${colorMap[sess.type]}18;border-top:1px solid ${colorMap[sess.type]}33">${shadeContent}</div>`:''}`;
      }
      card.innerHTML=bodyHtml;
      const sw=document.createElement('div');sw.className='swipe-wrap';sw.dataset.okey=okey;
      sw.innerHTML=`<div class="swipe-delete-bg">EXCLUIR</div>`;
      sw.appendChild(card);
      const delFn=sess._origin==='plan'?()=>deleteSession(w,d,sess._si):()=>{removeExtra(w,d,sess._idx);refreshHoje();};
      attachSwipe(sw,card,delFn);attachLongPressReorder(sw,card,list,w,d);
      list.appendChild(sw);
    });
  }
  const reBtn=document.createElement('div');reBtn.className='reorder-btn';reBtn.id='reorder-btn';
  reBtn.innerHTML=reorderMode?'ARRASTE PARA REORDENAR':'&#9776; REORDENAR';
  if(reorderMode)reBtn.classList.add('active');
  reBtn.addEventListener('click',()=>{reorderMode=!reorderMode;refreshHoje();});
  slide.appendChild(reBtn);

  // Botão restaurar — só aparece se houver sessões deletadas
  const overrides=loadOverrides();

  const addBtn=document.createElement('div');addBtn.className='add-btn';addBtn.innerHTML='+ ADICIONAR TREINO EXTRA';
  addBtn.addEventListener('click',()=>showAddModal(w,d));slide.appendChild(addBtn);
  if(reorderMode)slide.classList.add('reordering');
  const nav=document.createElement('div');nav.className='hoje-nav';
  nav.innerHTML=`<button class="hoje-today-btn" onclick="goToToday()">HOJE</button>`;
  slide.appendChild(nav);
  return slide;
}

function _renderHoje(w,d){
  const viewHoje=document.getElementById('agenda-content')||document.getElementById('view-hoje');
  // Remover slides mas preservar o weather-widget fixo
  [...viewHoje.children].forEach(el=>{
    if(el.id!=='weather-widget')viewHoje.removeChild(el);
  });
  viewHoje.appendChild(_buildDaySlide(w,d));
}

let _swipeLocked=false;
(function _setupDaySwipe(){
  function getView(){
    const ac=document.getElementById('agenda-content');
    if(ac)return ac;
    return document.getElementById('view-hoje');
  }
  function isViewActive(){
    const agenda=document.getElementById('view-agenda');
    const hoje=document.getElementById('view-hoje');
    return (agenda&&agenda.classList.contains('active'))||(hoje&&hoje.classList.contains('active'));
  }
  function getSlide(view){
    return [...(view?.children||[])].find(el=>el.id!=='weather-widget'&&el.tagName!=='STYLE')||null;
  }
  let sx=0,sy=0,isH=false,decided=false,active=false;
  const THRESH=35;

  document.addEventListener('touchstart',function(e){
    if(!isViewActive())return;
    if(agendaSubTab&&agendaSubTab!=='hoje')return;
    if(e.target.closest('.swipe-wrap')||e.target.closest('.modal-overlay')||e.target.closest('.cal-modal-overlay')||e.target.closest('.modal'))return;
    if(e.target.closest('#weather-widget'))return;
    if(_swipeLocked)return;
    const t=e.touches[0];
    sx=t.clientX;sy=t.clientY;
    isH=false;decided=false;active=true;
  },{passive:true});

  document.addEventListener('touchmove',function(e){
    if(!active||_swipeLocked)return;
    const t=e.touches[0];
    const dx=t.clientX-sx, dy=t.clientY-sy;
    if(!decided&&(Math.abs(dx)>6||Math.abs(dy)>6)){
      decided=true;
      isH=Math.abs(dx)>Math.abs(dy)*0.8;
      if(!isH){active=false;return;}
    }
    if(!isH)return;
    if(e.cancelable)e.preventDefault();
    const view=getView();
    const slide=getSlide(view);
    if(!slide)return;
    const atStart=hojeWeek===1&&hojeDay===0;
    const atEnd=hojeWeek===16&&hojeDay===6;
    let x=dx;
    if((x>0&&atStart)||(x<0&&atEnd))x=dx*0.15;
    slide.style.transition='none';
    slide.style.transform=`translateX(${x}px)`;
  },{passive:false});

  document.addEventListener('touchend',function(e){
    if(!active||!isH){active=false;return;}
    active=false;isH=false;decided=false;
    if(_swipeLocked)return;
    const view=getView();
    const slide=getSlide(view);
    if(!slide)return;
    const dx=e.changedTouches[0].clientX-sx;
    const atStart=hojeWeek===1&&hojeDay===0;
    const atEnd=hojeWeek===16&&hojeDay===6;
    const dir=dx<-THRESH&&!atEnd?1:dx>THRESH&&!atStart?-1:0;
    if(dir===0){
      slide.style.transition='transform 240ms cubic-bezier(.4,0,.2,1)';
      slide.style.transform='translateX(0)';
      return;
    }
    _swipeLocked=true;
    let nw=hojeWeek, nd=hojeDay+dir;
    if(nd<0){nw=Math.max(1,nw-1);nd=6;}
    if(nd>6){nw=Math.min(16,nw+1);nd=0;}
    const VW=view.offsetWidth||window.innerWidth;
    // Wrapper para animação — não mexe no view inteiro
    const next=_buildDaySlide(nw,nd);
    next.style.cssText=`position:fixed;top:${slide.getBoundingClientRect().top}px;left:0;width:100%;transform:translateX(${dir>0?VW:-VW}px);transition:none;box-sizing:border-box;z-index:10;background:var(--bg);`;
    document.body.appendChild(next);
    const ease='240ms cubic-bezier(.4,0,.2,1)';
    requestAnimationFrame(()=>{requestAnimationFrame(()=>{
      slide.style.transition=`transform ${ease}`;
      slide.style.transform=`translateX(${dir>0?-VW:VW}px)`;
      next.style.transition=`transform ${ease}`;
      next.style.transform='translateX(0)';
    });});
    setTimeout(()=>{
      hojeWeek=nw; hojeDay=nd;
      document.body.removeChild(next);
      _renderHoje(nw,nd);
      _swipeLocked=false;
    },250);
  },{passive:true});
})();

// Swipe genérico para Semana e Calendário (navega semanas/meses)
let _semanaSwipeAbort=null;
function _attachGenericSwipe(el,onNext,onPrev){
  if(_semanaSwipeAbort)_semanaSwipeAbort.abort();
  _semanaSwipeAbort=new AbortController();
  const sig={signal:_semanaSwipeAbort.signal};
  let sx=0,sy=0,decided=false,horiz=false,active=false;
  const TRIGGER=30;
  el.addEventListener('touchstart',e=>{
    if(e.target.closest('.modal')||e.target.closest('.cal-modal'))return;
    const t=e.touches[0];sx=t.clientX;sy=t.clientY;decided=false;horiz=false;active=true;
  },{passive:true,...sig});
  el.addEventListener('touchmove',e=>{
    if(!active)return;
    const t=e.touches[0];
    const dx=t.clientX-sx,dy=t.clientY-sy;
    if(!decided&&(Math.abs(dx)>4||Math.abs(dy)>4)){
      decided=true;horiz=Math.abs(dx)>Math.abs(dy)*0.6;
      if(!horiz){active=false;return;}
    }
    if(horiz&&e.cancelable)e.preventDefault();
  },{passive:false,...sig});
  el.addEventListener('touchend',e=>{
    if(!active||!horiz){active=false;return;}
    active=false;horiz=false;
    const dx=e.changedTouches[0].clientX-sx;
    if(dx<-TRIGGER)onNext();
    else if(dx>TRIGGER)onPrev();
  },{passive:true,...sig});
}

function hojeNavDay(dir){
  let nw=hojeWeek,nd=hojeDay+dir;
  if(nd<0){nw=Math.max(1,nw-1);nd=6;}
  if(nd>6){nw=Math.min(16,nw+1);nd=0;}
  hojeWeek=nw;hojeDay=nd;
  _renderHoje(nw,nd);
}
function goToToday(){
  const {w,d}=getCurrentWeekAndDay();
  hojeWeek=w;hojeDay=d;
  _renderHoje(w,d);
}
function changeHojeDay(dir){
  hojeDay+=dir;
  if(hojeDay<0){hojeWeek=Math.max(1,hojeWeek-1);hojeDay=6;}
  if(hojeDay>6){hojeWeek=Math.min(16,hojeWeek+1);hojeDay=0;}
}

// Procura atividade do Strava que já bateu com este treino (via override gravado no sync)
function _findStravaMatch(w,d,si){
  try{
    const ov=getOverride(w,d,si);
    if(ov && (ov.stravaData||ov.stravaDist||ov.stravaZone)) return ov;
