async function runBikeFitAnalysis(){
  const btn=document.querySelector('#view-bikefit button');
  const result=document.getElementById('bf-result');
  btn.textContent='ANALISANDO...';
  btn.disabled=true;
  result.style.display='none';

  const get=id=>document.getElementById(id)?.value||'';
  const altura=get('bf-altura');
  const peso=get('bf-peso');
  const femur=get('bf-femur');
  const quadro=get('bf-quadro');
  const selim=get('bf-selim-atual');
  const guidao=get('bf-guidao-atual');
  const flex=get('bf-flex');
  const dor=get('bf-dor');
  const exp=get('bf-exp');
  const obs=get('bf-obs');

  if(!altura||!peso){
    btn.textContent='ANALISAR POSIÇÃO';btn.disabled=false;
    alert('Preencha ao menos altura e peso.');return;
  }

  const photoPreview=document.getElementById('bf-photo-preview');
  const photoB64=photoPreview.dataset.b64||null;

  // Se o atleta já rodou uma analise antes, manda o que foi RECOMENDADO da última vez junto com
  // os valores ATUAIS que ele está digitando agora — se baterem, o coach pode confirmar que o
  // ajuste foi aplicado com sucesso, em vez de sempre tratar como uma bike fit do zero.
  let lastRec=null;
  try{ lastRec=JSON.parse(localStorage.getItem('mytri_bikefit_last')||'null'); }catch(e){}
  const lastRecStr=lastRec?`\n\nANALISE ANTERIOR (recomendado da última vez): selim ${lastRec.selim_ideal||'?'}cm, recuo ${lastRec.selim_recuo||'?'}cm, guidao ${lastRec.guidao_ideal||'?'}cm, alcance ${lastRec.alcance_guidao||'?'}cm. Se os valores ATUAIS informados agora batem com isso, comente que o ajuste foi aplicado com sucesso e valide a mudança antes de sugerir novos ajustes finos.`:'';

  const prompt=`Você é um especialista em bike fit para triathlon. Analise os dados abaixo e forneça recomendações detalhadas de ajuste de posição.

DADOS DO ATLETA:
- Altura: ${altura}cm
- Peso: ${peso}kg
- Comprimento do fêmur: ${femur||'não informado'}cm
- Flexibilidade: ${flex}
- Dores atuais: ${dor}
- Experiência: ${exp}

BIKE ATUAL:
- Quadro: ${quadro||'não informado'}cm
- Altura atual do selim: ${selim||'não informada'}cm
- Altura atual do guidão: ${guidao||'não informado'}cm
- Observações: ${obs||'nenhuma'}
${lastRecStr}

${photoB64?'Uma foto do atleta pedalando de perfil foi anexada para análise visual.':'Sem foto disponível — analise apenas com os dados fornecidos.'}

Forneça:
1. Altura ideal do selim (fórmula LeMond e análise)
2. Recuo do selim
3. Altura e alcance do guidão
4. Posição dos cleats
5. Ajustes específicos para triathlon com aerobar
6. Pontos de atenção baseados nas dores relatadas (escreva o titulo completo, nunca corte no meio)

Seja específico com medidas (cm) e explique o porquê de cada ajuste. Responda em português.

IMPORTANTE: Responda em texto limpo, sem markdown, sem asteriscos, sem hashtags, sem emojis, sem tabelas. Use apenas texto simples. Para titulos use letras maiusculas seguidas de dois pontos. Exemplo: ALTURA DO SELIM:

CRITICO — ORDEM DA RESPOSTA: a PRIMEIRA linha da sua resposta (sozinha, antes de qualquer outro texto) deve ser o resumo estruturado abaixo, com os números que você calculou. Só DEPOIS disso escreva todo o texto explicativo. Isso é importante porque se a resposta for cortada por limite de tamanho, o resumo precisa ter sobrevivido — nunca deixe o resumo pro final:
RESUMO_JSON:{"selim_atual":"${selim||''}","selim_ideal":"NUM","selim_recuo":"NUM","guidao_atual":"${guidao||''}","guidao_ideal":"NUM","alcance_guidao":"NUM"}

Depois dessa linha, escreva todo o texto explicativo normalmente.`;

  let text='';
  try{
    // Dispara a analise em background — recebe 202 na hora, o texto ainda nao vem aqui.
    await fetchComTimeout('/.netlify/functions/bike-fit-background',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({prompt,imageBase64:photoB64||null})
    },10000);

    // Fica consultando o status ate sair de "pending". Foto+visao pode demorar mais que texto
    // puro, entao damos mais margem aqui: 50 tentativas de 1.5s = 75s de espera maxima.
    const maxAttempts=50;
    let done=false;
    for(let attempt=0;attempt<maxAttempts;attempt++){
      await new Promise(r=>setTimeout(r,1500));
      let statusResp;
      try{
        statusResp=await fetchComTimeout('/.netlify/functions/bike-fit-status',{method:'GET'},8000);
      }catch(e){ continue; }
      let statusData={};
      try{ statusData=await statusResp.json(); }catch(e){ continue; }
      if(statusData.status==='done'){ text=statusData.text_result||''; done=true; break; }
      if(statusData.status==='error'){ throw new Error(statusData.error_message||'Erro na analise'); }
    }
    if(!done) throw new Error(`Analise demorou mais que o esperado (mais de ${Math.round(maxAttempts*1.5)}s). Tente novamente.`);

    // Extrai o resumo estruturado (RESUMO_JSON na 1a linha) pra montar um card visual
    // "atual -> recomendado" antes do texto corrido — antes só tinha a explicação longa,
    // sem um resumo rápido de execução das alteracoes.
    let resumo=null;
    // Regex tolera JSON em varias linhas (balanceamento de chaves) — antes exigia tudo numa
    // linha só, e se a IA formatava o JSON com quebra de linha o quadro-resumo sumia sem avisar.
    const _rm=(()=>{
      const key=text.indexOf('RESUMO_JSON:');
      if(key===-1)return null;
      const start=text.indexOf('{',key);
      if(start===-1)return null;
      let depth=0,inStr=false,esc=false;
      for(let i=start;i<text.length;i++){
        const c=text[i];
        if(inStr){ if(esc)esc=false; else if(c==='\\')esc=true; else if(c==='"')inStr=false; continue; }
        if(c==='"'){ inStr=true; continue; }
        if(c==='{')depth++;
        else if(c==='}'){ depth--; if(depth===0)return [text.slice(key,i+1), text.slice(start,i+1)]; }
      }
      return null;
    })();
    if(_rm){
      try{ resumo=JSON.parse(_rm[1]); }catch(e){}
      text=text.replace(_rm[0],'').trim();
    }
    const _chip=(label,de,para,unidade,cor)=>{
      if(!para)return '';
      const mudou=de&&de!==para;
      return `<div style="flex:1;min-width:100px;background:var(--bg);border:1px solid ${cor}33;border-radius:8px;padding:12px;text-align:center">
        <div style="font-family:var(--font-ui);font-size:8px;color:var(--muted);letter-spacing:1px;margin-bottom:6px">${label}</div>
        ${mudou?`<div style="font-family:var(--font-ui);font-size:11px;color:var(--muted2);text-decoration:line-through">${de}${unidade}</div>`:''}
        <div style="font-family:var(--font-display);font-size:20px;color:${cor}">${para}${unidade}</div>
      </div>`;
    };
    // Selim em laranja (cor do BIKE na paleta do app) e guidao em azul, pra diferenciar
    // visualmente os dois componentes do fit em vez de tudo na mesma cor.
    const resumoHtml=resumo?`<div style="margin-top:20px;padding:16px;background:#e05c2a12;border:1px solid #e05c2a40;border-radius:8px">
      <div style="font-family:var(--font-ui);font-size:10px;color:var(--bike);letter-spacing:1.5px;margin-bottom:10px">RESUMO DAS ALTERACOES</div>
      <div style="display:flex;gap:8px;flex-wrap:wrap">
        ${_chip('SELIM ALTURA',resumo.selim_atual,resumo.selim_ideal,'cm','var(--bike)')}
        ${_chip('SELIM RECUO',resumo.selim_recuo&&resumo.selim_atual?'':'',resumo.selim_recuo,'cm','var(--bike)')}
        ${_chip('GUIDAO ALTURA',resumo.guidao_atual,resumo.guidao_ideal,'cm','#1a6cf0')}
        ${_chip('ALCANCE GUIDAO','',resumo.alcance_guidao,'cm','#1a6cf0')}
      </div>
    </div>`:'';
    // Guarda a recomendação pra próxima analise poder comparar com o que o atleta digitar depois
    // (confirmar sucesso do ajuste em vez de tratar como bike fit do zero de novo).
    if(resumo){ try{ localStorage.setItem('mytri_bikefit_last',JSON.stringify(resumo)); }catch(e){} }

    result.style.display='block';
    result.innerHTML=`
      <div style="background:var(--surface);border:1px solid var(--border);border-top:3px solid var(--accent);padding:20px;border-radius:4px">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px">
          <div style="font-family:var(--font-ui);font-size:10px;color:var(--muted);letter-spacing:2px;text-transform:uppercase">ANALISE BIKE FIT</div>
          <button onclick="resetBikeFit()" style="background:none;border:1px solid var(--border);color:var(--muted2);font-family:var(--font-ui);font-size:9px;letter-spacing:1px;padding:6px 10px;border-radius:6px;cursor:pointer">RESETAR</button>
        </div>
        <div id="bf-result-text" style="font-family:var(--font-body);font-size:14px;line-height:1.8;color:var(--text)"></div>
        ${resumoHtml}
      </div>`;
    renderBikeFitText(document.getElementById('bf-result-text'),text);
  }catch(e){
    result.style.display='block';
    console.error('Erro no Bike Fit:',e);
    result.innerHTML=`<div style="color:#e05c2a;font-family:var(--font-ui);font-size:12px">Erro na análise: ${(e.message||'desconhecido').replace(/</g,'&lt;')}. Tente novamente.</div>`;
  }

  btn.textContent='ANALISAR POSIÇÃO';
  btn.disabled=false;
}

function renderClubReal(){

  c.innerHTML='';
  c.style.cssText='padding-bottom:80px;min-height:100vh;background:var(--bg)';

  if(clubState.step==='onboard'||!clubState.myProfile){
    renderClubOnboard(c);

async function submitCreateGroup(){
  const nome=(document.getElementById('mb-nome').value||'').trim();
  if(!nome){ alert('Da um nome pro grupo primeiro.'); return; }
  const foco=(document.getElementById('mb-foco').value||'').trim();
  const scoringLabels=['Número de treinos','Distancia (km)','Minutos'];
  const scoring=scoringLabels[window._mbScoring||0];
  const btn=document.getElementById('mb-create-btn');
  if(btn){ btn.disabled=true; btn.textContent='CRIANDO...'; }
  // Garante que o token de sessão está fresco antes de uma escrita critica — se a sessão
  // tivesse expirado sem renovar, o INSERT falhava na regra "auth.uid() = owner_id" com um
  // erro generico, sem explicar o motivo real.
  const session=await ensureValidSession();
  if(!session){
    alert('Sua sessão expirou. Vamos te levar pra tela de login de novo.');
    showAuthScreen();
    return;
  }
  const uid=currentUserId();
  if(!uid){ alert('Precisa estar logado.'); return; }
  const codigo=Math.random().toString(36).slice(2,8).toUpperCase();
  const prof=getMytriProfile();
  try{
    const r=await fetch(`${SB_URL}/rest/v1/mytri_groups`,{
      method:'POST',
      headers:sbHeaders({'Prefer':'return=representation'}),
      body:JSON.stringify({nome,foco,scoring,codigo,owner_id:uid})
    });
    const rows=await r.json();
    if(!r.ok||!rows||!rows[0]){
      console.error('Erro ao criar grupo:',r.status,rows);
      throw new Error((rows&&(rows.message||rows.hint||rows.details))||`HTTP ${r.status}`);
    }
    const group=rows[0];
    // Dono entra como primeiro membro automaticamente.
    await fetch(`${SB_URL}/rest/v1/mytri_group_members`,{
      method:'POST',
      headers:sbHeaders(),
      body:JSON.stringify({group_id:group.id,user_id:uid,nome_exibicao:prof.name||'Você',foto_url:prof.photo||null})
    });
    meiaBrancaState._openGroup=group;
    renderClub();
  }catch(e){
    alert('Não consegui criar o grupo agora: '+(e.message||'erro desconhecido'));
    if(btn){ btn.disabled=false; btn.textContent='CRIAR'; }
  }
}
async function openJoinGroupForm(){
  const código=prompt('Digite o código do grupo:');
  if(!código)return;
  const session=await ensureValidSession();
  if(!session){ alert('Sua sessão expirou. Vamos te levar pra tela de login de novo.'); showAuthScreen(); return; }
  const prof=getMytriProfile();
  const uid=currentUserId();
  fetch(`${SB_URL}/rest/v1/rpc/join_group_by_code`,{
    method:'POST',
    headers:sbHeaders(),
    body:JSON.stringify({p_codigo:código.trim(),p_nome:prof.name||'Você'})
  }).then(async r=>{
    if(!r.ok){
      const err=await r.json().catch(()=>({}));
      console.error('Erro ao entrar no grupo:',r.status,err);
      alert(err.message&&err.message.includes('Código invalido')?'Código invalido.':'Não consegui entrar no grupo. Confere o código.');
      return;
    }
    const groupId=await r.json().catch(()=>null);
    // A funcao join_group_by_code não aceita foto (RPC generica) — completa com um PATCH
    // separado, que a regra "members_update_self" já permite pro próprio membro.
    if(groupId&&prof.photo&&uid){
      fetch(`${SB_URL}/rest/v1/mytri_group_members?group_id=eq.${groupId}&user_id=eq.${uid}`,{
        method:'PATCH', headers:sbHeaders(), body:JSON.stringify({foto_url:prof.photo})
      }).catch(()=>{});
    }
    renderClub();
  }).catch(()=>alert('Erro de conexao. Tenta de novo.'));
}

let _lastGroupMsgCount=0;
async function loadGroupMessages(groupId,scrollToBottom){
  try{
    const r=await fetch(`${SB_URL}/rest/v1/mytri_group_messages?group_id=eq.${groupId}&select=*&order=created_at.asc&limit=200`,{headers:sbHeaders()});
    if(!r.ok)return;
    const rows=await r.json();
    const box=document.getElementById('group-chat-messages');
    if(!box)return; // fechou o chat enquanto carregava
    // So re-renderiza se o numero de mensagens mudou, pra nao interromper a pessoa digitando
    if(rows.length===_lastGroupMsgCount && !scrollToBottom)return;
    _lastGroupMsgCount=rows.length;
    const myUid=currentUserId();
    if(!rows.length){
      box.innerHTML='<div style="text-align:center;font-family:var(--font-body);font-size:12px;color:var(--muted);padding:40px 0">Nenhuma mensagem ainda. Comeca a conversa!</div>';
      return;
    }
    box.innerHTML=rows.map(m=>{
      const mine=m.user_id===myUid;
      return `<div style="align-self:${mine?'flex-end':'flex-start'};max-width:78%">
        ${!mine?`<div style="font-family:var(--font-ui);font-size:10px;color:var(--muted);margin-bottom:2px;margin-left:12px">${(m.nome_exibicao||'Atleta').replace(/</g,'')}</div>`:''}

    }).join('');
    if(scrollToBottom)box.scrollTop=box.scrollHeight;
  }catch(e){}
}

// Puxa os treinos de HOJE que já foram concluidos com dado real (Strava ou manual) — e disso
// que o check-in agora se alimenta, em vez de um botao generico que só somava +1 sempre.
function getTodayCompletedSessions(){
  try{
    const {w,d}=getCurrentWeekAndDay();
    const checks=loadChecks();
    const sessions=getEffectiveSessions(w,d)||[];
    return sessions.filter(s=>{
      if(s._origin==='plan') return checks[ck(w,d,s._si)]&&(s._realExecuted||s.dist);
      return s._origin==='extra'; // extra só existe pq o Strava sincronizou algo real
    });
  }catch(e){ return []; }
}
function _ckExtractKm(sess){
  const str=sess.dist||'';
  let m=String(str).match(/([\d.]+)\s*km/i);
  if(m)return parseFloat(m[1]);
  m=String(str).match(/([\d.]+)\s*m\b/i);
  if(m)return parseFloat(m[1])/1000;
  return 0;
}
function _ckExtractMin(sess){
  const sources=[sess._stravaTime,sess.dist,sess.note].filter(Boolean);
  for(const raw of sources){
    const str=String(raw);
    let m=str.match(/(\d+)h\s*(\d+)?/i);
    if(m)return parseInt(m[1])*60+(parseInt(m[2])||0);
    m=str.match(/(\d+)\s*min/i);
    if(m)return parseInt(m[1]);
  }
  return 0;
}
function _ckPointsFor(sess,scoring){
  if(scoring==='Distancia (km)')return Math.round(_ckExtractKm(sess)*10)/10;
  if(scoring==='Minutos')return _ckExtractMin(sess);
  return 1; // "Número de treinos"
}
const TIPO_NOME_CK={swim:'Natacao',bike:'Bike',run:'Corrida',brick:'Tijolo',gym:'Forca',tennis:'Tenis'};

// Check-in AUTOMATICO em todos os grupos da Meia Branca que o atleta participa, disparado
// assim que um treino e concluido (manual ou Strava) — sem precisar abrir a aba do Clube.
// "sourceKey" identifica o treino (ex: "w1_d2_s0" ou "strava_123456") pra não duplicar o
// check-in se o mesmo treino disparar esse gatilho mais de uma vez.
async function autoCheckinAllGroups(sess,sourceKey){
  try{
    const uid=currentUserId();
    if(!uid||!sourceKey)return;
    const done=JSON.parse(localStorage.getItem('mytri_autocheckin_done')||'[]');
    if(done.includes(sourceKey))return;
    const groups=await mbFetchMyGroups();
    if(!groups.length)return;
    for(const g of groups){
      const pontos=_ckPointsFor(sess,g.scoring);
      const nota=`${TIPO_NOME_CK[sess.type]||sess.type||'Treino'}${sess.dist?' - '+sess.dist:''} (auto)`;
      try{
        await fetch(`${SB_URL}/rest/v1/mytri_group_checkins`,{method:'POST',headers:sbHeaders(),body:JSON.stringify({group_id:g.id,user_id:uid,pontos,nota})});
        const rMe=await fetch(`${SB_URL}/rest/v1/mytri_group_members?group_id=eq.${g.id}&user_id=eq.${uid}&select=pontos`,{headers:sbHeaders()});
        const meRows=await rMe.json();
        const atual=(meRows&&meRows[0]&&meRows[0].pontos)||0;
        await fetch(`${SB_URL}/rest/v1/mytri_group_members?group_id=eq.${g.id}&user_id=eq.${uid}`,{method:'PATCH',headers:sbHeaders(),body:JSON.stringify({pontos:atual+pontos})});
      }catch(e){} // um grupo falhar não deve impedir os outros
    }
    done.push(sourceKey);
    localStorage.setItem('mytri_autocheckin_done',JSON.stringify(done.slice(-300)));
  }catch(e){}
}

// Sai do Clube da Meia Azul por completo: reseta perfil de matches, curtidas, passadas e a
// aceitacao dos termos — a pessoa continua no MyTri normalmente, so nao participa mais desse
// clube ate decidir entrar de novo (o que vai pedir os termos e o perfil de novo, do zero).
function leaveClubAzul(){
  if(!confirm('Sair do Clube da Meia Azul? Seu perfil, curtidas e matches desse clube serao apagados. Voce pode entrar de novo quando quiser, mas vai comecar do zero.'))return;
  clubState={step:'onboard',myProfile:null,currentIdx:0,liked:[],passed:[],matches:[],matchedWith:null,dragStart:null};
  saveClubState();
  localStorage.removeItem('mytri_club_terms');
  backToClubLanding();
}

function clubChangeCover(){
  document.getElementById('club-cover-input')?.click();
}

function clubHandleCover(e){
  const file=e.target.files[0];
  if(!file)return;
  const reader=new FileReader();
  reader.onload=ev=>{
    if(!clubState.myProfile)clubState.myProfile={};
    clubState.myProfile.coverPhoto=ev.target.result;
    // Editor de posição/zoom simples
    const box=document.getElementById('club-cover-box');
    if(box){
      box.style.background=`url('${ev.target.result}') center/cover`;
      // Adicionar controles de edição
      const ctrl=document.createElement('div');
      ctrl.style.cssText='position:absolute;top:8px;left:50%;transform:translateX(-50%);display:flex;gap:8px;z-index:10';
      ctrl.innerHTML=`
        <button onclick="clubCoverZoom(1.1)" style="background:rgba(0,0,0,0.6);border:none;color:#fff;border-radius:4px;padding:6px 10px;font-size:14px;cursor:pointer">+</button>
        <button onclick="clubCoverZoom(0.9)" style="background:rgba(0,0,0,0.6);border:none;color:#fff;border-radius:4px;padding:6px 10px;font-size:14px;cursor:pointer">-</button>
        <button onclick="clubSaveCover()" style="background:var(--accent);border:none;color:#000;border-radius:4px;padding:6px 10px;font-family:var(--font-ui);font-size:9px;font-weight:700;letter-spacing:.5px;cursor:pointer">SALVAR</button>`;
      box.appendChild(ctrl);
    }
    saveClubState();
  };
  reader.readAsDataURL(file);
}

let _clubCoverScale=1,_clubCoverX=50,_clubCoverY=50;
function clubCoverZoom(factor){
  _clubCoverScale=Math.max(1,Math.min(3,(_clubCoverScale||1)*factor));
  const box=document.getElementById('club-cover-box');
  if(box&&clubState.myProfile?.coverPhoto){
    box.style.background=`url('${clubState.myProfile.coverPhoto}') ${_clubCoverX}% ${_clubCoverY}%/auto`;
    box.style.backgroundSize=`${100*_clubCoverScale}%`;
  }
}

function clubSaveCover(){
  saveClubState();
  renderClub();
}

async function clFormatCep(el){
  let v=el.value.replace(/\D/g,'');
  if(v.length>8)v=v.slice(0,8);
  if(v.length>5)v=v.slice(0,5)+'-'+v.slice(5);
  el.value=v;
  const status=document.getElementById('cl-cep-status');
  if(v.replace('-','').length===8){
    if(status)status.textContent='Buscando endereco...';
    try{
      const cepNum=v.replace('-','');
      const r=await fetch(`https://viacep.com.br/ws/${cepNum}/json/`);
      const d=await r.json();
      if(!d.erro){
        const cidadeInput=document.getElementById('cl-cidade');
        const bairroInput=document.getElementById('cl-bairro');
        const estadoSelect=document.getElementById('cl-estado');
        if(cidadeInput)cidadeInput.value=d.localidade||'';
        if(bairroInput)bairroInput.value=d.bairro||'';
        if(estadoSelect)estadoSelect.value=d.uf;
        if(status)status.textContent=`${d.bairro?d.bairro+', ':''}${d.localidade} — ${d.uf}`;
      } else {
        if(status)status.textContent='CEP não encontrado';
      }
    }catch(e){
      if(status)status.textContent='Erro ao buscar CEP';
    }
  } else {
    if(status)status.textContent='';
  }
}

function clPopulateCidades(){
  const uf=document.getElementById('cl-estado')?.value;
  const cidadeInput=document.getElementById('cl-cidade');
  if(!uf||!cidadeInput)return;
  const cidades=BR_CIDADES_POR_UF[uf]||[];
  // Transforma o input de texto em select temporário com as cidades do estado
  const parent=cidadeInput.parentElement;
  const select=document.createElement('select');
  select.id='cl-cidade';
  select.style.cssText=cidadeInput.style.cssText;
  select.innerHTML=`<option value="">Selecione a cidade</option>${cidades.map(c=>`<option value="${c}, ${uf}">${c}</option>`).join('')}<option value="__manual__">Outra (digitar manualmente)</option>`;
  select.onchange=function(){
    if(this.value==='__manual__'){
      const newInput=document.createElement('input');
      newInput.id='cl-cidade';
      newInput.type='text';
      newInput.placeholder='Digite sua cidade';
      newInput.style.cssText=this.style.cssText;
      this.replaceWith(newInput);
      newInput.focus();
    }
  };
  cidadeInput.replaceWith(select);
}

// Busca candidatos REAIS pra aparecer no swipe: perfis ativos que a pessoa ainda nao curtiu
// nem passou, excluindo ela mesma. Filtra pelo genero que a pessoa procura (busca).
async function fetchClubCandidates(){
  const uid=currentUserId();
  if(!uid)return [];
  try{
    const rSwiped=await fetch(`${SB_URL}/rest/v1/mytri_club_likes?from_user_id=eq.${uid}&select=to_user_id`,{headers:sbHeaders()});
    const swiped=rSwiped.ok?await rSwiped.json():[];
    const excludeIds=new Set([uid,...swiped.map(s=>s.to_user_id)]);
    const r=await fetch(`${SB_URL}/rest/v1/mytri_club_profiles?select=*&active=eq.true&limit=50`,{headers:sbHeaders()});
    const all=r.ok?await r.json():[];
    const myBusca=clubState.myProfile?.busca||getMytriProfile().busca||'A';
    return all.filter(p=>!excludeIds.has(p.user_id)&&(myBusca==='A'||p.sexo===myBusca));
  }catch(e){ return []; }
}

    <button onclick="clubAction('like')" style="width:72px;height:72px;border-radius:50%;background:var(--accent);border:none;color:#000;font-size:28px;cursor:pointer;display:flex;align-items:center;justify-content:center">♥</button>`;
  c.appendChild(btns);

  // Swipe touch
  let sx=0,sy=0,dragging=false;
  card.addEventListener('touchstart',e=>{sx=e.touches[0].clientX;sy=e.touches[0].clientY;dragging=true;},{passive:true});
  card.addEventListener('touchmove',e=>{
    if(!dragging)return;
    const dx=e.touches[0].clientX-sx;
    const dy=e.touches[0].clientY-sy;
    if(Math.abs(dx)<Math.abs(dy))return;
    card.style.transform=`translateX(${dx}px) rotate(${dx*0.04}deg)`;
    card.style.transition='none';
    document.getElementById('club-like-overlay').style.opacity=dx>20?Math.min((dx-20)/60,1):0;
    document.getElementById('club-pass-overlay').style.opacity=dx<-20?Math.min((-dx-20)/60,1):0;
  },{passive:true});
  card.addEventListener('touchend',e=>{
    if(!dragging)return;dragging=false;
    const dx=e.changedTouches[0].clientX-sx;
    card.style.transition='transform .3s';
    if(dx>80){clubAction('like');}
    else if(dx<-80){clubAction('pass');}
    else{card.style.transform='translateX(0) rotate(0deg)';}
  });
}

async function clubAction(action){
  const available=clubState._candidates||[];
  const p=available[0];
  if(!p)return;
  const uid=currentUserId();
  if(!uid)return;

  const card=document.getElementById('club-card');
  if(card){
    card.style.transition='transform .35s,opacity .35s';
    card.style.transform=action==='like'?'translateX(120%) rotate(20deg)':'translateX(-120%) rotate(-20deg)';
    card.style.opacity='0';
  }

  setTimeout(async ()=>{
    clubState._candidates.shift(); // tira do topo da fila local, independente do resultado
    try{
      await fetch(`${SB_URL}/rest/v1/mytri_club_likes`,{
        method:'POST',
        headers:{...sbHeaders(),Prefer:'resolution=merge-duplicates'},
        body:JSON.stringify({from_user_id:uid,to_user_id:p.user_id,liked:action==='like'})
      });
      if(action==='like'){
        // O gatilho no banco ja criou a linha de match se a curtida for mutua — so
        // precisamos conferir se ela existe agora.
        const ua=uid<p.user_id?uid:p.user_id, ub=uid<p.user_id?p.user_id:uid;
        const rMatch=await fetch(`${SB_URL}/rest/v1/mytri_club_matches?user_a=eq.${ua}&user_b=eq.${ub}&select=id`,{headers:sbHeaders()});
        const matches=rMatch.ok?await rMatch.json():[];
        if(matches.length){
          clubState.matchedWith=p;
          clubState.step='match';
          saveClubState();
          if(currentTab==='club')renderClub();
          return;
        }
      }
    }catch(e){}
    saveClubState();
    if(currentTab==='club')renderClub(); // só re-renderiza se ainda estiver na aba
  },350);
}

function closeMatchChat(){

let _lastMatchMsgCount=0;
async function loadMatchMessages(matchId,scrollToBottom){
  try{
    const r=await fetch(`${SB_URL}/rest/v1/mytri_match_messages?match_id=eq.${matchId}&select=*&order=created_at.asc&limit=200`,{headers:sbHeaders()});
    if(!r.ok)return;
    const rows=await r.json();
    const box=document.getElementById('match-chat-messages');
    if(!box)return;
    if(rows.length===_lastMatchMsgCount && !scrollToBottom)return;
    _lastMatchMsgCount=rows.length;
    const myUid=currentUserId();
    if(!rows.length){
      box.innerHTML='<div style="text-align:center;font-family:var(--font-body);font-size:12px;color:var(--muted);padding:40px 0">Voces deram match! Manda a primeira mensagem.</div>';
      return;
    }
    box.innerHTML=rows.map(m=>{
      const mine=m.sender_id===myUid;
      return `<div style="align-self:${mine?'flex-end':'flex-start'};max-width:78%">
        <div style="background:${mine?'#1a6cf0':'var(--surface)'};color:${mine?'#fff':'var(--text)'};padding:10px 14px;border-radius:16px;${mine?'border-bottom-right-radius:4px':'border-bottom-left-radius:4px'};font-family:var(--font-body);font-size:14px;line-height:1.4;border:${mine?'none':'1px solid var(--border)'};white-space:pre-wrap;word-break:break-word">${String(m.content||'').replace(/</g,'&lt;')}</div>
      </div>`;
    }).join('');
    if(scrollToBottom)box.scrollTop=box.scrollHeight;
  }catch(e){}
}
async function sendMatchMessage(matchId){
  const input=document.getElementById('match-chat-input');
  const content=(input.value||'').trim();
  if(!content)return;
  const uid=currentUserId();
  if(!uid)return;
  input.value='';
  const btn=document.getElementById('match-chat-send');
  if(btn)btn.disabled=true;
  try{
    await fetch(`${SB_URL}/rest/v1/mytri_match_messages`,{
      method:'POST', headers:sbHeaders(),
      body:JSON.stringify({match_id:matchId,sender_id:uid,content})
    });
    await loadMatchMessages(matchId,true);
  }catch(e){
    alert('Nao consegui enviar a mensagem agora.');
  }
  if(btn)btn.disabled=false;
}

function init(){
  // CRITICO: esse init() do app principal roda logo na carga da pagina, ANTES do codigo mais
  // abaixo (initAuthGate) decidir se deve mostrar o onboarding retomado. Sem essa guarda, ele
  // sempre montava a Agenda por baixo — e como o Strava exige sair e voltar da pagina (perde
  // tudo que estava em memoria), isso fazia a pessoa "cair direto na Agenda" com dado velho em
  // vez de retomar o onboarding de onde parou.
  if(localStorage.getItem('mytri_ob_tmp')){ return; }
  try{initPlan();}catch(e){console.error('initPlan',e);} // popula plan[] ANTES de qualquer render
  try{updateCycleBadge();}catch(e){console.error('badge',e);}
  try{updateCountdown();}catch(e){console.error('countdown',e);}
  try{renderHoje();}catch(e){
    console.error('renderHoje',e);
    var el=document.getElementById('agenda-content')||document.getElementById('view-hoje');
    if(el)el.innerHTML='<div style="padding:20px;color:red;font-size:12px">Erro: '+e.message+'</div>';
  }
  // Inicializar sync com Supabase em background
  sbInit().then(async()=>{
    if(_syncReady){
      renderHoje();
      updateCycleBadge();
      updateCountdown();
    }
    // Verificar callback OAuth do Strava
    await stravaHandleOAuthCallback();
    // Auto-sync Strava a cada abertura (se conectado e último sync >1h)
    const lastSync=parseInt(localStorage.getItem('strava_last_sync')||'0');
    const rateLimitUntil=parseInt(localStorage.getItem('strava_rate_limit_until')||'0');
    const isRateLimited=Date.now()<rateLimitUntil;
    if(!isRateLimited&&Date.now()-lastSync>3600000){
      const token=await stravaGetValidToken();
      if(token)stravaSyncActivities();
    }
    if(isRateLimited){showStravaStatus('Limite Strava ativo. Aguarde ou clique em RESETAR LIMITE.');}
    // Resumo semanal aos sábados
    setTimeout(checkWeeklySummary,1500);
  });
}
if(document.readyState==='loading'){document.addEventListener('DOMContentLoaded',init);}else{init();}



// ── GPS LOCATION ──
async function resetCity(){
  try{
    localStorage.removeItem('mytri_gps_city');
    const saved=JSON.parse(localStorage.getItem('mytri_profile')||'{}');
    delete saved.city;
    saved.cityLocked=false;
    localStorage.setItem('mytri_profile',JSON.stringify(saved));
    await sbSet('mytri_profile',saved);
  }catch(e){}
  const el=document.getElementById('profile-city-display');
  if(el)el.textContent='Detectando...';
  detectGPSLocation(true);
}

function detectGPSLocation(force){
  if(!force){
    try{ const p=JSON.parse(localStorage.getItem('mytri_profile')||'{}'); if(p.cityLocked&&p.city) return; }catch(e){}
  }
  if(!navigator.geolocation){
    const el=document.getElementById('profile-city-display');
    if(el)el.textContent='GPS indisponivel';
    return;
  }
  const isInvalid=c=>!c||c==='Centro, Brazil'||c==='Centro'||c==='Brazil'||c==='Brasil'||c.startsWith('Centro,');
  try{
    const saved=JSON.parse(localStorage.getItem('mytri_profile')||'{}');
    if(isInvalid(saved.city)){
      delete saved.city;
      localStorage.setItem('mytri_profile',JSON.stringify(saved));
      sbSet('mytri_profile',saved).catch(()=>{});
    }
  }catch(e){}
  const el=document.getElementById('profile-city-display');
  if(el)el.textContent='Aguardando GPS...';
  navigator.geolocation.getCurrentPosition(async pos=>{
    if(el)el.textContent='GPS ok, buscando...';
    try{
      const {latitude:lat,longitude:lon}=pos.coords;
      const r=await fetch(`https://api.bigdatacloud.net/data/reverse-geocode-client?latitude=${lat}&longitude=${lon}&localityLanguage=pt`);
      const d=await r.json();
      const adm=d.localityInfo?.administrative||[];
      const bairro=adm.find(a=>a.order===11)?.name||adm.find(a=>a.order===10)?.name||d.locality||'';
      const cidade=adm.find(a=>a.order===10)?.name||d.city||'';
      // Estado (UF): o BigDataCloud sempre traz isso no campo dedicado principalSubdivisionCode
      // (ex "BR-SP"), independente do array "administrative" usado acima pra cidade/bairro.
      // Antes esse campo nunca era lido -> profile.state ficava sempre vazio ("UF" no Clube).
      const uf=(d.principalSubdivisionCode||'').split('-').pop()||'';
      const loc=bairro&&cidade&&bairro!==cidade?`${bairro}, ${cidade}`:cidade||bairro||'';
      if(loc){
        // Salva cidade e bairro em campos separados no perfil (loc combinado so serve pra
        // exibicao no localStorage 'mytri_gps_city', usado como fallback de texto em outros lugares).
        localStorage.setItem('mytri_gps_city',loc);
        const saved=JSON.parse(localStorage.getItem('mytri_profile')||'{}');
        saved.city=cidade||saved.city||'';
        if(bairro)saved.bairro=bairro;
        if(uf)saved.state=uf;
        localStorage.setItem('mytri_profile',JSON.stringify(saved));
        sbSet('mytri_profile',saved).catch(()=>{});
        if(el)el.textContent=loc;
        refreshHoje();
      }
      if(el)el.textContent=loc||'Sem bairro';
    }catch(e){
      if(el)el.textContent='Erro API: '+e.message;
    }
  },err=>{
    if(el)el.textContent='Erro GPS: '+err.message;
  },{timeout:10000,enableHighAccuracy:true});
}

// ── PERFIL CENTRAL ──
async function syncProfileFromSupabase(){
  // Se onboarding acabou de salvar, não sobrescreve de jeito nenhum
  if(localStorage.getItem('mytri_ob_just_saved')) return;
  try{
    const remote=await sbGet('mytri_profile');
    if(!remote||!Object.keys(remote).length) return;
    const local=JSON.parse(localStorage.getItem('mytri_profile')||'{}');
    // Local com QUALQUER dado de onboarding é a fonte de verdade — remoto nunca sobrescreve
    if(local.sport||local.raceDist||local.pace||local.ftp||local.raceName||local.name) return;
    const isInvalidCity=c=>!c||c==='Centro, Brazil'||c==='Centro'||c==='Brazil'||c==='Brasil'||c.startsWith('Centro,');
    if(isInvalidCity(remote.city)&&!isInvalidCity(local.city)) remote.city=local.city;
    if(isInvalidCity(remote.city)) delete remote.city;
    localStorage.setItem('mytri_profile',JSON.stringify(remote));
    refreshHoje();
  }catch(e){}
}

function getMytriProfile(){
  const stravaTokens=JSON.parse(localStorage.getItem('strava_tokens')||'{}');
  const athlete=stravaTokens.athlete||{};
  const saved=JSON.parse(localStorage.getItem('mytri_profile')||'{}');
  const gpsCity=localStorage.getItem('mytri_gps_city')||'';
  const badCities=['Centro, Brazil','Centro','Brazil','Brasil'];
  const savedCity=saved.city&&!badCities.some(b=>saved.city===b||saved.city.startsWith('Centro,'))?saved.city:'';
  const stravaCity=athlete.city&&!badCities.some(b=>athlete.city===b||athlete.city.startsWith('Centro'))&&athlete.city.length>3?athlete.city:'';
  return {
    ...saved, // todos os campos do obFinish
    name:saved.name||(athlete.firstname&&athlete.lastname?`${athlete.firstname} ${athlete.lastname}`:''),
    city:savedCity||gpsCity||stravaCity||'',
    photo:saved.photo||athlete.profile||athlete.profile_medium||'',
    weight:saved.weight||String(athlete.weight||'')||'',
    age:saved.age||String(athlete.age||'')||'',
    bio:saved.bio||'',
    pace:saved.pace||'',
    ftp:saved.ftp||'',
    swim:saved.swim||'',
    nextRace:saved.nextRace||'',
    interests:saved.interests||'',
    busca:saved.busca||'A',
    sport:saved.sport||'triathlon',
    raceDist:saved.raceDist||'sprint',
    raceDate:saved.raceDate||'',
    goalTime:saved.goalTime||'',
    weeklyHours:saved.weeklyHours||'3-4',
    diasDisponiveis:saved.diasDisponiveis||[],
    altura:saved.altura||String(athlete.height||''),
  };
}

function saveMytriProfile(data){
  localStorage.setItem('mytri_profile',JSON.stringify(data));
  // Sync to Supabase
  sbSet('mytri_profile',data).catch(()=>{});
  // Sync to club profile too
  if(clubState.myProfile){
    clubState.myProfile={...clubState.myProfile,...data};
    saveClubState();
    syncClubProfileToSupabase();
  }
}

// Galeria "Momentos" no Perfil — reaproveita as fotos que a pessoa ja tirou nos check-ins do
// Meia Branca, num lugar so, no proprio perfil (estilo Instant: cru, sem edicao).
async function loadProfileMomentos(){
  const box=document.getElementById('profile-momentos');
  const ring=document.getElementById('moments-ring');
  if(!box)return;
  const uid=currentUserId();
  if(!uid){ box.innerHTML='<div style="text-align:center;padding:20px 0;color:var(--muted)">Toque no + colorido no seu avatar pra adicionar seu primeiro Instant.</div>'; return; }
  try{
    const [rCheckins,rMoments]=await Promise.all([
      fetch(`${SB_URL}/rest/v1/mytri_group_checkins?user_id=eq.${uid}&foto_url=not.is.null&select=foto_url,nota,created_at&order=created_at.desc&limit=12`,{headers:sbHeaders()}),
      fetch(`${SB_URL}/rest/v1/mytri_moments?user_id=eq.${uid}&select=id,foto_url,nota,created_at&order=created_at.desc&limit=12`,{headers:sbHeaders()}),
    ]);
    const checkins=(rCheckins.ok?await rCheckins.json():[]).map(r=>({...r,_source:'checkin'}));
    const moments=(rMoments.ok?await rMoments.json():[]).map(r=>({...r,_source:'moment'}));
    const rows=[...moments,...checkins].sort((a,b)=>new Date(b.created_at)-new Date(a.created_at)).slice(0,12);
    if(!box)return; // pessoa pode ter saido do Perfil enquanto isso carregava
    // Anel colorido tipo Instagram Stories no avatar so aparece se tiver Instant proprio
    // (nao conta check-in de grupo pra isso — o anel e especificamente sobre os Instants
    // pessoais adicionados pelo botao colorido).
    if(!rMoments.ok){ const errBody=await rMoments.text().catch(()=>''); console.error('mytri_moments fetch falhou:',rMoments.status,errBody); }
    if(ring)ring.style.background=moments.length?'linear-gradient(45deg,#f09433,#e6683c,#dc2743,#cc2366,#bc1888)':'var(--bg)';
    if(!rows.length){
      box.innerHTML='<div style="text-align:center;padding:20px 0;color:var(--muted)">Nenhum momento ainda. Toque no + colorido no avatar, ou faca um check-in com foto num grupo do Clube da Meia Branca.</div>';
      return;
    }
    window._momentosData=rows;
    window._momentosUrls=rows.map(r=>r.foto_url);
    box.innerHTML=`<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:12px;padding-top:6px">
      ${rows.map((ck,i)=>`<div onclick="viewMoment(${i})" style="cursor:pointer;aspect-ratio:1;border-radius:6px;overflow:hidden;border:3px solid #fff;box-shadow:0 3px 10px rgba(0,0,0,0.4);transform:rotate(${i%2===0?'-2deg':'2deg'})">
        <img src="${ck.foto_url}" style="width:100%;height:100%;object-fit:cover;pointer-events:none" loading="lazy">
      </div>`).join('')}
    </div>`;
  }catch(e){
    box.innerHTML='<div style="text-align:center;padding:20px 0;color:var(--muted)">Nao consegui carregar os momentos agora.</div>';
  }
}
// Abre um Instant em tela cheia (estilo visualizador de Stories): barra de progresso, avanco
// automatico apos ~3.8s, swipe/tap pra navegar. source={urls,data} — se omitido, usa a galeria
// do proprio usuario logado (window._momentosUrls/_momentosData) e o visitante e o dono, podendo
// rever a vontade. Quando source e passado (Instant de OUTRA pessoa, ex: Clube da Meia Azul),
// cada foto e apagada do banco assim que o visitante passa por ela — visto uma vez, some pra sempre.
const MOMENT_VIEW_MS=3800;
function viewMoment(idx,source){
  const isOwner=!source;
  const urls=(source?source.urls:window._momentosUrls)||[];
  const data=(source?source.data:window._momentosData)||[];
  if(!urls.length)return;
  let i=Math.max(0,Math.min(idx,urls.length-1));
  let timer=null,touchStartX=null;
  const overlay=document.createElement('div');
  overlay.style.cssText='position:fixed;inset:0;z-index:900;background:rgba(0,0,0,0.95);display:flex;align-items:center;justify-content:center';

  function consume(consumedIdx){
    if(isOwner)return;
    const item=data[consumedIdx];
    if(item&&item._source==='moment'&&item.id){
      fetch(`${SB_URL}/rest/v1/mytri_moments?id=eq.${item.id}`,{method:'DELETE',headers:sbHeaders()}).catch(()=>{});
    }
  }
  function goTo(newIdx){
    if(newIdx===i)return;
    if(newIdx<0)return;
    clearTimeout(timer);
    if(newIdx>=urls.length){ consume(i); overlay.remove(); return; }
    consume(i);
    i=newIdx;
    render();
  }
  function render(){
    const item=data[i]||{};
    const canDelete=isOwner&&item._source==='moment'&&item.id;
    overlay.innerHTML=`
      <div style="position:absolute;top:12px;left:16px;right:16px;display:flex;gap:4px;z-index:2">
        ${urls.map((_,j)=>`<div style="flex:1;height:3px;border-radius:2px;background:rgba(255,255,255,0.25);overflow:hidden"><div id="moment-bar-${j}" style="height:100%;width:${j<i?'100%':'0%'};background:#fff;${j===i?`transition:width ${MOMENT_VIEW_MS}ms linear`:''}"></div></div>`).join('')}
      </div>
      <div onclick="event.stopPropagation()" style="position:relative;max-width:520px;width:100%;padding:0 16px">
        <img src="${urls[i]}" style="width:100%;max-height:80vh;object-fit:contain;border-radius:8px">
        ${canDelete?`<button onclick="event.stopPropagation();deleteMoment('${item.id}')" style="width:100%;margin-top:16px;padding:12px;background:none;border:1px solid rgba(224,92,42,0.5);color:#e05c2a;border-radius:8px;font-family:var(--font-ui);font-size:11px;letter-spacing:1.5px;cursor:pointer">APAGAR ESSE INSTANT</button>`:''}
      </div>
      <div onclick="event.stopPropagation();window._momentNav(-1)" style="position:absolute;left:0;top:0;bottom:0;width:30%;cursor:pointer"></div>
      <div onclick="event.stopPropagation();window._momentNav(1)" style="position:absolute;right:0;top:0;bottom:0;width:30%;cursor:pointer"></div>
      <button onclick="event.stopPropagation();window._momentCloseNow()" style="position:absolute;top:20px;right:20px;background:rgba(255,255,255,0.15);border:none;color:#fff;width:36px;height:36px;border-radius:50%;font-size:18px;cursor:pointer;z-index:2">&times;</button>
    `;
    requestAnimationFrame(()=>requestAnimationFrame(()=>{
      const bar=document.getElementById(`moment-bar-${i}`);
      if(bar)bar.style.width='100%';
    }));
    clearTimeout(timer);
    timer=setTimeout(()=>goTo(i+1),MOMENT_VIEW_MS);
  }
  window._momentNav=(dir)=>goTo(i+dir);
  window._momentCloseNow=()=>{ consume(i); overlay.remove(); };
  overlay.addEventListener('touchstart',e=>{ touchStartX=e.touches[0].clientX; },{passive:true});
  overlay.addEventListener('touchend',e=>{
    if(touchStartX===null)return;
    const dx=e.changedTouches[0].clientX-touchStartX;
    touchStartX=null;
    if(Math.abs(dx)<40)return;
    goTo(dx<0?i+1:i-1);
  },{passive:true});
  overlay.onclick=()=>{ consume(i); overlay.remove(); };
  overlay.id='moment-viewer';
  document.body.appendChild(overlay);
  render();
}
async function deleteMoment(momentId){
  if(!confirm('Apagar esse Instant? Nao pode ser desfeito.'))return;
  try{
    await fetch(`${SB_URL}/rest/v1/mytri_moments?id=eq.${momentId}`,{method:'DELETE',headers:sbHeaders()});
    const overlay=document.getElementById('moment-viewer');
    if(overlay)overlay.remove();
    loadProfileMomentos();
  }catch(e){
    alert('Nao consegui apagar agora. Tenta de novo.');
  }
}
// Adiciona um Instant pessoal: foto crua, sem edicao, direto no proprio perfil — o botao
// colorido (gradiente Instagram) do canto superior esquerdo do avatar.
function openAddMoment(){
  const input=document.createElement('input');
  input.type='file'; input.accept='image/*'; input.capture='environment';
  input.onchange=async(e)=>{
    const file=e.target.files[0];
    if(!file)return;
    const uid=currentUserId();
    if(!uid)return;
    try{
      const s=getSession();
      const token=(s&&s.access_token)||'';
      const path=`${uid}/moment_${Date.now()}.jpg`;
      const up=await fetch(`${SB_URL}/storage/v1/object/checkins/${path}`,{
        method:'POST',
        headers:{'apikey':SB_KEY,'Authorization':'Bearer '+token,'Content-Type':file.type||'image/jpeg'},
        body:file
      });
      if(!up.ok)throw new Error('upload falhou');
      const fotoUrl=`${SB_URL}/storage/v1/object/public/checkins/${path}`;
      await fetch(`${SB_URL}/rest/v1/mytri_moments`,{
        method:'POST', headers:sbHeaders(),
        body:JSON.stringify({user_id:uid,foto_url:fotoUrl})
      });
      loadProfileMomentos();
    }catch(err){
      alert('Nao consegui adicionar o Instant agora. Tenta de novo.');
    }
  };
  input.click();
}

function resetOnboarding(){
  if(!confirm('Resetar onboarding? Isso apaga seu perfil, plano e prova selecionada pra comecar do zero.'))return;
  // Antes só limpava uma flag e o cache do resumo — o perfil (com a prova antiga, nome, Strava
  // conectado etc.) continuava intacto, então depois de "resetar" a prova antiga ainda aparecia
  // presa e o app se comportava como se você já tivesse uma prova em andamento.
  // CRITICO: tambem precisa limpar a copia NA NUVEM — senao, na proxima vez que o app abre,
  // ele busca o perfil antigo de volta do Supabase antes mesmo do onboarding novo comecar
  // (syncProfileFromSupabase preenche local vazio com o que estiver salvo remoto).
  const _uid=currentUserId();
  if(_uid){
    sbSet('mytri_profile',{}).catch(()=>{});
    sbSet('mytri_onboard_done',false).catch(()=>{});
  }
  localStorage.clear();
  obStep=0;
  obData={};
  closeProfile();
  location.reload();
}

// Regenera o plano do zero e LIMPA todo o estado de execução corrompido (overrides, extras,
// checks, recalibração, ordem). Mantem o perfil - não precisa refazer onboarding. Resolve o
// "problema circular": planos gerados por versoes antigas ficavam com dados impossiveis
// (ex: 706km planejado) que batiam com o código novo e geravam comportamento estranho.
function regeneratePlanClean(){
  if(!confirm('Isso vai gerar seu plano do zero e apagar o progresso/execuções atuais (treinos marcados, dados do Strava já sincronizados). Seu perfil e dados pessoais permanecem. Continuar?'))return;
  try{
    ['nano_tri_v2','nano_extras_v1','nano_overrides_v1','nano_order_v1','nano_cal_cache','mytri_plan_cache','nano_coach_cache','nano_recal_v1','mytri_recal_popup_shown','strava_last_sync','mytri_session_analysis'].forEach(k=>localStorage.removeItem(k));
    // limpar também no supabase (não bloqueia se falhar)
    try{ sbSet('nano_extras',{}).catch(()=>{}); sbSet('nano_overrides',{}).catch(()=>{}); sbSet('nano_checks',{}).catch(()=>{}); }catch(e){}
    plan=null;
    loadPlanFromProfile();
    closeProfile&&closeProfile();
    // re-render tudo
    try{ switchTab('agenda'); }catch(e){}
    try{ renderStats(); }catch(e){}
    alert('Plano regenerado! Faca o SYNC do Strava novamente para reimportar suas atividades reais.');
  }catch(e){ alert('Erro ao regenerar: '+(e.message||e)); }
}

function changeCoverPhoto(){

function handleCoverPhoto(e){
  const file=e.target.files[0];
  if(!file)return;
  const reader=new FileReader();
  reader.onload=ev=>{
    const prof=getMytriProfile();
    prof.coverPhoto=ev.target.result;
    saveMytriProfile(prof);
    renderProfile();
  };
  reader.readAsDataURL(file);
}

function handleProfilePhoto(e){
  const file=e.target.files[0];
  if(!file)return;
  const reader=new FileReader();
  reader.onload=ev=>{
    const prof=getMytriProfile();
    prof.photo=ev.target.result;
    saveMytriProfile(prof);
    renderProfile();
    refreshHoje();
  };
  reader.readAsDataURL(file);
}


function addExtraPhoto(){
  document.getElementById('profile-extra-photo-input').click();
}

function handleExtraPhoto(e){
  const file=e.target.files[0];
  if(!file)return;
  const reader=new FileReader();
  reader.onload=ev=>{
    const prof=getMytriProfile();
    if(!prof.photos)prof.photos=[];
    prof.photos.push(ev.target.result);
    saveMytriProfile(prof);
    renderProfile();
  };
  reader.readAsDataURL(file);
}

function removeProfilePhoto(idx){
  const prof=getMytriProfile();
  if(prof.photos){prof.photos.splice(idx,1);}
  saveMytriProfile(prof);
  renderProfile();
}

function submitProfile(){
  const prof=getMytriProfile();
  const getVal=(id)=>{const el=document.getElementById(id);return el?el.value:'';};
  const updated={
    ...prof,
    name:getVal('pf-nome').trim(),
    age:getVal('pf-idade').trim(),
    weight:getVal('pf-peso').trim(),
    altura:getVal('pf-altura').trim(),
    city:getVal('pf-cidade').trim(),
    bairro:getVal('pf-bairro').trim(),
    country:getVal('pf-country')||prof.country||'BR',
    sexo:getVal('pf-sexo'),
    sport:getVal('pf-modalidade'),
    raceDist:getVal('pf-distancia')||prof.raceDist,
    runLevel:getVal('pf-runlevel')||prof.runLevel,
    bikeLevel:getVal('pf-bikelevel')||prof.bikeLevel,
    swimLevel:getVal('pf-swimlevel')||prof.swimLevel,
    pace:getVal('pf-pace').trim(),
    ftp:getVal('pf-ftp').trim(),
    swim:getVal('pf-swim').trim(),
    fcMax:getVal('pf-fcmax').trim(),

function loadAllStravaData(){
  // Combina overrides (sessões do plano com Strava) e extras (atividades não planejadas)
  const ovs=loadOverrides();
  const extras=loadExtras();
  const all=[];
  Object.values(ovs).forEach(o=>{if(o.stravaData)all.push(o);});
  // e.dist pode guardar TEMPO (ex "43min") quando o Strava não reportou distancia para a atividade
  // (rolo sem sensor, GPS perdido) — usado só pra exibir algo no card. Não pode virar "distancia"
  // aqui, senao "43min" vira "43km" nos recordes/stats (bug: bike de 43min virava 43km).
  const _looksLikeDistance=s=>!!s&&!/min/i.test(s);
  Object.values(extras).forEach(arr=>{
    (arr||[]).forEach(e=>{if(e.stravaDist||e.dist)all.push({
      type:e.type,
      stravaData:e.note||e.text||'extra',
      stravaDist:e.stravaDist||(_looksLikeDistance(e.dist)?e.dist:'')||'',
      stravaTime:e.stravaTime||(!_looksLikeDistance(e.dist)?e.dist:'')||'',
      stravaHR:e.stravaHR||'',
      stravaCal:e.stravaCal||e.cal||'',
    });});
  });
  return all;
}

function calcPRs(){
  const prs={totalSessions:0,longestRun:0,longestBike:0,bestHR:999,bestPaceRun:null,bestPaceRunDist:0};
  const allData=loadAllStravaData();
  allData.forEach(o=>{
    prs.totalSessions++;
    if(o.stravaDist){
      const dist=parseFloat(o.stravaDist)||0;
      if(o.type==='run'&&dist>prs.longestRun)prs.longestRun=dist;
      if(o.type==='bike'&&dist>prs.longestBike)prs.longestBike=dist;
    }
    if(o.stravaHR){
      const hr=parseInt(o.stravaHR)||0;
      if(hr>0&&hr<prs.bestHR)prs.bestHR=hr;
    }
    if(o.type==='run'&&o.stravaDist&&(o.stravaPace||o.stravaTime)){
      const dist=parseFloat(o.stravaDist)||0;
      let pace=null;
      // Preferir stravaPace: calculado com segundos, sem passar pelo arredondamento
      // pra minuto cheio que stravaTime sofre (ex: 34:30 vira "35min", pace vira 7:00
      // em vez de 6:54). stravaTime fica so como fallback pra dados sincronizados antes
      // desse campo existir.
      if(o.stravaPace){
        const pm=String(o.stravaPace).match(/(\d+):(\d+)\/km/);
        if(pm)pace=parseInt(pm[1])+parseInt(pm[2])/60;
      }
      if(pace===null&&o.stravaTime){
        const timeStr=o.stravaTime||'';
        const parts=timeStr.match(/(\d+)h\s*(\d+)min|(\d+)min/);
        if(parts){
          let mins=parts[1]?parseInt(parts[1])*60+parseInt(parts[2]):parseInt(parts[3]);
          pace=mins/dist;
        }
      }
      if(pace!==null&&dist>0&&(!prs.bestPaceRun||pace<prs.bestPaceRun)){prs.bestPaceRun=pace;prs.bestPaceRunDist=dist;}
    }
  });
  return prs;
}

  return Array.from({length:total},(_,i)=>`<div class="ob-progress-bar ${i<step?'done':''}"></div>`).join('');
}

function renderOnboarding(){
  const el=document.getElementById('view-onboard');
  el.innerHTML='';
  const screens=[
    renderObWelcome,
    renderObIntro,
    renderObEsporte,
    renderObDistancia,
    renderObProva,
    renderObMeta,
    renderObModalidades,
    renderObFitness,
    renderObHoras,
    renderObDias,
    renderObLesoes,
    renderObStrava,
    renderObFim,
  ];
  if(obStep>=screens.length){obFinish();return;}
  const totalBars=screens.length-1;
  const prog=`<div class="ob-progress">${obProgress(obStep,totalBars)}</div>`;
  const back=obStep>0?`<button onclick="obBack()" style="position:absolute;top:52px;left:20px;background:none;border:none;color:var(--muted2);font-size:22px;cursor:pointer;z-index:10">&#8592;</button>`:'';
  el.innerHTML=prog+back+`<div id="ob-screen-wrap" style="flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding-bottom:40px"></div>`;
  screens[obStep](document.getElementById('ob-screen-wrap'));
}

  vids.forEach(v=>v.play().catch(err=>console.log('[ob-video] autoplay bloqueado:',v.id,err.name,err.message)));

}

function friendlyRaceError(raw){
  const e=String(raw||'').toLowerCase();
  // Saldo/crédito da API esgotado
  if(e.includes('credit balance')||e.includes('too low')||e.includes('billing')||e.includes('quota'))
    return 'Busca automática indisponivel no momento. Cadastre sua prova manualmente abaixo em poucos segundos.';
  // Rate limit
  if(e.includes('rate limit')||e.includes('429')||e.includes('overloaded'))
    return 'Muitas buscas em pouco tempo. Aguarde alguns segundos e tente de novo, ou cadastre manualmente abaixo.';
  // Chave invalida / auth
  if(e.includes('authentication')||e.includes('api key')||e.includes('401')||e.includes('invalid x-api-key'))
    return 'Serviço de busca temporariamente indisponivel. Cadastre sua prova manualmente abaixo.';
  // Resposta cortada / parse
  if(e.includes('cortada')||e.includes('extrair')||e.includes('longa demais'))
    return 'A busca demorou demais desta vez. Tente de novo, ou cadastre sua prova manualmente abaixo.';
  // Rede
  if(e.includes('rede')||e.includes('conexão')||e.includes('network')||e.includes('failed to fetch'))
    return 'Sem conexão para buscar provas agora. Verifique a internet ou cadastre manualmente abaixo.';
  // Generico: não vaza texto técnico em ingles
  return 'Não consegui buscar provas automaticamente agora. Cadastre sua prova manualmente abaixo.';
}
async function obSearchRaces(){
  if(obData._searchingRaces) return;
  obData._searchingRaces=true;
  renderOnboarding();
  const distLabel=(DIST_INFO[obData.raceDist]&&DIST_INFO[obData.raceDist].label)||obData.raceDist||'';
  const location=(getMytriProfile().city)||localStorage.getItem('mytri_gps_city')||'Brasil';
  // Estado (UF) separado da cidade — ajuda a busca a cobrir provas regionais/de assessoria
  // que não aparecem numa busca só pela cidade exata do atleta.
  const state=getMytriProfile().state||'';
  obData._raceSearchError=null;
  try{
    const resp=await authedFetch('/.netlify/functions/race-search',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({sport:obData.sport||'triathlon',raceDist:obData.raceDist||'',distLabel,location,state,monthsAhead:10})
    });
    let data={};
    try{ data=await resp.json(); }catch(e){ data={}; }
    // Diagnostico: se a function retornou erro, guarda o motivo para exibir
    if(!resp.ok || data.error){
      obData._raceSearchError = friendlyRaceError(data.error || ('erro '+resp.status));
    }
    const today=new Date().toISOString().slice(0,10);
    let races=(Array.isArray(data.races)?data.races:[]).filter(r=>r&&r.date&&r.date>=today);

    // Se a 1a busca vier vazia, tenta 2a vez automaticamente com criterio mais amplo
    // (janela maior + área mais ampla). Não e plausivel não existir prova alguma no ano.
    if(races.length===0){
      try{
        const resp2=await authedFetch('/.netlify/functions/race-search',{
          method:'POST',headers:{'Content-Type':'application/json'},
          body:JSON.stringify({sport:obData.sport||'triathlon',raceDist:obData.raceDist||'',distLabel,location:'Brasil',monthsAhead:14,broaden:true})
        });
        const data2=await resp2.json();
        races=(Array.isArray(data2.races)?data2.races:[]).filter(r=>r&&r.date&&r.date>=today);
        // Se o retry trouxe provas, limpa erro. Se ainda vazio e veio erro, mostra o do retry.
        if(races.length>0){ obData._raceSearchError=null; }
        else if(data2.error){ obData._raceSearchError=friendlyRaceError(data2.error); }
      }catch(e){ if(!obData._raceSearchError) obData._raceSearchError=friendlyRaceError('conexão'); }
    }
    obData.webRaces=races;
  }catch(e){ obData.webRaces=[]; }
  obData._searchingRaces=false;
  renderOnboarding();
}

// Estima tempo-alvo aproximado pela distancia selecionada + pace/nível do atleta.
// Serve como ponto de partida do picker (o atleta ajusta como quiser).
function estimateGoalTime(raceDist, obData){
  const paceStrToSec = (p)=>{ if(!p)return null; const m=String(p).match(/(\d+):(\d+)/); return m?(+m[1]*60+ +m[2]):null; };
  const runPaceSec = paceStrToSec(obData.runPace) || ({beginner:390,intermediate:330,advanced:270}[obData.runLevel]||360); // s/km
  const swimPaceSec = paceStrToSec(obData.swimPace) || ({beginner:150,intermediate:120,advanced:100}[obData.swimLevel]||135); // s/100m
  const ftp = parseInt(obData.ftp)||({beginner:150,intermediate:200,advanced:260}[obData.bikeLevel]||180);
  const bikeSpeed = Math.max(22, Math.min(40, ftp/6)); // km/h grosseiro
  // distancias (km) por categoria
  const D = {
    'super-sprint':{s:0.4,b:10,r:2.5},'sprint':{s:0.75,b:20,r:5},'olimpico':{s:1.5,b:40,r:10},
    'half':{s:1.9,b:90,r:21.1},'full':{s:3.8,b:180,r:42.2},
    'corrida-5k':{r:5},'corrida-10k':{r:10},'corrida-15k':{r:15},'corrida-meia':{r:21.1},'corrida-maratona':{r:42.2},'corrida-trail':{r:21},
    'bike-gran-fondo':{b:100},'bike-criterium':{b:40},'bike-mtb':{b:50},'bike-century':{b:160},
    'swim-1500':{s:1.5},'swim-3800':{s:3.8},'swim-open':{s:2},
    'du-sprint':{r:5,b:20},'du-standard':{r:10,b:40},
  };
  const d=D[raceDist]; if(!d) return {hr:1,min:30};
  let sec=0;
  if(d.s) sec += (d.s*1000/100)*swimPaceSec + 120; // + T1
  if(d.b) sec += (d.b/bikeSpeed)*3600 + (d.s?120:0); // + T2 se tri
  if(d.r) sec += d.r*runPaceSec;
  const hr=Math.floor(sec/3600), min=Math.round((sec%3600)/60/5)*5;
  return {hr:Math.max(0,hr), min:Math.min(55,min)};
}

        const D={

          'half':{s:1.9,b:90,r:21.1},'full':{s:3.8,b:180,r:42.2},
          'corrida-5k':{r:5},'corrida-10k':{r:10},'corrida-15k':{r:15},'corrida-meia':{r:21.1},'corrida-maratona':{r:42.2},'corrida-trail':{r:21},
          'bike-gran-fondo':{b:100},'bike-criterium':{b:40},'bike-mtb':{b:50},'bike-century':{b:160},

        const chips=[];
        const soCorrida=d.r&&!d.s&&!d.b;

        if(soCorrida){

                <div style="display:flex;align-items:center;justify-content:center;gap:2px">
                  <input id="${inputId}" type="tel" inputmode="${wide?'decimal':'numeric'}" value="${v}" onfocus="_obClearPaceBox(this)" onblur="_obRestorePaceBox(this)" oninput="obGoalFromTriLeg(this,'${l}',${JSON.stringify(d).replace(/"/g,'&quot;')})" style="width:${wide?44:40}px;background:none;border:none;color:${c};font-family:var(--font-display);font-size:16px;text-align:right;padding:0">
                  <span style="font-family:var(--font-display);font-size:13px;color:${c}">${unit}</span>

                <div style="font-family:var(--font-ui);font-size:8px;color:var(--muted);letter-spacing:.5px;margin-top:2px">${lbl}</div>

// Digitar um pace (ex "545" -> "5:45") recalcula o tempo-alvo direto, sem precisar das setas.
// Atualiza só os digitos de HORAS/MINUTOS via DOM (não chama renderOnboarding) pra não perder
// o foco do campo enquanto o atleta ainda está digitando.
// Edita qualquer uma das 3 pernas (nado/bike/corrida) do triathlon/duatlo e recalcula o
// tempo-alvo total somando com o que estiver nos OUTROS dois campos no momento — assim os
// 3 campos ficam "linkados" pelo tempo total, igual pedido pro caso só-corrida.
function obGoalFromTriLeg(el,leg,d){
  const raw=el.value.replace(/[^0-9:.,]/g,'');
  let legSec=0;
  if(leg==='TRI_BIKE'){
    const kmh=parseFloat(raw.replace(',','.'))||0;
    if(kmh>0&&d.b) legSec=(d.b/kmh)*3600;
  }else{
    // nado/corrida: formata como pace min:seg (reaproveita obFormatPace se for só digitos)
    const formatted=/^[0-9]+$/.test(raw)?obFormatPace(el):raw;
    const parts=formatted.split(':');
    if(parts.length===2){
      const paceSec=(parseInt(parts[0])||0)*60+(parseInt(parts[1])||0);
      if(leg==='TRI_SWIM'&&d.s) legSec=paceSec*d.s*10;
      if(leg==='TRI_RUN'&&d.r) legSec=paceSec*d.r;
    }
  }
  const getSec=(id,km,isBike)=>{
    if(!km)return 0;
    const v=document.getElementById(id)?.value||'';
    if(isBike){ const kmh=parseFloat(v.replace(',','.'))||0; return kmh>0?(km/kmh)*3600:0; }
    const parts=v.split(':'); if(parts.length!==2)return 0;
    const paceSec=(parseInt(parts[0])||0)*60+(parseInt(parts[1])||0);
    return id.includes('swim')?paceSec*km*10:paceSec*km;
  };
  const swimSec=leg==='TRI_SWIM'?legSec:getSec('ob-tri-swim',d.s,false);
  const bikeSec=leg==='TRI_BIKE'?legSec:getSec('ob-tri-bike',d.b,true);
  const runSec=leg==='TRI_RUN'?legSec:getSec('ob-tri-run',d.r,false);
  const totalSec=swimSec+bikeSec+runSec;
  if(totalSec<=0)return;
  // Guarda o pace EXATO que a pessoa determinou pra perna de corrida (segundos por km) — sem
  // isso, o relatorio final reestimava esse número por uma regra generica de "42% do tempo
  // total", que quase nunca bate com o que a pessoa realmente digitou aqui.
  if(d.r&&runSec>0) obData.goalRunPaceSec=runSec/d.r;
  const hr=Math.floor(totalSec/3600), min=Math.round((totalSec%3600)/60);
  obData.goalHr=hr; obData.goalMin=min;
  obData.goalTime=`${String(hr).padStart(2,'0')}:${String(min).padStart(2,'0')}`;
  obData.goalTimeExactSec=totalSec;
  // Guarda o pace de corrida EXATO que ficou configurado (não só o tempo total) — sem isso,
  // o relatorio tinha que reestimar a perna de corrida como "42% do tempo total" de cabeca,
  // o que podia ficar bem diferente do que a pessoa realmente configurou nos 3 campos.
  if(d.r) obData.goalRunPaceSec=runSec/d.r;
  const hrEl=document.getElementById('ob-goal-hr-display'); if(hrEl)hrEl.textContent=String(hr).padStart(2,'0');
  const minEl=document.getElementById('ob-goal-min-display'); if(minEl)minEl.textContent=String(min).padStart(2,'0');
}

// Ao focar um box de pace editavel, limpa pro atleta digitar do zero (em vez de ter que apagar
// o valor sugerido primeiro). Se sair do campo sem digitar nada, volta pro valor anterior.
function _obClearPaceBox(el){
  el.dataset.prev=el.value;
  el.value='';
}
function _obRestorePaceBox(el){
  if(!el.value && el.dataset.prev){ el.value=el.dataset.prev; return; }
  // Completa entrada curta (só digitou "2", sem dois-pontos) assumindo o número inteiro —
  // mesma correção aplicada nos outros campos de pace, pra não obrigar digitar zero à toa.
  if(el.value && !el.value.includes(':')){
    el.value=el.value+':00';
    el.dispatchEvent(new Event('input'));
  }
}

function obGoalFromPace(el,distKm){
  const formatted=obFormatPace(el);
  const parts=formatted.split(':');
  if(parts.length!==2||!distKm)return;
  const paceSec=(parseInt(parts[0])||0)*60+(parseInt(parts[1])||0);
  const totalSec=paceSec*distKm;
  const hr=Math.floor(totalSec/3600);
  const min=Math.round((totalSec%3600)/60);
  obData.goalHr=hr; obData.goalMin=min;
  obData.goalTime=`${String(hr).padStart(2,'0')}:${String(min).padStart(2,'0')}`;
  // Guarda o tempo EXATO (com segundos) por baixo do arredondamento — o seletor visual só
  // mostra HORAS:MINUTOS, mas sem isso o pace "necessário" calculado depois vinha sempre
  // arredondado pro minuto cheio (ex: digitou 5:35/km, virava 5:36/km no relatorio).
  obData.goalTimeExactSec=totalSec;
  const hrEl=document.getElementById('ob-goal-hr-display'); if(hrEl)hrEl.textContent=String(hr).padStart(2,'0');
  const minEl=document.getElementById('ob-goal-min-display'); if(minEl)minEl.textContent=String(min).padStart(2,'0');
}
function obAdjust(field,delta){
  // Antes: minutos só tinham clamp 0-59, sem "emprestar" hora nenhuma direcao (só
  // parecia funcionar subindo por coincidencia de fluxo — descendo travava em 00).
  // Agora minuto e hora ficam corretamente correlacionados nos dois sentidos.
  let hr=obData.goalHr||0, min=obData.goalMin||0;
  // Ajuste manual pelas setas descarta a precisao de segundos guardada pelo pace —
  // a partir daqui o tempo-alvo passa a ser exatamente o que as setas mostram.
  obData.goalTimeExactSec=null;
  obData.goalRunPaceSec=null;
  if(field==='hr'){
    hr=hr+delta;
  }else{
    min=min+delta;
    while(min>=60){ min-=60; hr+=1; }
    while(min<0){ min+=60; hr-=1; }
  }
  obData.goalHr=Math.max(0,Math.min(17,hr));
  obData.goalMin=Math.max(0,Math.min(59,min));
  renderOnboarding();
}

function obFormatPace(el){
  let v=el.value.replace(/[^0-9]/g,'');
  if(v.length>4) v=v.slice(0,4);
  if(v.length>=3) v=v.slice(0,v.length-2)+':'+v.slice(-2);
  el.value=v;
  return v;
}
// Ao sair do campo, completa entrada "curta" (só 1 ou 2 dígitos, sem dois-pontos) assumindo
// que a pessoa quis dizer o número inteiro — ex: digitou só "2" -> vira "2:00". Antes era
// obrigatorio digitar os zeros mesmo pra tempo redondo (teria que digitar "200").
function obFormatPaceBlur(el){
  let v=(el.value||'').trim();
  if(v && !v.includes(':')){
    v=v+':00';
  }else if(v.endsWith(':')){
    v=v+'00';
  }
  el.value=v;
  return v;
}

function obFormatCep(input){
  let v=input.value.replace(/\D/g,'').slice(0,8);
  if(v.length>5)v=v.slice(0,5)+'-'+v.slice(5);
  input.value=v;
  obData.cep=v;
  const status=document.getElementById('ob-cep-status');
  if(v.replace(/\D/g,'').length===8){
    if(status)status.textContent='Buscando cidade...';
    fetch('https://viacep.com.br/ws/'+v.replace(/\D/g,'')+'/json/')
      .then(r=>r.json())
      .then(d=>{
        if(d.erro){ if(status)status.textContent='CEP não encontrado'; return; }
        const bairroP=d.bairro?d.bairro+', ':'';
        const cidade=d.localidade&&d.uf?(bairroP+d.localidade+', '+d.uf):(bairroP+(d.localidade||''));
        obData.cepCity=cidade; obData.cepBairro=d.bairro||''; obData.cepCidadeBase=d.localidade||''; obData.state=d.uf||'';
        // Limpa lat/lon do GPS: o CEP tem prioridade quando digitado depois
        obData.gpsLat=null; obData.gpsLon=null;
        if(status){ status.style.color='var(--accent)'; status.textContent='Local: '+cidade; }
        // Limpa a mensagem verde do GPS para não confundir (o CEP sobrescreveu)
        const gpsSt=document.getElementById('ob-gps-status');
        if(gpsSt){ gpsSt.style.color='var(--muted)'; gpsSt.innerHTML='Usando o CEP informado acima: <b>'+cidade+'</b>'; }
        try{ localStorage.setItem('mytri_gps_city',cidade); }catch(e){}
      })
      .catch(()=>{ if(status)status.textContent='Erro ao buscar CEP'; });
  }
}

// Nome completo do estado (como a Nominatim devolve) -> sigla UF
const BR_STATE_TO_UF={'Acre':'AC','Alagoas':'AL','Amapá':'AP','Amazonas':'AM','Bahia':'BA','Ceará':'CE','Distrito Federal':'DF','Espírito Santo':'ES','Goiás':'GO','Maranhão':'MA','Mato Grosso':'MT','Mato Grosso do Sul':'MS','Minas Gerais':'MG','Pará':'PA','Paraíba':'PB','Paraná':'PR','Pernambuco':'PE','Piauí':'PI','Rio de Janeiro':'RJ','Rio Grande do Norte':'RN','Rio Grande do Sul':'RS','Rondônia':'RO','Roraima':'RR','Santa Catarina':'SC','São Paulo':'SP','Sergipe':'SE','Tocantins':'TO'};
function obUseGPS(){
  const st=document.getElementById('ob-gps-status');
  if(!navigator.geolocation){ if(st){st.style.color='var(--danger,#e05c2a)';st.textContent='GPS não disponível neste dispositivo. Digite o CEP.';} return; }
  if(st){st.style.color='var(--muted)';st.textContent='Obtendo sua localização...';}
  navigator.geolocation.getCurrentPosition(async pos=>{
    try{
      const lat=pos.coords.latitude, lon=pos.coords.longitude;
      const r=await fetch(`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lon}&format=json&accept-language=pt-BR`);
      const d=await r.json();
      const a=d.address||{};
      const cidade=a.city||a.town||a.village||a.municipality||a.county||'';
      // Nominatim devolve o NOME COMPLETO do estado (ex "São Paulo"), não a sigla. O select de
      // estado no Clube espera a sigla (UF) — antes isso nunca era convertido nem salvo em
      // obData, então o campo ESTADO ficava sempre vazio depois do onboarding.
      const ufNome=a.state||'';
      const uf=BR_STATE_TO_UF[ufNome]||'';
      const bairro=a.suburb||a.neighbourhood||a.quarter||a.residential||a.city_district||'';
      const label=[bairro,cidade,uf].filter(Boolean).join(', ');
      if(!cidade){ if(st){st.style.color='var(--danger,#e05c2a)';st.textContent='Não consegui identificar a cidade. Confira ou digite o CEP.';} return; }
      // Preenche para o usuário CONFIRMAR/corrigir (não trava)
      obData.cepCity=label; obData.cepBairro=bairro; obData.cepCidadeBase=cidade; obData.gpsLat=lat; obData.gpsLon=lon; obData.state=uf;
      try{ localStorage.setItem('mytri_gps_city',label); }catch(e){}
      if(st){ st.style.color='var(--accent)'; st.innerHTML='Detectado: <b>'+label+'</b><br><span style="color:var(--muted2)">Confira acima. Se estiver errado, digite o CEP para sobrescrever.</span>'; }
      const status=document.getElementById('ob-cep-status');
      if(status){ status.style.color='var(--accent)'; status.textContent='Cidade: '+label; }
    }catch(e){ if(st){st.style.color='var(--danger,#e05c2a)';st.textContent='Erro ao buscar localização. Digite o CEP.';} }
  }, err=>{
    if(st){ st.style.color='var(--danger,#e05c2a)'; st.textContent = err.code===1 ? 'Permissao de localização negada. Digite o CEP.' : 'Não foi possível obter a localização. Digite o CEP.'; }
  }, {enableHighAccuracy:true,timeout:15000,maximumAge:0});
}

function obConnectStrava(){
  localStorage.setItem('mytri_ob_tmp',JSON.stringify(obData));
  // CORRIGIDO: estava '7' (que e a tela de Dados Fisicos/Fitness), por isso voltava pro
  // lugar errado depois do Strava. renderObStrava e o indice 11 no array "screens" de
  // renderOnboarding (Welcome=0, Intro=1, Esporte=2, Distancia=3, Prova=4, Meta=5,
  // Modalidades=6, Fitness=7, Horas=8, Dias=9, Lesoes=10, Strava=11, Fim=12).
  localStorage.setItem('mytri_ob_step','11');
  // CRITICO: usa exatamente o mesmo redirect_uri (STRAVA_REDIRECT, so a origem, sem caminho)
  // que o resto do app usa. Antes esse aqui montava um valor DIFERENTE (origem+caminho), e o
  // Strava exige batida exata com o que esta cadastrado nas configuracoes dele — qualquer
  // diferenca faz o retorno do login se comportar de forma imprevisivel.
  window.location.href=`https://www.strava.com/oauth/authorize?client_id=${STRAVA_CLIENT_ID}&redirect_uri=${encodeURIComponent(STRAVA_REDIRECT)}&response_type=code&scope=read,activity:read_all&approval_prompt=force`;
}

  try{
